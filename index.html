<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RIDA NETWORK | PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #050510; color: #fff; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); border-radius: 28px; }
        .accent-gradient { background: linear-gradient(135deg, #6d28d9 0%, #a855f7 100%); }
        .page { display: none; padding-bottom: 120px; }
        .active-page { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        input { background: rgba(255,255,255,0.05) !important; color: white !important; border: 1px solid rgba(255,255,255,0.1) !important; outline: none; }
        .nav-blur { background: rgba(5, 5, 16, 0.95); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-5">

    <div id="loader" class="fixed inset-0 bg-[#050510] z-[999] flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 text-xs font-bold tracking-widest text-purple-400">SYNCING RIDA CORE...</p>
    </div>

    <div id="authArea" class="hidden space-y-8 pt-12">
        <div class="text-center">
            <h1 class="text-5xl font-black italic">RIDA<span class="text-purple-500">.</span></h1>
            <p class="text-gray-500 text-[10px] uppercase tracking-[0.3em]">Secure Mobile Mining</p>
        </div>
        <div class="glass p-8 space-y-4">
            <div id="regInputs" class="hidden"><input id="uName" type="text" placeholder="Full Name" class="w-full p-4 rounded-2xl"></div>
            <input id="uEmail" type="email" placeholder="Email Address" class="w-full p-4 rounded-2xl">
            <input id="uPass" type="password" placeholder="Password" class="w-full p-4 rounded-2xl">
            <button onclick="handleAuth()" class="w-full py-4 accent-gradient rounded-2xl font-bold">ENTER ECOSYSTEM</button>
            <p onclick="toggleAuth()" id="toggleTxt" class="text-center text-sm text-gray-400 cursor-pointer pt-2">New user? <span class="text-purple-400">Register</span></p>
        </div>
    </div>

    <div id="appArea" class="hidden">
        
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-xl accent-gradient flex items-center justify-center font-bold">R</div>
                <div>
                    <h2 id="topName" class="text-sm font-bold truncate w-24">Miner</h2>
                    <p id="topUid" class="text-[9px] text-purple-500 font-mono font-bold">ID: ---</p>
                </div>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-gray-500 font-bold uppercase">Net Assets</p>
                <p class="text-xl font-black" id="topBal">0.00</p>
            </div>
        </div>

        <div id="page-home" class="page active-page space-y-6">
            <div class="glass p-10 flex flex-col items-center space-y-8">
                <div class="w-52 h-52 rounded-full border-8 border-purple-900/20 flex flex-col items-center justify-center relative" id="mineCircle">
                    <span id="liveCounter" class="text-2xl font-mono font-bold text-purple-400">0.00000000</span>
                    <p class="text-[8px] text-gray-500 mt-2 uppercase font-black tracking-widest">Mining RIDA</p>
                </div>
                <button onclick="startMining()" id="mineBtn" class="w-full py-5 accent-gradient rounded-3xl font-black shadow-xl active:scale-95 transition">INITIALIZE SESSION</button>
            </div>
            <div class="glass p-5 border-l-4 border-purple-500 flex items-start space-x-4">
                <div class="text-xl">📢</div>
                <p id="newsBox" class="text-xs text-gray-400 italic">Connecting to node...</p>
            </div>
        </div>

        <div id="page-profile" class="page space-y-4">
            <div class="glass p-6 space-y-2">
                <p class="text-[10px] text-purple-400 font-bold uppercase">Profile Details</p>
                <h2 id="profName" class="text-lg font-bold">---</h2>
                <p id="profEmail" class="text-xs text-gray-500">---</p>
                <p id="profUid" class="text-xs text-purple-500 font-mono font-bold">ID: ---</p>
            </div>
            
            <div class="flex gap-2">
                <button onclick="openModal('send')" class="flex-1 py-4 glass text-[10px] font-bold border border-white/5 uppercase">Send</button>
                <button onclick="openModal('receive')" class="flex-1 py-4 glass text-[10px] font-bold border border-white/5 uppercase">Receive</button>
            </div>

            <div class="glass p-6 space-y-4">
                <h3 class="text-[10px] font-bold uppercase text-purple-400">Private Admin Support</h3>
                <div id="chatBox" class="h-28 overflow-y-auto text-[10px] space-y-2 pr-2"></div>
                <div class="flex gap-2">
                    <input id="chatInput" type="text" placeholder="Type..." class="flex-1 p-3 rounded-xl text-xs">
                    <button onclick="sendMsg()" class="px-4 py-3 accent-gradient rounded-xl text-xs font-bold uppercase">Send</button>
                </div>
            </div>
            <button onclick="logout()" class="w-full py-3 text-red-500 text-[10px] font-bold uppercase tracking-widest">Logout Session</button>
        </div>
    </div>

    <div id="navBar" class="hidden fixed bottom-0 left-0 w-full nav-blur flex justify-around p-4 z-50">
        <button onclick="switchTab('home', this)" class="text-center text-purple-500"><span class="block text-xl">⚡</span><span class="text-[9px] font-bold uppercase">Mining</span></button>
        <button onclick="switchTab('profile', this)" class="text-center text-gray-500"><span class="block text-xl">👤</span><span class="text-[9px] font-bold uppercase">Profile</span></button>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxhwFo2ycjOPDunKdrtgjo4uO769ZDqR6ZAyhuhpgG5eL0OxYSpRvnXLSZu0P5Bbp-1uQ/exec";
        let user = JSON.parse(localStorage.getItem('rida_pro_v45'));
        let isReg = false;
        let sessionBal = 0;

        // 1. AUTO-LOGIN LOGIC
        window.onload = () => {
            if(user) syncUser();
            else {
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('authArea').classList.remove('hidden');
            }
        };

        function syncUser() {
            server('sync', { email: user.email }, (res) => {
                if(res.success) {
                    user = res.user;
                    localStorage.setItem('rida_pro_v45', JSON.stringify(user));
                    initApp();
                } else logout();
            });
        }

        function initApp() {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('authArea').classList.add('hidden');
            document.getElementById('appArea').classList.remove('hidden');
            document.getElementById('navBar').classList.remove('hidden');

            document.getElementById('topName').innerText = user.name;
            document.getElementById('topUid').innerText = "ID: " + user.uid;
            document.getElementById('profName').innerText = user.name;
            document.getElementById('profEmail').innerText = user.email;
            document.getElementById('profUid').innerText = user.uid;

            sessionBal = parseFloat(user.bal || 0);
            document.getElementById('topBal').innerText = sessionBal.toFixed(2);
            
            server('getGlobalData', {}, (res) => { if(res.success) document.getElementById('newsBox').innerText = res.news; });
        }

        function server(action, payload, callback) {
            const cb = 'r_' + Math.round(Math.random()*100000);
            window[cb] = (d) => { delete window[cb]; document.body.removeChild(s); callback(d); };
            const s = document.createElement('script');
            s.src = `${API}?callback=${cb}&action=${action}&payload=${encodeURIComponent(JSON.stringify(payload))}`;
            document.body.appendChild(s);
        }

        function handleAuth() {
            const email = document.getElementById('uEmail').value;
            const pass = document.getElementById('uPass').value;
            const name = document.getElementById('uName').value;
            if(!email || !pass) return alert("Required fields missing");

            server(isReg ? 'register' : 'login', { email, pass, name }, (res) => {
                if(res.success) {
                    if(isReg) { alert("Registration Success. Please Login."); toggleAuth(); }
                    else {
                        user = res.user;
                        localStorage.setItem('rida_pro_v45', JSON.stringify(user));
                        location.reload();
                    }
                } else alert(res.msg || "Error");
            });
        }

        function startMining() {
            const btn = document.getElementById('mineBtn');
            btn.disabled = true; btn.innerText = "MINING IN PROGRESS";
            btn.className = "w-full py-5 bg-white/5 text-gray-500 rounded-3xl font-bold uppercase text-xs";
            document.getElementById('mineCircle').classList.add('border-purple-500', 'shadow-[0_0_40px_rgba(168,85,247,0.1)]');
            
            setInterval(() => {
                sessionBal += (0.1 / 86400);
                document.getElementById('topBal').innerText = sessionBal.toFixed(4);
                document.getElementById('liveCounter').innerText = (sessionBal % 1).toFixed(8);
            }, 1000);
        }

        function switchTab(tab, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById('page-' + tab).classList.add('active-page');
            document.querySelectorAll('#navBar button').forEach(b => b.className = "text-center text-gray-500");
            el.className = "text-center text-purple-500";
        }

        function toggleAuth() { isReg = !isReg; document.getElementById('regInputs').classList.toggle('hidden'); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
