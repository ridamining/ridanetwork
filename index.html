<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIDA Network | Mining</title>
    <style>
        :root { --p: #673ab7; --bg: #0f0c29; --c: #1a1a3a; --accent: #00ffa3; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; }
        .active { display: flex; }
        input { width: 100%; max-width: 300px; padding: 15px; margin: 10px; border-radius: 12px; border: none; background: var(--c); color: white; }
        .btn { background: var(--p); color: white; padding: 15px; border: none; border-radius: 30px; width: 100%; max-width: 330px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:disabled { background: #444; opacity: 0.7; }
        .circle { width: 240px; height: 240px; border: 8px solid var(--c); border-radius: 50%; margin: 30px auto; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .mining-active { border-color: var(--accent); box-shadow: 0 0 25px rgba(0, 255, 163, 0.3); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        #counter { font-size: 2rem; color: var(--accent); font-weight: bold; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: var(--c); padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-item { flex: 1; text-align: center; font-size: 0.8rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loginScreen" class="screen active">
        <h1 style="letter-spacing: 4px;">RIDA <span style="color:var(--p)">NETWORK</span></h1>
        <p style="opacity: 0.6;">Enter the future of mobile mining</p>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" onclick="login()">LOGIN</button>
    </div>

    <div id="dashScreen" class="screen">
        <div style="width: 100%; max-width: 350px; display: flex; justify-content: space-between; margin-bottom: 20px;">
            <span id="uName" style="font-weight: bold;">User</span>
            <span><b id="uBal">0.00</b> RIDA</span>
        </div>

        <div id="mineCircle" class="circle">
            <div id="counter">0.00000000</div>
            <small style="letter-spacing: 2px; opacity: 0.7;">RIDA / SESSION</small>
        </div>

        <button id="mineBtn" class="btn" onclick="startMining()">START MINING</button>

        <div class="nav">
            <div class="nav-item">⚡<br>Mining</div>
            <div class="nav-item" onclick="alert('Wallet coming soon!')">👛<br>Wallet</div>
            <div class="nav-item" onclick="alert('Verification portal locked.')">🛡️<br>KYC</div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyD4TrUTAwB7d-QT6FttxZsu2wUew7t9HDYzBRUVhBh_vUZK1vfWkrkxW0BedoZd_C5hA/exec";
        let userData = null;
        let localBal = 0;

        async function callAPI(action, data) {
            const response = await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors', // Essential for Google Scripts on external domains
                body: JSON.stringify({ action, data })
            });
            // Note: 'no-cors' means we can't read the response directly due to browser security
            // In a production environment, you'd use a proxy or JSONP.
            return { success: true }; 
        }

        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            // Since we're using no-cors for this GitHub demo, we validate admin locally
            if(email === "paktrons@gmail.com" && pass === "cocomopakistan") {
                userData = { name: "Rida Admin", uid: "ADMIN_001", balance: 10000000 };
                localBal = userData.balance;
                document.getElementById('uName').innerText = userData.name;
                document.getElementById('uBal').innerText = localBal.toLocaleString();
                show('dashScreen');
            } else {
                alert("Access Denied.");
            }
        }

        function startMining() {
            const btn = document.getElementById('mineBtn');
            const circle = document.getElementById('mineCircle');
            
            btn.disabled = true;
            btn.innerText = "MINING ACTIVE";
            circle.classList.add('mining-active');

            // Simulate server-side mining start
            callAPI('startMining', 'ADMIN_001');

            setInterval(() => {
                localBal += (0.1 / 86400);
                document.getElementById('counter').innerText = (0.1 / 86400 * 10).toFixed(8); // Simulated visual gain
                document.getElementById('uBal').innerText = localBal.toFixed(4);
            }, 1000);
        }

        function show(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
