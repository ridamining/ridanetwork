<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rida Network | V11.0 Gold</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap');
        :root { --sky: #38bdf8; --indigo: #6366f1; }
        body { background: #020617; color: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; height: 100vh; user-select: none; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-prime { background: linear-gradient(135deg, var(--sky) 0%, var(--indigo) 100%); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: none; }
        .btn-prime:active { transform: scale(0.92); filter: brightness(1.2); }
        .nav-active { color: var(--sky) !important; filter: drop-shadow(0 0 12px var(--sky)); transform: translateY(-5px); }
        .section { height: calc(100vh - 180px); overflow-y: auto; padding-bottom: 120px; scrollbar-width: none; }
        .section::-webkit-scrollbar { display: none; }
        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.8; } 100% { transform: scale(1.6); opacity: 0; } }
        .mining-active::after { content: ''; position: absolute; inset: -15px; border: 2px solid var(--sky); border-radius: 50%; animation: pulse-ring 2s infinite; }
        .neon-text { text-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
        .hidden { display: none; }
    </style>
</head>
<body class="max-w-md mx-auto relative border-x border-white/5">

    <div id="loader" class="fixed inset-0 z-[100] bg-black/95 flex flex-col items-center justify-center hidden">
        <div class="relative w-16 h-16">
            <div class="absolute inset-0 border-4 border-sky-500/10 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-t-sky-500 rounded-full animate-spin"></div>
        </div>
        <p class="text-[9px] font-black tracking-[0.4em] text-sky-400 uppercase mt-6 animate-pulse">Syncing Blockchain</p>
    </div>

    <div id="auth-scr" class="h-full p-10 flex flex-col justify-center">
        <div class="text-center mb-12">
            <h1 class="text-8xl font-black italic tracking-tighter neon-text">R<span class="text-sky-400">.</span></h1>
            <p class="text-slate-500 text-[10px] font-bold tracking-[0.4em] uppercase mt-2">Mobile Mining Node</p>
        </div>
        
        <div id="login-box" class="glass p-8 rounded-[3rem] space-y-4">
            <input type="email" id="l-email" placeholder="Email Address" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none text-sm focus:border-sky-500/50">
            <input type="password" id="l-pass" placeholder="Access Key" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none text-sm focus:border-sky-500/50">
            <button onclick="auth('login')" class="w-full btn-prime p-5 rounded-2xl font-black uppercase tracking-widest text-xs">Authorize</button>
            <p class="text-center text-[11px] text-slate-500">New node? <span class="text-sky-400 font-bold cursor-pointer" onclick="toggleAuth(true)">Register</span></p>
        </div>

        <div id="reg-box" class="glass p-8 rounded-[3rem] space-y-4 hidden">
            <input type="text" id="r-user" placeholder="Username" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none text-sm">
            <input type="email" id="r-email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none text-sm">
            <input type="password" id="r-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none text-sm">
            <button onclick="auth('register')" class="w-full btn-prime p-5 rounded-2xl font-black uppercase tracking-widest text-xs">Deploy Node</button>
            <p class="text-center text-[11px] text-slate-500"><span class="text-sky-400 font-bold cursor-pointer" onclick="toggleAuth(false)">Go Back</span></p>
        </div>
    </div>

    <div id="app-scr" class="h-full hidden flex flex-col">
        <header class="p-8 pb-4 flex justify-between items-center">
            <div>
                <p id="u-uid" class="text-sky-500 text-[8px] font-black tracking-widest opacity-60">ID: ---</p>
                <h2 id="u-name" class="text-3xl font-black italic uppercase tracking-tighter">Miner</h2>
            </div>
            <div id="adm-badge" class="hidden px-4 py-1.5 bg-red-500/10 border border-red-500/30 rounded-full text-[9px] font-black text-red-500 uppercase">Operator</div>
        </header>

        <main class="flex-1 px-6">
            <div id="sec-home" class="section space-y-6 pt-4">
                <div class="glass p-8 rounded-[2.5rem] relative overflow-hidden">
                    <p class="text-white/30 text-[10px] font-black uppercase tracking-widest mb-1">Rida Assets</p>
                    <div class="flex items-baseline gap-2">
                        <h1 id="u-bal" class="text-6xl font-black tabular-nums tracking-tighter neon-text">0.000000</h1>
                        <span class="text-sky-400 font-black text-xs">RIDA</span>
                    </div>
                    <div id="u-v-tag" class="mt-6 text-[9px] font-black uppercase flex items-center gap-2"></div>
                </div>

                <div class="glass p-12 rounded-[4rem] text-center border-white/5">
                    <div id="m-off">
                        <button onclick="startMining()" class="w-36 h-36 rounded-full btn-prime shadow-2xl mx-auto flex items-center justify-center">
                            <i class="fas fa-hammer text-4xl"></i>
                        </button>
                        <p class="mt-8 font-black text-slate-500 uppercase text-[11px] tracking-[0.3em]">Initialize 0.2 Cycle</p>
                    </div>
                    <div id="m-on" class="hidden">
                        <div class="w-36 h-36 rounded-full border-2 border-sky-400/30 mx-auto flex items-center justify-center mining-active relative">
                            <i class="fas fa-bolt text-4xl text-sky-400 animate-pulse"></i>
                        </div>
                        <p id="timer" class="mt-8 font-mono text-4xl font-black text-sky-400 tracking-tighter">24:00:00</p>
                    </div>
                </div>
            </div>

            <div id="sec-news" class="section hidden space-y-4 pt-4">
                <h3 class="text-2xl font-black italic uppercase">Broadcasts</h3>
                <div id="news-feed" class="space-y-4"></div>
            </div>

            <div id="sec-chat" class="section hidden flex flex-col h-full pt-4">
                <h3 class="text-2xl font-black italic uppercase mb-4">Node Support</h3>
                <div id="chat-win" class="flex-1 glass rounded-[2.5rem] p-5 overflow-y-auto space-y-3 mb-4 text-xs"></div>
                <div class="flex gap-2 mb-28">
                    <input type="text" id="chat-in" placeholder="Query Admin..." class="flex-1 bg-white/5 p-4 rounded-2xl border border-white/10 outline-none text-sm">
                    <button onclick="sendMsg()" class="btn-prime px-6 rounded-2xl"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>

            <div id="sec-admin" class="section hidden space-y-6 pt-4">
                <div class="flex justify-between items-center">
                    <h3 class="text-2xl font-black italic text-red-500">Node Control</h3>
                    <button onclick="adminPost()" class="text-[9px] text-sky-400 font-black uppercase underline">Broadcast</button>
                </div>
                <div id="admin-list" class="space-y-2"></div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 h-28 glass flex justify-around items-center px-8 rounded-t-[3rem] z-50">
            <i onclick="go('home', this)" class="nav-btn fas fa-th-large text-2xl nav-active cursor-pointer"></i>
            <i onclick="go('news', this)" class="nav-btn fas fa-bullhorn text-2xl text-slate-600 cursor-pointer"></i>
            <i onclick="go('chat', this)" class="nav-btn fas fa-headset text-2xl text-slate-600 cursor-pointer"></i>
            <i onclick="go('admin', this)" id="nav-adm" class="nav-btn fas fa-shield-alt text-2xl text-slate-600 hidden cursor-pointer"></i>
            <i onclick="logout()" class="fas fa-power-off text-xl text-red-500/20 cursor-pointer"></i>
        </nav>
    </div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbwXZtHjxFhOwHPHcLiSyeu1i54FseWt13ddfeBJJGW_5-rDP94H1KSUX5CDAeYL2DUc/exec';
        let user = JSON.parse(localStorage.getItem('rida_v11_node')) || null;
        let ticker;

        window.onload = () => { if(user) startApp(); };

        async function auth(action) {
            loading(true);
            const data = action === 'login' ? 
                { action, email: document.getElementById('l-email').value, password: document.getElementById('l-pass').value } :
                { action, username: document.getElementById('r-user').value, email: document.getElementById('r-email').value, password: document.getElementById('r-pass').value };
            try {
                const res = await (await fetch(API, { method: 'POST', body: JSON.stringify(data) })).json();
                if(res.success) {
                    if(action === 'login') {
                        user = res.data;
                        localStorage.setItem('rida_v11_node', JSON.stringify(user));
                        startApp();
                    } else { alert("Node Registered!"); toggleAuth(false); }
                } else alert(res.msg);
            } catch(e) { alert("API Connection Failure"); }
            loading(false);
        }

        function startApp() {
            document.getElementById('auth-scr').classList.add('hidden');
            document.getElementById('app-scr').classList.remove('hidden');
            document.getElementById('u-name').innerText = user.username;
            document.getElementById('u-uid').innerText = "NODE: " + user.uid;
            if(user.role === 'Admin') {
                document.getElementById('adm-badge').classList.remove('hidden');
                document.getElementById('nav-adm').classList.remove('hidden');
            }
            sync();
        }

        async function sync() {
            const res = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getDashboard', uid: user.uid }) })).json();
            if(res.success) {
                const d = res.data;
                document.getElementById('u-v-tag').innerHTML = d.verified === 'Yes' ? 
                    '<i class="fas fa-check-circle text-green-400"></i> Verified Asset' : 
                    '<i class="fas fa-exclamation-triangle text-red-400 animate-pulse"></i> Unverified Node';
                
                if(d.miningStatus === 'Active') {
                    runTicker(d.balance, d.lastMiningTime);
                    runTimer(d.lastMiningTime);
                } else {
                    document.getElementById('u-bal').innerText = parseFloat(d.balance).toFixed(6);
                    document.getElementById('m-off').classList.remove('hidden');
                    document.getElementById('m-on').classList.add('hidden');
                }
            }
        }

        function runTicker(base, start) {
            if(ticker) clearInterval(ticker);
            ticker = setInterval(() => {
                const elapsed = (Date.now() - parseInt(start)) / 1000;
                // Updated to 0.2 RIDA per 86400 seconds (24h)
                const earned = elapsed * (0.2 / 86400); 
                document.getElementById('u-bal').innerText = (parseFloat(base) + earned).toFixed(6);
            }, 100);
        }

        function runTimer(start) {
            document.getElementById('m-off').classList.add('hidden');
            document.getElementById('m-on').classList.remove('hidden');
            const timerInt = setInterval(() => {
                const rem = 86400000 - (Date.now() - parseInt(start));
                if(rem <= 0) { clearInterval(timerInt); sync(); }
                const h = Math.floor(rem/3600000).toString().padStart(2,'0');
                const m = Math.floor((rem%3600000)/60000).toString().padStart(2,'0');
                const s = Math.floor((rem%60000)/1000).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        async function startMining() {
            loading(true);
            await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'startMining', uid: user.uid }) });
            sync();
            loading(false);
        }

        async function loadNews() {
            const res = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getAnnouncements' }) })).json();
            document.getElementById('news-feed').innerHTML = res.data.map(n => `
                <div class="glass p-6 rounded-[2.5rem]">
                    <p class="text-[8px] text-sky-400 font-black mb-1">${new Date(n[0]).toLocaleDateString()}</p>
                    <p class="text-xs text-slate-300">${n[1]}</p>
                </div>
            `).join('');
        }

        async function loadChat() {
            const res = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getMessages', uid: user.uid }) })).json();
            const win = document.getElementById('chat-win');
            win.innerHTML = res.data.map(m => `
                <div class="flex ${m[0] === user.uid ? 'justify-end' : 'justify-start'}">
                    <div class="px-5 py-2.5 rounded-[1.5rem] ${m[0] === user.uid ? 'btn-prime text-white font-bold' : 'glass border-white/10 text-slate-400'}">
                        ${m[2]}
                    </div>
                </div>
            `).join('');
            win.scrollTop = win.scrollHeight;
        }

        async function sendMsg() {
            const input = document.getElementById('chat-in');
            if(!input.value) return;
            const val = input.value; input.value = '';
            await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'sendMessage', uid: user.uid, message: val }) });
            loadChat();
        }

        async function loadAdmin() {
            const res = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'adminGetUsers' }) })).json();
            document.getElementById('admin-list').innerHTML = res.data.map(u => `
                <div class="bg-white/5 p-5 rounded-[2rem] flex justify-between items-center border border-white/5">
                    <div><p class="text-xs font-black uppercase">${u.username}</p><p class="text-[8px] text-slate-500">${u.uid}</p></div>
                    <p class="text-xs font-black text-sky-400">${parseFloat(u.balance).toFixed(2)}</p>
                </div>
            `).join('');
        }

        function adminPost() {
            const m = prompt("Global Announcement:");
            if(m) fetch(API, { method: 'POST', body: JSON.stringify({ action: 'broadcast', message: m }) }).then(() => loadNews());
        }

        function go(scr, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + scr).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('nav-active', 'text-slate-600'));
            if(el) el.classList.add('nav-active');
            if(scr === 'news') loadNews();
            if(scr === 'chat') loadChat();
            if(scr === 'admin') loadAdmin();
        }

        function toggleAuth(reg) {
            document.getElementById('login-box').classList.toggle('hidden', reg);
            document.getElementById('reg-box').classList.toggle('hidden', !reg);
        }
        function loading(s) { document.getElementById('loader').classList.toggle('hidden', !s); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
