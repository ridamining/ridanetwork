<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rida Network – Auto-Diagnostic</title>
    <style>
        body { background: #0a0f1e; color: white; font-family: monospace; padding: 20px; }
        .card { background: #1e293b; border-radius: 1rem; padding: 1rem; margin-bottom: 1rem; }
        button { background: #3b82f6; border: none; padding: 10px; border-radius: 2rem; color: white; margin: 5px; cursor: pointer; }
        pre { background: #0f172a; padding: 1rem; overflow-x: auto; white-space: pre-wrap; border-radius: 1rem; }
        .hidden { display: none; }
        .success { color: #4ade80; }
        .error { color: #f87171; }
    </style>
</head>
<body>
<div class="container" style="max-width:700px; margin:auto;">
    <h1>🔧 Rida Network – Diagnostic Mode</h1>
    <div class="card">
        <p><strong>Your Apps Script URL:</strong><br>
        <code id="urlDisplay"></code></p>
        <button id="testDirect">1. Test Direct (no proxy)</button>
        <button id="testProxy">2. Test via CORS Proxy</button>
        <button id="autoFix">3. Attempt Auto-Fix (redeploy reminder)</button>
        <pre id="output">Click a button to see raw response...</pre>
    </div>
    <div id="dashboard" class="hidden">
        <div class="card">
            <h2>⛏️ Mining Dashboard</h2>
            <div id="balance" style="font-size:2rem;">0.00 Rida</div>
            <button id="mineBtn">Start Mining</button>
            <button id="logoutBtn">Logout</button>
        </div>
    </div>
</div>

<script>
    // YOUR APPS SCRIPT URL – VERIFY THIS IS THE CORRECT /exec URL
    const API_URL = 'https://script.google.com/macros/s/AKfycbx_pLC6Owvntl1WBZzAomMsd4AjbG3QCvGGtc_7MugU_E0ECe28QEXuEqhePp9NtBBimQ/exec';
    document.getElementById('urlDisplay').innerText = API_URL;

    const PROXY = 'https://corsproxy.io/?' + encodeURIComponent(API_URL);
    let currentUser = null;

    async function fetchRaw(url, method = 'POST', body = null) {
        const options = { method, headers: { 'Content-Type': 'application/json' } };
        if (body) options.body = JSON.stringify(body);
        try {
            const res = await fetch(url, options);
            const text = await res.text();
            return { status: res.status, text };
        } catch (err) {
            return { status: 0, text: `Fetch error: ${err.message}` };
        }
    }

    document.getElementById('testDirect').onclick = async () => {
        const out = document.getElementById('output');
        out.innerText = '⏳ Testing direct fetch (may fail due to CORS)...';
        const { status, text } = await fetchRaw(API_URL, 'POST', { action: 'login', email: 'test', password: 'test' });
        out.innerHTML = `<span class="${status === 200 ? 'success' : 'error'}">HTTP ${status}</span>\n\n${text.substring(0, 1000)}`;
        if (text.includes('<!DOCTYPE html>')) {
            out.innerHTML += '\n\n⚠️ The backend returned HTML, not JSON. This means your Apps Script is NOT accessible to the public. Go to Apps Script → Deploy → Manage deployments → Edit → "Who has access" → set to "Anyone". Then redeploy and copy the NEW /exec URL.';
        }
    };

    document.getElementById('testProxy').onclick = async () => {
        const out = document.getElementById('output');
        out.innerText = '⏳ Testing via CORS proxy...';
        const { status, text } = await fetchRaw(PROXY, 'POST', { action: 'login', email: 'admin@rida.com', password: 'admin123' });
        out.innerHTML = `<span class="${status === 200 ? 'success' : 'error'}">HTTP ${status}</span>\n\n${text.substring(0, 1000)}`;
        try {
            const json = JSON.parse(text);
            if (json.success === true) {
                out.innerHTML += '\n\n✅ SUCCESS! The backend works. You can now use the mining dashboard.';
                document.getElementById('dashboard').classList.remove('hidden');
                currentUser = json.user;
                document.getElementById('balance').innerText = 'Logged in as ' + currentUser.email;
            } else if (json.success === false) {
                out.innerHTML += `\n\n✅ Backend reached, but login failed: ${json.error}. This is normal – the backend is working correctly.`;
            } else {
                out.innerHTML += '\n\n⚠️ Response was not a valid JSON object. The backend is not returning proper JSON. Check your Apps Script code.';
            }
        } catch(e) {
            out.innerHTML += `\n\n❌ Invalid JSON. The backend returned HTML. ${e.message}`;
        }
    };

    document.getElementById('autoFix').onclick = () => {
        const out = document.getElementById('output');
        out.innerHTML = `🔧 Steps to fix:\n
1. Open your Google Apps Script project.\n
2. Click "Deploy" → "Manage deployments".\n
3. Click the pencil icon next to your deployment.\n
4. Under "Who has access", select "Anyone".\n
5. Click "Deploy" and copy the NEW URL (it ends with /exec).\n
6. Replace the API_URL at the top of this HTML with that new URL.\n
7. Refresh this page and click "Test via CORS Proxy" again.\n
8. If it still fails, check that your doPost function returns ContentService.createTextOutput(JSON.stringify(result)).setMimeType(ContentService.MimeType.JSON);`;
    };

    // Simple mining if backend works
    let miningInterval = null;
    document.getElementById('mineBtn')?.addEventListener('click', async () => {
        if (!currentUser) return;
        const btn = document.getElementById('mineBtn');
        if (btn.innerText === 'Start Mining') {
            const res = await fetch(PROXY, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'startMining', email: currentUser.email })
            }).then(r => r.json());
            if (res.success) {
                btn.innerText = 'Stop Mining';
                miningInterval = setInterval(async () => {
                    const dash = await fetch(PROXY, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'getDashboard', email: currentUser.email })
                    }).then(r => r.json());
                    if (dash.success) document.getElementById('balance').innerText = dash.balance.toFixed(4) + ' Rida';
                }, 3000);
            } else alert(res.error);
        } else {
            await fetch(PROXY, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'stopMining', email: currentUser.email })
            });
            if (miningInterval) clearInterval(miningInterval);
            btn.innerText = 'Start Mining';
        }
    });
    document.getElementById('logoutBtn')?.addEventListener('click', () => {
        if (miningInterval) clearInterval(miningInterval);
        currentUser = null;
        document.getElementById('dashboard').classList.add('hidden');
    });
</script>
</body>
</html>
