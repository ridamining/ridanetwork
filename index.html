<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RIDA Engine 5.0</title>

<style>
body{margin:0;font-family:sans-serif;background:#020617;color:white;}
.screen{display:none;padding:15px;}
.active{display:block;}
.card{background:#0f172a;padding:15px;margin:10px 0;border-radius:12px;}
input,button{width:100%;padding:12px;margin:6px 0;border:none;border-radius:8px;}
button{background:#22c55e;color:white;font-weight:bold;}
.nav{position:fixed;bottom:0;width:100%;display:flex;background:#020617;}
.nav button{flex:1;background:none;color:white;padding:10px;}
.top{text-align:center;padding:10px;font-size:20px;background:#020617;}
.balance{font-size:28px;font-weight:bold;color:#22c55e;}
.loader{position:fixed;top:0;left:0;width:100%;height:100%;background:#0009;display:none;align-items:center;justify-content:center;}
</style>
</head>

<body>

<div class="top">🚀 RIDA Engine 5.0</div>

<!-- AUTH -->
<div id="auth" class="screen active">
<div class="card">
<h3 id="authTitle">Login</h3>
<input id="name" placeholder="Name" style="display:none">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="submitAuth()">Continue</button>
<button onclick="toggleAuth()">Switch</button>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="screen">
<div class="card">
<div id="userInfo"></div>
<div class="balance" id="bal">0</div>
<button onclick="sync()">Refresh</button>
</div>
</div>

<!-- MINING -->
<div id="mining" class="screen">
<div class="card">
<h3>⛏ Mining</h3>
<div id="mineStatus">Inactive</div>
<div class="balance" id="liveBal">0</div>
<button onclick="startMining()">Start Mining</button>
</div>
</div>

<!-- TRANSFER -->
<div id="transfer" class="screen">
<div class="card">
<h3>💸 Transfer</h3>
<input id="to" placeholder="Receiver UID">
<input id="amt" placeholder="Amount">
<button onclick="send()">Send</button>
</div>
</div>

<!-- ADMIN -->
<div id="admin" class="screen">
<div class="card">
<h3>📢 Admin</h3>
<input id="ann" placeholder="Announcement">
<button onclick="postAnn()">Post</button>
</div>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('dashboard')">Home</button>
<button onclick="show('mining')">Mine</button>
<button onclick="show('transfer')">Send</button>
<button onclick="show('admin')">Admin</button>
</div>

<div id="loader" class="loader">⏳</div>

<script>
var API="https://script.google.com/macros/s/AKfycbxhwFo2ycjOPDunKdrtgjo4uO769ZDqR6ZAyhuhpgG5eL0OxYSpRvnXLSZu0P5Bbp-1uQ/exec";

var user=null,isLogin=true,mining=false,live=0,interval;

// JSONP
function api(action,data,cb){
  loader.style.display="flex";
  var name="cb_"+Date.now();
  window[name]=function(res){
    loader.style.display="none";
    cb(res);
    delete window[name];
    script.remove();
  };
  var script=document.createElement("script");
  script.src=API+"?callback="+name+"&action="+action+"&payload="+encodeURIComponent(JSON.stringify(data));
  document.body.appendChild(script);
}

// AUTH
function toggleAuth(){
  isLogin=!isLogin;
  authTitle.innerText=isLogin?"Login":"Register";
  name.style.display=isLogin?"none":"block";
}

function submitAuth(){
  api(isLogin?"login":"register",{
    email:email.value,
    pass:pass.value,
    name:name.value
  },res=>{
    if(!res.success)return alert(res.msg);
    if(isLogin){
      user=res.user;
      openApp();
    }else{
      alert("Registered");
      toggleAuth();
    }
  });
}

// OPEN APP
function openApp(){
  auth.classList.remove("active");
  show("dashboard");
  render();
  if(user.role!=="ADMIN") document.querySelector('[onclick="show(\'admin\')"]').style.display="none";
}

// NAV
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// RENDER
function render(){
  userInfo.innerText="👤 "+user.name+" | "+user.uid;
  bal.innerText=user.bal;
}

// SYNC
function sync(){
  api("sync",{uid:user.uid},res=>{
    if(res.success){
      user=res.user;
      render();
    }
  });
}

// MINING SYSTEM
function startMining(){
  if(mining)return;
  mining=true;
  mineStatus.innerText="Active";

  api("startMining",{uid:user.uid},res=>{
    if(res.success){
      sync();
    }
  });

  live=parseFloat(user.bal);
  interval=setInterval(()=>{
    live+=0.0001;
    liveBal.innerText=live.toFixed(4);
  },1000);
}

// TRANSFER
function send(){
  api("p2pTransfer",{
    from:user.uid,
    to:to.value,
    amount:parseFloat(amt.value)
  },res=>{
    alert(res.msg||"Done");
    sync();
  });
}

// ADMIN
function postAnn(){
  api("postAnnouncement",{uid:user.uid,text:ann.value},res=>{
    alert(res.msg||"Posted");
  });
}
</script>

</body>
</html>
