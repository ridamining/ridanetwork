<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rida Network • Mine RIDA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');
        :root { --primary: #00ff9d; }
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: linear-gradient(180deg, #0a0a0a, #111113); 
            color: white; 
        }
        .title-font { font-family: 'Space Grotesk', sans-serif; }
        .neon-text { text-shadow: 0 0 15px #00ff9d, 0 0 35px #00ff9d; }
        .glass { 
            background: rgba(15, 23, 42, 0.92); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.08); 
        }
    </style>
</head>
<body class="min-h-screen p-6">

    <div class="max-w-2xl mx-auto text-center">
        <div class="flex justify-center items-center gap-4 mb-8">
            <div class="w-12 h-12 bg-[#00ff9d] text-black font-bold text-5xl flex items-center justify-center rounded-2xl rotate-12">R</div>
            <h1 class="title-font text-5xl font-bold neon-text">RIDA NETWORK</h1>
        </div>

        <div class="glass rounded-3xl p-10 mb-10">
            <h2 class="text-2xl font-semibold mb-6">Backend Connection Test</h2>
            
            <button onclick="testConnection()" 
                    class="w-full py-6 bg-yellow-400 hover:bg-yellow-300 text-black font-bold text-xl rounded-3xl mb-6">
                🔄 TEST BACKEND CONNECTION
            </button>

            <div id="status" class="min-h-[100px] text-lg font-medium"></div>
        </div>

        <div class="text-xs text-white/50">
            Backend URL: <span class="font-mono break-all">https://script.google.com/macros/s/AKfycbxbLpBFvHBlJhsko6DjDHnCs4KhMykP_f8bLeEn5TzknFxaQQhfHa-JR5EBD6ixCtVJ/exec</span>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxbLpBFvHBlJhsko6DjDHnCs4KhMykP_f8bLeEn5TzknFxaQQhfHa-JR5EBD6ixCtVJ/exec";

        async function testConnection() {
            const status = document.getElementById("status");
            status.innerHTML = `<span class="text-yellow-400">Sending request to backend...</span>`;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { 
                        "Content-Type": "text/plain"   // This is the key fix for Google Apps Script
                    },
                    body: JSON.stringify({ 
                        action: "login", 
                        email: "test@rida.com", 
                        password: "123" 
                    })
                });

                const rawText = await response.text();
                console.log("Raw response from backend:", rawText);

                let data;
                try {
                    data = JSON.parse(rawText);
                } catch (e) {
                    data = { success: false, error: "Invalid JSON from backend" };
                }

                if (data.success) {
                    status.innerHTML = `<span class="text-green-400 text-xl">✅ SUCCESS! Backend is connected and working.</span>`;
                    alert("✅ Backend Connection Successful!\n\nYou can now proceed to full UI.");
                } else {
                    status.innerHTML = `<span class="text-red-400">❌ ${data.error || "Unknown error"}</span>`;
                }
            } catch (err) {
                console.error(err);
                status.innerHTML = `<span class="text-red-400">❌ Connection Failed<br>${err.message}</span>`;
            }
        }

        console.log("%cRida Network - Final Connection Test Loaded", "color:#00ff9d; font-size:14px");
    </script>
</body>
</html>
