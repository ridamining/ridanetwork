<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIDA NETWORK</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#050508; color:#fff; font-family:sans-serif; }
.glass { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:20px; backdrop-filter:blur(10px);}
.btn { background:linear-gradient(135deg,#6366f1,#a855f7); padding:14px; border-radius:12px; font-weight:bold;}
.page{display:none;}
.active{display:block;}
</style>
</head>

<body class="p-4 max-w-md mx-auto">

<!-- AUTH -->
<div id="authPage">
<h1 class="text-3xl font-bold mb-6 text-center">RIDA</h1>

<div class="glass p-6 space-y-3">
<input id="email" placeholder="Email" class="w-full p-3 bg-black/30 rounded">
<input id="pass" type="password" placeholder="Password" class="w-full p-3 bg-black/30 rounded">
<input id="name" placeholder="Name (Register only)" class="w-full p-3 bg-black/30 rounded">

<button onclick="register()" class="btn w-full">Register</button>
<button onclick="login()" class="btn w-full">Login</button>
</div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<header class="flex justify-between mb-4">
<div>
<h2 id="nameView"></h2>
<p id="uidView" class="text-xs text-indigo-400"></p>
</div>
<div>
<p id="balView" class="text-xl font-bold">0</p>
</div>
</header>

<!-- ANNOUNCEMENT -->
<div class="glass p-3 mb-4">
<p id="annText">No announcements</p>
</div>

<!-- TABS -->
<div class="flex gap-2 mb-4">
<button onclick="show('home')" class="btn flex-1">Mine</button>
<button onclick="show('wallet')" class="btn flex-1">Wallet</button>
<button onclick="show('admin')" id="adminBtn" class="btn flex-1 hidden">Admin</button>
</div>

<!-- HOME -->
<div id="home" class="page active">
<div class="glass p-6 text-center space-y-4">
<h2 class="text-3xl" id="timer">0.2</h2>
<button id="mineBtn" onclick="startMining()" class="btn w-full">Start Mining</button>
</div>
</div>

<!-- WALLET -->
<div id="wallet" class="page space-y-3">
<input id="to" placeholder="Receiver UID" class="w-full p-3 bg-black/30 rounded">
<input id="amount" placeholder="Amount" class="w-full p-3 bg-black/30 rounded">
<button onclick="transfer()" class="btn w-full">Send</button>

<div class="glass p-3">
<h3>Chat</h3>
<div id="chat" class="h-32 overflow-y-auto text-xs"></div>
<input id="msg" class="w-full p-2 bg-black/30 mt-2">
<button onclick="sendMsg()" class="btn w-full mt-2">Send</button>
</div>
</div>

<!-- ADMIN -->
<div id="admin" class="page space-y-3">
<textarea id="annInp" class="w-full p-3 bg-black/30 rounded"></textarea>
<select id="type" class="w-full p-2 bg-black/30">
<option value="info">Info</option>
<option value="warning">Warning</option>
<option value="urgent">Urgent</option>
</select>
<button onclick="broadcast()" class="btn w-full">Broadcast</button>
</div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwNSWs99pYjhzcCQ6bayGDEut7HQjAlb0JB9usctGTRYReTMparM64nyhLP6mk1-OPmkA/exec";

let user = JSON.parse(localStorage.getItem("rida_user"));

function call(action,payload,cb){
 const c="cb"+Math.random();
 window[c]=(res)=>{delete window[c];document.body.removeChild(s);cb(res);}
 const s=document.createElement("script");
 s.src=`${API}?callback=${c}&action=${action}&payload=${encodeURIComponent(JSON.stringify(payload))}`;
 document.body.appendChild(s);
}

// INIT
if(user){init();}

function init(){
 document.getElementById("authPage").style.display="none";
 document.getElementById("app").classList.remove("hidden");
 sync();
 setInterval(sync,10000);
}

// AUTH
function register(){
 call("register",{email:email.value,pass:pass.value,name:name.value},res=>{
 alert(res.success?"Registered":"Error");
 });
}

function login(){
 call("login",{email:email.value,pass:pass.value},res=>{
 if(res.success){
 user=res.user;
 localStorage.setItem("rida_user",JSON.stringify(user));
 init();
 } else alert("Login failed");
 });
}

// SYNC
function sync(){
 call("sync",{uid:user.uid},res=>{
 if(!res.success) return;

 user=res.user;
 localStorage.setItem("rida_user",JSON.stringify(user));

 nameView.innerText=user.name;
 uidView.innerText=user.uid;
 balView.innerText=user.bal;

 if(res.announcements.length){
 annText.innerText=res.announcements[0].text;
 }

 if(user.role==="ADMIN"){
 adminBtn.classList.remove("hidden");
 }

 loadChat(res.history);
});
}

// MINING
function startMining(){
 call("startMining",{uid:user.uid},sync);
}

// P2P
function transfer(){
 call("p2pTransfer",{from:user.uid,to:to.value,amount:parseFloat(amount.value)},res=>{
 alert(res.success?"Sent":"Error");
 sync();
});
}

// CHAT
function sendMsg(){
 call("sendMessage",{uid:user.uid,sender:user.name,text:msg.value},()=>{msg.value="";sync();});
}

function loadChat(h){
 chat.innerHTML=h.map(m=>`<div>${m.sender}: ${m.text}</div>`).join("");
}

// ADMIN
function broadcast(){
 call("adminAction",{type:"postAnnouncement",text:annInp.value,annType:type.value},res=>{
 alert(res.success?"Sent":"Error");
});
}

// NAV
function show(id){
 document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
