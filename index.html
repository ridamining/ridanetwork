<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIDA Network | Mining</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #00ffa3; --bg: #0f0c29; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); }
        .mining-circle { width: 220px; height: 220px; border: 8px solid #1a1a3a; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-direction: column; position: relative; }
        .active-mine { border-color: var(--accent); box-shadow: 0 0 30px rgba(0, 255, 163, 0.3); animation: pulse 2.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        .loader { border: 3px solid transparent; border-top: 3px solid var(--accent); border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        input { background: #1a1a3a !important; color: white !important; border: 1px solid rgba(255,255,255,0.1) !important; outline: none; }
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #0a0a20; display: flex; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-item { flex: 1; text-align: center; padding: 15px 0; font-size: 11px; color: #888; cursor: pointer; }
        .nav-item.active { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body class="p-6 pb-24">

    <div id="authScreen" class="block pt-10 space-y-6">
        <div class="text-center">
            <h1 class="text-4xl font-black italic tracking-tighter">RIDA <span class="text-purple-500">NETWORK</span></h1>
            <p class="text-gray-400 text-[10px] mt-2 uppercase tracking-widest">Mobile Mining Ecosystem</p>
        </div>

        <div class="glass p-6 space-y-4">
            <div id="regOnly" class="hidden"><input id="uName" type="text" placeholder="Full Name" class="w-full p-4 rounded-xl"></div>
            <input id="uEmail" type="email" placeholder="Email Address" class="w-full p-4 rounded-xl">
            <input id="uPass" type="password" placeholder="Password" class="w-full p-4 rounded-xl">
            
            <button onclick="handleAuth()" id="authBtn" class="w-full py-4 bg-purple-600 rounded-xl font-bold shadow-lg active:scale-95 transition flex items-center justify-center">
                <span id="btnLabel">LOGIN</span>
            </button>
            
            <div id="statusMsg" class="text-center text-xs min-h-[1rem]"></div>
            <p onclick="toggleAuth()" id="toggleLabel" class="text-center text-sm text-cyan-400 cursor-pointer">New user? Create an account</p>
        </div>
    </div>

    <div id="appScreen" class="hidden space-y-6">
        <div class="flex justify-between items-center">
            <div>
                <h2 id="dispName" class="font-bold">Miner</h2>
                <p id="dispRole" class="text-[10px] text-purple-400 font-bold tracking-widest">USER</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] opacity-50 uppercase">Balance</p>
                <p class="text-lg font-bold text-emerald-400"><span id="dispBal">0.00</span> RIDA</p>
            </div>
        </div>

        <div id="tab-mining" class="tab-content block">
            <div class="glass p-8 flex flex-col items-center space-y-6 text-center">
                <div id="mineCircle" class="mining-circle">
                    <span id="liveCounter" class="text-3xl font-mono font-bold text-emerald-400">0.00000000</span>
                    <span class="text-[10px] opacity-40 tracking-widest mt-1">EARNED TODAY</span>
                </div>
                <button id="mineBtn" onclick="startMining()" class="px-12 py-4 bg-purple-600 rounded-full font-bold shadow-xl active:scale-90 transition">START MINING</button>
                <p class="text-[10px] text-gray-500 uppercase">24-Hour Mining Cycle</p>
            </div>
        </div>

        <div id="tab-wallet" class="tab-content hidden space-y-4">
            <div class="glass p-6 text-center">
                <p class="text-xs opacity-50 uppercase mb-1">Total Assets</p>
                <h1 class="text-4xl font-bold" id="wallBal">0.00 RIDA</h1>
            </div>
            <div class="glass p-6 space-y-4">
                <button onclick="alert('Verification required to unlock transfers.')" class="w-full py-4 bg-emerald-600 rounded-xl font-bold">SEND RIDA</button>
            </div>
        </div>

        <div class="nav-bar">
            <div onclick="switchTab('mining', this)" class="nav-item active">⚡<br>Mining</div>
            <div onclick="switchTab('wallet', this)" class="nav-item">👛<br>Wallet</div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxmYYG0y6OLqydpfXuiHPBqj0OuAsnsJQ2aUdn7IlvQJQBHySvpo8tOy8gpOoA7eBYa_A/exec";
        let isRegister = false;
        let user = null;
        let sessionBal = 0;

        function toggleAuth() {
            isRegister = !isRegister;
            document.getElementById('regOnly').classList.toggle('hidden');
            document.getElementById('authBtn').querySelector('#btnLabel').innerText = isRegister ? "REGISTER" : "LOGIN";
            document.getElementById('toggleLabel').innerText = isRegister ? "Already have an account? Login" : "New user? Create an account";
        }

        function callBackend(action, payload, callback) {
            const status = document.getElementById('statusMsg');
            const btnLabel = document.getElementById('btnLabel');
            const originalLabel = btnLabel.innerText;
            
            btnLabel.innerHTML = '<div class="loader"></div>';
            status.innerText = "Connecting to Network...";

            const callbackName = 'rida_' + Math.round(Math.random() * 1000000);
            window[callbackName] = function(data) {
                delete window[callbackName];
                document.body.removeChild(script);
                status.innerText = "";
                btnLabel.innerText = originalLabel;
                callback(data);
            };

            const script = document.createElement('script');
            script.src = `${API_URL}?callback=${callbackName}&action=${action}&payload=${encodeURIComponent(JSON.stringify(payload))}`;
            document.body.appendChild(script);
        }

        function handleAuth() {
            const email = document.getElementById('uEmail').value;
            const pass = document.getElementById('uPass').value;
            const name = document.getElementById('uName').value;
            const action = isRegister ? 'register' : 'login';

            if(!email || !pass) return alert("Fill all fields");

            callBackend(action, { email, pass, name }, (res) => {
                if (res.success) {
                    if (isRegister) {
                        alert("Account Created! You can now login.");
                        toggleAuth();
                    } else {
                        user = res.user;
                        document.getElementById('dispName').innerText = user.name;
                        sessionBal = parseFloat(user.bal || 0);
                        document.getElementById('dispBal').innerText = sessionBal.toFixed(2);
                        document.getElementById('wallBal').innerText = sessionBal.toFixed(2) + " RIDA";
                        document.getElementById('authScreen').classList.add('hidden');
                        document.getElementById('appScreen').classList.remove('hidden');
                    }
                } else {
                    document.getElementById('statusMsg').innerHTML = `<span class="text-red-500">${res.msg}</span>`;
                }
            });
        }

        function startMining() {
            const btn = document.getElementById('mineBtn');
            btn.disabled = true;
            btn.innerText = "MINING ACTIVE";
            btn.classList.add('opacity-50');
            document.getElementById('mineCircle').classList.add('active-mine');
            
            callBackend('startMining', { uid: user.uid }, (res) => {
                const step = 0.1 / 86400;
                setInterval(() => {
                    sessionBal += step;
                    document.getElementById('liveCounter').innerText = (sessionBal - parseFloat(user.bal || 0)).toFixed(8);
                    document.getElementById('dispBal').innerText = sessionBal.toFixed(4);
                }, 1000);
            });
        }

        function switchTab(tab, el) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            el.classList.add('active');
        }
    </script>
</body>
</html>
