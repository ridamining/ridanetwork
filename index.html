<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIDA Network | Crypto Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; background:#010409; color:white; margin:0; }
    .glass { background: rgba(13,17,23,0.9); backdrop-filter: blur(20px); border:1px solid rgba(255,255,255,0.05); }
    .hidden { display:none !important; }
    .pulse { animation: pulse 2s infinite; }
</style>
</head>
<body class="pb-10">

<!-- LOGIN & REGISTER -->
<div id="authView" class="min-h-screen flex items-center justify-center p-6">
    <div class="glass w-full max-w-md p-10 rounded-3xl text-center shadow-2xl">
        <h1 class="text-5xl font-black text-blue-500 mb-2">RIDA</h1>
        <p class="text-[8px] opacity-30 mb-8 uppercase tracking-widest">Neural Link v4.0</p>
        <div id="loginForm" class="space-y-4">
            <input type="email" id="email" placeholder="Email Address" class="w-full bg-white/5 p-4 rounded-xl border border-white/5 text-sm focus:border-blue-500 transition-all">
            <input type="password" id="pass" placeholder="Access Key" class="w-full bg-white/5 p-4 rounded-xl border border-white/5 text-sm focus:border-blue-500 transition-all">
            <button onclick="handleLogin()" class="w-full py-4 bg-blue-600 rounded-xl font-bold uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-all">Login</button>
            <p class="text-[10px] opacity-40">Don't have account? <span onclick="showRegister()" class="text-blue-500 cursor-pointer">Register</span></p>
        </div>
        <div id="registerForm" class="space-y-4 hidden">
            <input type="text" id="rname" placeholder="Full Name" class="w-full bg-white/5 p-4 rounded-xl border border-white/5 text-sm focus:border-blue-500 transition-all">
            <input type="email" id="remail" placeholder="Email Address" class="w-full bg-white/5 p-4 rounded-xl border border-white/5 text-sm focus:border-blue-500 transition-all">
            <input type="password" id="rpass" placeholder="Access Key" class="w-full bg-white/5 p-4 rounded-xl border border-white/5 text-sm focus:border-blue-500 transition-all">
            <button onclick="handleRegister()" class="w-full py-4 bg-green-600 rounded-xl font-bold uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-all">Register</button>
            <p class="text-[10px] opacity-40">Already have account? <span onclick="showLogin()" class="text-blue-500 cursor-pointer">Login</span></p>
        </div>
    </div>
</div>

<!-- USER DASHBOARD -->
<div id="userDashboard" class="hidden p-6">
    <header class="flex justify-between items-center glass p-6 rounded-b-3xl">
        <h2 class="text-xl font-black italic">RIDA <span class="text-blue-500 text-sm">MINER</span></h2>
        <button onclick="logout()" class="p-3 bg-white/5 rounded-xl text-slate-400"><i data-lucide="log-out"></i></button>
    </header>
    <main class="p-6 space-y-6">
        <div class="glass p-10 rounded-3xl border-t border-white/10 text-center">
            <p class="text-[10px] opacity-40 uppercase mb-2">Network Yield</p>
            <h2 class="text-5xl font-black mb-6 tracking-tight"><span id="userBalance">0.000000</span> RIDA</h2>
            <button id="mineBtn" onclick="startMining()" class="w-full py-5 rounded-2xl bg-blue-600 font-black uppercase text-xs tracking-widest shadow-xl transition-all">Start Mining</button>
            <p id="mineStatus" class="mt-2 text-[10px] opacity-40"></p>
        </div>
    </main>
</div>

<!-- ADMIN DASHBOARD -->
<div id="adminDashboard" class="hidden p-6">
    <header class="flex justify-between items-center glass p-6 rounded-b-3xl border-blue-500 border">
        <div>
            <h2 class="text-xl font-black text-blue-500 italic uppercase">Command Center</h2>
            <p class="text-[10px] opacity-40 tracking-widest">Master Node Status: Active</p>
        </div>
        <button onclick="logout()" class="p-3 bg-red-500/10 rounded-xl text-red-500"><i data-lucide="power"></i></button>
    </header>
    <main class="p-6 space-y-6">
        <button onclick="fetchRegistry()" class="w-full py-4 bg-blue-600 rounded-xl font-black uppercase text-xs tracking-widest shadow-lg transition-all">Sync Cloud Registry</button>
        <div class="glass rounded-2xl overflow-hidden border border-white/5">
            <div class="p-4 border-b border-white/5 bg-white/5 text-[10px] font-black uppercase tracking-widest opacity-50">Global User Database</div>
            <div class="overflow-x-auto max-h-80">
                <table class="w-full text-left text-[11px]">
                    <thead class="bg-black/20 text-slate-500 uppercase font-bold">
                        <tr><th class="p-3">UID</th><th class="p-3">Email</th><th class="p-3 text-right">Action</th></tr>
                    </thead>
                    <tbody id="registryBody" class="divide-y divide-white/5">
                        <tr><td colspan="3" class="p-5 text-center opacity-30 italic">Registry Pending Sync...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="glass rounded-2xl p-4 mt-4">
            <h3 class="text-[12px] font-black uppercase tracking-widest mb-2">Broadcast Announcement</h3>
            <textarea id="announcementText" class="w-full p-3 rounded-xl bg-white/5 text-sm border border-white/5 focus:border-blue-500 transition-all" placeholder="Type message here"></textarea>
            <button onclick="postAnnouncement()" class="w-full py-3 mt-2 bg-green-600 rounded-xl font-black uppercase text-xs shadow-lg">Send</button>
        </div>
    </main>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbztmx9pPM_9pmlNpxQaYjxevPCQLUWzg-8njG-bsvC7CiPplOGqSO3h057i0x0Y0BZe/exec";

let miningCooldown = false;

function showRegister(){ document.getElementById('loginForm').classList.add('hidden'); document.getElementById('registerForm').classList.remove('hidden'); }
function showLogin(){ document.getElementById('registerForm').classList.add('hidden'); document.getElementById('loginForm').classList.remove('hidden'); }

async function handleLogin(){
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('pass').value.trim();
    if(!email||!pass){ alert("All fields required"); return; }
    try{
        const res = await fetch(`${WEB_APP_URL}?action=login&payload=${encodeURIComponent(JSON.stringify({email,pass}))}`);
        const data = await res.json();
        if(data.success){
            localStorage.setItem('rida_session', JSON.stringify(data.user));
            renderView();
        } else { alert(data.msg||"Invalid login"); }
    }catch(e){ alert("Login failed: "+e.message); }
}

async function handleRegister(){
    const name = document.getElementById('rname').value.trim();
    const email = document.getElementById('remail').value.trim();
    const pass = document.getElementById('rpass').value.trim();
    if(!name||!email||!pass){ alert("All fields required"); return; }
    try{
        const res = await fetch(`${WEB_APP_URL}?action=register&payload=${encodeURIComponent(JSON.stringify({name,email,pass}))}`);
        const data = await res.json();
        if(data.success){ alert("Registration successful!"); showLogin(); } 
        else { alert(data.msg||"Failed to register"); }
    }catch(e){ alert("Register failed: "+e.message); }
}

function logout(){ localStorage.removeItem('rida_session'); location.reload(); }

async function renderView(){
    const session = JSON.parse(localStorage.getItem('rida_session'));
    document.getElementById('authView').classList.add('hidden');
    document.getElementById('userDashboard').classList.add('hidden');
    document.getElementById('adminDashboard').classList.add('hidden');

    if(!session){ document.getElementById('authView').classList.remove('hidden'); }
    else if(session.role==="ADMIN"){ document.getElementById('adminDashboard').classList.remove('hidden'); fetchRegistry(); }
    else { 
        document.getElementById('userDashboard').classList.remove('hidden'); 
        document.getElementById('userBalance').innerText = parseFloat(session.bal||0).toFixed(6); 
    }
    lucide.createIcons();
}

// --- MINING BUTTON ---
async function startMining(){
    if(miningCooldown){ alert("Mining in progress, please wait"); return; }
    miningCooldown = true;
    document.getElementById('mineBtn').innerText="Mining...";
    const session = JSON.parse(localStorage.getItem('rida_session'));
    try{
        const res = await fetch(`${WEB_APP_URL}?action=startMining&payload=${encodeURIComponent(JSON.stringify({uid:session.uid}))}`);
        const data = await res.json();
        if(data.success){ 
            session.bal = (parseFloat(session.bal||0)+0.2); 
            localStorage.setItem('rida_session', JSON.stringify(session));
            document.getElementById('userBalance').innerText = parseFloat(session.bal).toFixed(6);
            document.getElementById('mineStatus').innerText = "Mining successful +0.2 RIDA";
        } else { alert(data.msg||"Mining failed"); }
    }catch(e){ alert("Mining failed: "+e.message); }
    setTimeout(()=>{
        miningCooldown=false;
        document.getElementById('mineBtn').innerText="Start Mining";
        document.getElementById('mineStatus').innerText="";
    }, 24000); // 24 sec cooldown to simulate mining session
}

// --- ADMIN FUNCTIONS ---
async function fetchRegistry(){
    const tbody = document.getElementById('registryBody');
    tbody.innerHTML='<tr><td colspan="3" class="p-5 text-center opacity-30 pulse">Fetching registry...</td></tr>';
    try{
        const res = await fetch(`${WEB_APP_URL}?action=sync`);
        const data = await res.json();
        if(data.success && data.users){
            tbody.innerHTML = data.users.map(u=>`<tr class="hover:bg-white/5"><td class="p-3">${u.uid}</td><td class="p-3">${u.email}</td><td class="p-3 text-right"><button onclick="approveUser('${u.uid}')" class="bg-blue-600 px-3 py-1 rounded-xl text-[10px] font-black">Verify</button></td></tr>`).join('');
        } else { tbody.innerHTML='<tr><td colspan="3" class="p-5 text-center opacity-30 italic">No users found</td></tr>'; }
    }catch(e){ tbody.innerHTML=`<tr><td colspan="3" class="p-5 text-center text-red-500">Fetch error</td></tr>`; }
}

async function approveUser(uid){
    try{
        const res = await fetch(`${WEB_APP_URL}?action=approve&payload=${encodeURIComponent(JSON.stringify({uid}))}`);
        const data = await res.json();
        if(data.success) fetchRegistry();
        else alert(data.msg||"Failed to approve");
    }catch(e){ alert("Error: "+e.message); }
}

async function postAnnouncement(){
    const text = document.getElementById('announcementText').value.trim();
    if(!text){ alert("Enter message"); return; }
    const session = JSON.parse(localStorage.getItem('rida_session'));
    try{
        const res = await fetch(`${WEB_APP_URL}?action=postAnnouncement&payload=${encodeURIComponent(JSON.stringify({uid:session.uid,text}))}`);
        const data = await res.json();
        if(data.success){ alert("Broadcast sent!"); document.getElementById('announcementText').value=""; }
        else alert(data.msg||"Failed to broadcast");
    }catch(e){ alert("Error: "+e.message); }
}

window.onload = renderView;
</script>
</body>
  </html>
