<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RIDA NETWORK v12.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <style>
        body { background: #050508; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); border-radius: 28px; }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #a855f7); border-radius: 18px; font-weight: 700; transition: 0.3s; shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3); }
        .btn-primary:active { transform: scale(0.96); }
        .btn-primary:disabled { opacity: 0.4; filter: grayscale(1); cursor: not-allowed; }
        .page { display: none; padding-bottom: 120px; animation: slideUp 0.4s ease-out; }
        .active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item { color: #64748b; font-size: 10px; font-weight: 800; text-transform: uppercase; transition: 0.2s; }
        .nav-active { color: #6366f1; transform: translateY(-2px); }
        .badge-v { background: rgba(34, 197, 94, 0.1); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.2); font-size: 10px; padding: 2px 10px; border-radius: 8px; font-weight: 800; }
        .badge-u { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); font-size: 10px; padding: 2px 10px; border-radius: 8px; font-weight: 800; }
        #txList::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="p-4">

    <div id="authPage" class="min-h-screen flex flex-col justify-center max-w-md mx-auto">
        <div class="flex justify-center mb-6">
            <img src="logo.png" alt="RIDA Logo" class="w-28 h-28 rounded-3xl shadow-2xl border border-indigo-500/20">
        </div>
        <h1 class="text-5xl font-extrabold mb-8 text-center tracking-tighter">RIDA<span class="text-indigo-500">.</span></h1>
        <div class="glass p-8 space-y-4">
            <div id="regInputs" class="hidden space-y-4">
                <input id="uName" type="text" placeholder="Full Name" class="w-full p-4 bg-white/5 rounded-xl border border-white/10 outline-none focus:border-indigo-500/50">
                <input id="uRef" type="text" placeholder="Referral Code (Optional)" class="w-full p-4 bg-white/5 rounded-xl border border-white/10 outline-none">
            </div>
            <input id="uEmail" type="email" placeholder="Email Address" class="w-full p-4 bg-white/5 rounded-xl border border-white/10 outline-none focus:border-indigo-500/50">
            <input id="uPass" type="password" placeholder="Password" class="w-full p-4 bg-white/5 rounded-xl border border-white/10 outline-none focus:border-indigo-500/50">
            <button onclick="handleAuth()" class="w-full py-5 btn-primary uppercase tracking-widest text-sm">Connect Node</button>
            <p id="toggleText" onclick="toggleAuth()" class="text-center text-xs text-slate-500 cursor-pointer pt-2 font-bold uppercase tracking-tighter">New node? Create Identity</p>
        </div>
    </div>

    <div id="mainApp" class="hidden max-w-md mx-auto">
        <header class="flex justify-between items-center mb-8 px-2">
            <div>
                <div class="flex items-center gap-2 mb-1">
                    <h2 id="viewName" class="font-extrabold text-xl tracking-tight text-white">---</h2>
                    <span id="viewStatus" class="badge-u italic">PENDING</span>
                </div>
                <p id="viewUid" class="text-[10px] text-indigo-400 font-black tracking-widest uppercase">---</p>
            </div>
            <div class="text-right">
                <p id="viewBal" class="text-3xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-white to-indigo-400">0.00</p>
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">RIDA Balance</p>
            </div>
        </header>

        <div id="page-home" class="page active space-y-6">
            <div id="latestAnn" class="glass p-5 border-l-4 border-indigo-500 bg-indigo-500/5">
                <span class="text-[9px] font-black uppercase text-indigo-400 tracking-widest">Broadcast</span>
                <p id="annText" class="text-xs text-slate-200 mt-1 leading-relaxed italic">Synchronizing network protocols...</p>
            </div>

            <div class="glass p-12 flex flex-col items-center justify-center space-y-8 text-center shadow-2xl relative overflow-hidden">
                <div id="miningPulse" class="absolute w-64 h-64 border border-indigo-500/20 rounded-full animate-ping opacity-0"></div>
                <div class="relative w-48 h-48 flex items-center justify-center border-4 border-white/5 rounded-full bg-white/5 shadow-inner">
                    <div class="text-center">
                        <span id="mineTimer" class="text-5xl font-black text-white">0.20</span>
                        <p class="text-[10px] text-indigo-400 font-black uppercase tracking-[0.2em] mt-2">Daily Yield</p>
                    </div>
                </div>
                <button id="mineBtn" onclick="processMining()" class="w-full py-5 btn-primary uppercase text-xs tracking-widest">Initialize Node</button>
                <p id="timerLabel" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest italic">Node Status: Standby</p>
            </div>
        </div>

        <div id="page-profile" class="page space-y-6">
            <div class="glass p-6 space-y-5 border-t-4 border-indigo-500">
                <div class="flex justify-between items-center">
                    <h3 class="text-xs font-black uppercase tracking-widest text-indigo-400">Secure Transfer</h3>
                    <span class="text-[9px] text-slate-500 font-bold">MIN: 10 RIDA</span>
                </div>
                <div class="space-y-3">
                    <input id="p2pTarget" type="text" placeholder="Receiver UID (RIDA-XXXX)" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs font-bold text-indigo-300">
                    <input id="p2pAmount" type="number" placeholder="Amount" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs font-bold">
                    <button onclick="processP2P()" class="w-full py-4 btn-primary text-[11px] uppercase font-black tracking-widest">Execute P2P Transfer</button>
                </div>
            </div>

            <div class="glass p-6 space-y-4">
                <h3 class="text-xs font-black uppercase tracking-widest text-indigo-400">Asset Ledger</h3>
                <div id="txList" class="space-y-3 max-h-72 overflow-y-auto">
                    <p class="text-[10px] text-slate-600 text-center py-6 font-bold uppercase italic tracking-widest">No active ledger history</p>
                </div>
            </div>

            <div class="glass p-6">
                <h3 class="text-xs font-black uppercase tracking-widest text-indigo-400 mb-4">Node Invitation</h3>
                <div class="relative">
                    <input id="refLink" readonly class="bg-black/40 p-4 rounded-2xl text-[10px] w-full outline-none font-bold text-indigo-300 border border-white/5">
                    <button onclick="copyRef()" class="absolute right-3 top-1/2 -translate-y-1/2 text-[10px] font-black text-indigo-500 uppercase px-2 py-1 bg-white/5 rounded-lg">Copy</button>
                </div>
            </div>

            <div class="glass p-6 space-y-4">
                <h3 class="text-xs font-black uppercase tracking-widest text-indigo-400">Direct Support</h3>
                <div id="chatBox" class="h-48 overflow-y-auto space-y-4 p-2 text-[11px] border-y border-white/5 py-4"></div>
                <div class="flex gap-2">
                    <input id="chatInp" type="text" placeholder="Encrypted message..." class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs">
                    <button onclick="sendMsg()" class="px-6 btn-primary text-[10px] font-black">SEND</button>
                </div>
            </div>
            <button onclick="logout()" class="w-full text-center text-[10px] text-red-500/40 font-black uppercase py-4 tracking-widest">Terminate Session</button>
        </div>

        <div id="page-admin" class="page space-y-6">
            <div class="glass p-6 space-y-4 border-t-4 border-red-500">
                <h2 class="text-xs font-black text-red-400 uppercase tracking-widest italic">Global Admin Override</h2>
                <textarea id="adminAnnInp" placeholder="New announcement text..." class="w-full bg-black/40 p-4 rounded-2xl text-xs outline-none border border-white/10 h-24 focus:border-red-500/50"></textarea>
                <button onclick="postAnnouncement()" class="w-full py-4 btn-primary text-[10px] uppercase font-black tracking-widest">Push Broadcast</button>
            </div>
            <div id="adminChatHub" class="space-y-4"></div>
        </div>

        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md glass flex justify-around p-4 z-50 shadow-2xl border border-white/10">
            <button onclick="switchTab('home', this)" class="nav-item nav-active flex flex-col items-center">
                <span class="text-2xl mb-1">⚡</span><span>Node</span>
            </button>
            <button onclick="switchTab('profile', this)" class="nav-item flex flex-col items-center">
                <span class="text-2xl mb-1">💼</span><span>Asset</span>
            </button>
            <button id="adminTab" onclick="switchTab('admin', this)" class="nav-item hidden flex flex-col items-center">
                <span class="text-2xl mb-1">🛑</span><span>Admin</span>
            </button>
        </nav>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxWPL4bAsFi7rajiAo4RN62x_FBzqghQy2a3yL8BppGKKa2JID7Dc4NjorSojs9RQpxpQ/exec";
        let user = JSON.parse(localStorage.getItem('rida_v12_6'));
        let allAnnouncements = [];
        let transactions = [];

        window.onload = () => { 
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('ref')) sessionStorage.setItem('pendingRef', urlParams.get('ref'));
            if(user) { sync(); setInterval(sync, 25000); } 
        };

        function sync() {
            call('sync', { email: user.email, uid: user.uid }, (res) => {
                if(res.success) {
                    user = res.user;
                    allAnnouncements = res.announcements || [];
                    transactions = res.transactions || [];
                    localStorage.setItem('rida_v12_6', JSON.stringify(user));
                    renderUI();
                } else logout();
            });
        }

        function renderUI() {
            document.getElementById('authPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('viewName').innerText = user.name;
            document.getElementById('viewUid').innerText = user.uid;
            document.getElementById('viewBal').innerText = parseFloat(user.bal).toFixed(2);
            document.getElementById('refLink').value = `${window.location.origin + window.location.pathname}?ref=${user.uid}`;
            
            const badge = document.getElementById('viewStatus');
            if(String(user.verified).toUpperCase() === "TRUE") { 
                badge.className = "badge-v"; badge.innerText = "VERIFIED"; 
            } else { 
                badge.className = "badge-u"; badge.innerText = "UNVERIFIED"; 
            }
            
            if(user.role === "ADMIN") document.getElementById('adminTab').classList.remove('hidden');
            if(allAnnouncements.length > 0) document.getElementById('annText').innerText = allAnnouncements[0][1];
            
            const txBox = document.getElementById('txList');
            if(transactions.length > 0) {
                txBox.innerHTML = transactions.map(t => {
                    const isOut = t.from === user.uid;
                    const color = isOut ? 'text-red-400' : 'text-green-400';
                    const party = isOut ? t.to : t.from;
                    return `
                        <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/5">
                            <div>
                                <p class="text-[9px] font-black uppercase text-indigo-400 mb-1">${t.type}</p>
                                <p class="text-[10px] font-bold opacity-60">${isOut ? 'TO:' : 'FROM:'} ${party}</p>
                            </div>
                            <div class="text-right">
                                <p class="font-black ${color}">${isOut ? '-' : '+'}${parseFloat(t.amt).toFixed(2)}</p>
                                <p class="text-[8px] opacity-30 mt-1">${new Date(t.date).toLocaleDateString()}</p>
                            </div>
                        </div>`;
                }).join('');
            }

            checkMiningStatus(); loadChat();
            if(user.role === "ADMIN") loadAdminChats();
        }

        function processP2P() {
            if(String(user.verified).toUpperCase() !== "TRUE") return alert("NODE RESTRICTED: Only Verified nodes can broadcast transfers.");
            const target = document.getElementById('p2pTarget').value;
            const amount = document.getElementById('p2pAmount').value;
            if(!target || !amount) return alert("Missing transfer parameters.");
            if(confirm(`Confirm transfer of ${amount} RIDA to ${target}?`)) {
                call('p2p', { senderUid: user.uid, targetUid: target, amount: amount }, (res) => {
                    alert(res.msg);
                    if(res.success) { sync(); document.getElementById('p2pTarget').value = ""; document.getElementById('p2pAmount').value = ""; }
                });
            }
        }

        function checkMiningStatus() {
            const btn = document.getElementById('mineBtn'); const pulse = document.getElementById('miningPulse'); const label = document.getElementById('timerLabel');
            if(user.lastMine > 0) {
                const diff = new Date().getTime() - user.lastMine;
                if(diff < 86400000) { 
                    pulse.classList.add('opacity-100'); btn.disabled = true; updateCountdown(86400000 - diff); label.innerText = "Node Extraction Active"; 
                } else { 
                    pulse.classList.remove('opacity-100'); btn.innerText = "Claim 0.2 RIDA"; btn.disabled = false; btn.onclick = claim; label.innerText = "Yield ready for harvest"; 
                }
            } else { 
                btn.innerText = "Initialize Node"; btn.disabled = false; btn.onclick = processMining; label.innerText = "Node Standby"; 
            }
        }

        function updateCountdown(ms) {
            const btn = document.getElementById('mineBtn');
            const interval = setInterval(() => { 
                ms -= 1000; if(ms <= 0) { clearInterval(interval); sync(); return; }
                const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000), s = Math.floor((ms%60000)/1000);
                btn.innerText = `READY IN ${h}H ${m}M ${s}S`;
            }, 1000);
        }

        function processMining() { call('startMining', { uid: user.uid }, () => { sync(); }); }
        function claim() { call('claimMining', { uid: user.uid }, (res) => { if(res.success) sync(); }); }
        
        function loadChat() {
            call('getMessages', { uid: user.uid }, (res) => {
                if(!res.history) return;
                document.getElementById('chatBox').innerHTML = res.history.map(m => `
                    <div class="${m.sender === 'ADMIN' ? 'pr-8' : 'pl-8'}">
                        <div class="p-3 rounded-2xl ${m.sender === 'ADMIN' ? 'bg-indigo-500/20 rounded-tl-none' : 'bg-white/5 rounded-tr-none text-right'}">
                            <p class="text-[8px] font-black uppercase tracking-widest text-indigo-400 mb-1">${m.sender}</p>
                            <p class="font-bold text-slate-200">${m.text}</p>
                        </div>
                    </div>`).join('');
                const b = document.getElementById('chatBox'); b.scrollTop = b.scrollHeight;
            });
        }

        function sendMsg() {
            const t = document.getElementById('chatInp').value; if(!t) return;
            call('sendMessage', { uid: user.uid, sender: user.name, text: t }, () => { document.getElementById('chatInp').value = ""; loadChat(); });
        }

        function loadAdminChats() {
            call('getMessages', { isAdmin: true }, (res) => {
                if(!res.history) return;
                const groups = {}; res.history.forEach(m => { if(!groups[m.uid]) groups[m.uid] = []; groups[m.uid].push(m); });
                document.getElementById('adminChatHub').innerHTML = Object.entries(groups).map(([uid, msgs]) => {
                    const isVerified = msgs.some(m => m.isVerified === "TRUE");
                    return `
                    <div class="glass p-5 space-y-3 text-[10px] border border-white/5">
                        <p class="font-black text-indigo-400 tracking-widest uppercase">Node ID: ${uid}</p>
                        <div class="max-h-32 overflow-y-auto space-y-2 bg-black/40 p-3 rounded-xl border border-white/5">
                            ${msgs.map(m => `<div><b class="text-indigo-300 uppercase text-[8px]">${m.sender}:</b> <span class="font-medium">${m.text}</span></div>`).join('')}
                        </div>
                        <div class="flex gap-2 pt-1">
                            <input id="reply-${uid}" placeholder="Response..." class="w-full bg-black/50 p-3 rounded-xl outline-none border border-white/10 text-xs">
                            <button onclick="adminReply('${uid}')" class="bg-indigo-600 px-4 rounded-xl font-black uppercase text-[9px]">Reply</button>
                            ${isVerified ? 
                                `<button class="bg-green-600/20 text-green-400 border border-green-500/20 px-4 rounded-xl font-black uppercase text-[9px] cursor-default">Verified</button>` :
                                `<button id="vbtn-${uid}" onclick="adminVerify('${uid}')" class="bg-green-600 px-4 rounded-xl font-black uppercase text-[9px]">Verify</button>`
                            }
                        </div>
                    </div>`;
                }).join('');
            });
        }

        function adminReply(target) { const v = document.getElementById('reply-'+target).value; if(!v) return; call('sendMessage', { uid: target, sender: "ADMIN", text: v }, () => loadAdminChats()); }
        function adminVerify(target) { if(confirm("Authorize this node for transfers?")) call('adminAction', { targetUid: target, type: 'verify' }, () => { sync(); loadAdminChats(); }); }
        
        function handleAuth() {
            let isR = !document.getElementById('regInputs').classList.contains('hidden');
            const e = document.getElementById('uEmail').value, p = document.getElementById('uPass').value;
            const refCode = sessionStorage.getItem('pendingRef') || document.getElementById('uRef').value || "none";
            call(isR ? 'register' : 'login', { email: e, pass: p, name: do
