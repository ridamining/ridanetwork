<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIDA OS | MASTER</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #010409; color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
  .glass { background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.05); }
  .hidden { display: none !important; }
  .btn { transition: all 0.2s ease; cursor:pointer; }
  .btn:hover { opacity: 0.9; transform: scale(1.02); }
</style>
</head>
<body class="pb-10">

<!-- LOGIN VIEW -->
<div id="loginView" class="min-h-screen flex items-center justify-center p-6">
  <div class="glass w-full max-w-sm p-10 rounded-[3.5rem] text-center border-t border-white/10 shadow-2xl">
    <h1 class="text-5xl font-black italic text-blue-500 mb-2">RIDA</h1>
    <p class="text-[8px] font-black opacity-30 uppercase tracking-[0.5em] mb-12">Neural Link v32.0</p>
    <div class="space-y-4">
      <input type="email" id="email" class="w-full bg-white/5 p-5 rounded-2xl border border-white/5 outline-none text-sm focus:border-blue-500" placeholder="Email Address">
      <input type="password" id="pass" class="w-full bg-white/5 p-5 rounded-2xl border border-white/5 outline-none text-sm focus:border-blue-500" placeholder="Access Key">
      <button onclick="handleLogin()" class="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl btn">Initialize</button>
      <button onclick="showRegister()" class="w-full py-3 rounded-2xl border border-blue-500 font-bold text-[9px] tracking-widest btn">Register</button>
    </div>
  </div>
</div>

<!-- REGISTER VIEW -->
<div id="registerView" class="hidden min-h-screen flex items-center justify-center p-6">
  <div class="glass w-full max-w-sm p-10 rounded-[3.5rem] text-center border-t border-white/10 shadow-2xl">
    <h1 class="text-4xl font-black text-blue-500 mb-4">Register</h1>
    <div class="space-y-4">
      <input type="text" id="r_name" class="w-full bg-white/5 p-4 rounded-2xl border border-white/5 outline-none text-sm focus:border-blue-500" placeholder="Full Name">
      <input type="email" id="r_email" class="w-full bg-white/5 p-4 rounded-2xl border border-white/5 outline-none text-sm focus:border-blue-500" placeholder="Email Address">
      <input type="password" id="r_pass" class="w-full bg-white/5 p-4 rounded-2xl border border-white/5 outline-none text-sm focus:border-blue-500" placeholder="Access Key">
      <button onclick="handleRegister()" class="w-full bg-green-600 py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl btn">Create Account</button>
      <button onclick="showLogin()" class="w-full py-3 rounded-2xl border border-blue-500 font-bold text-[9px] tracking-widest btn">Back to Login</button>
    </div>
  </div>
</div>

<!-- USER DASHBOARD -->
<div id="userApp" class="hidden min-h-screen p-6">
  <header class="p-6 flex justify-between items-center glass rounded-b-[2.5rem]">
    <h2 class="text-xl font-black italic">RIDA <span class="text-blue-500 text-sm">MINER</span></h2>
    <button onclick="logout()" class="p-3 bg-white/5 rounded-2xl text-slate-400"><i data-lucide="log-out"></i></button>
  </header>
  <main class="p-6 text-center space-y-6">
    <div class="glass p-12 rounded-[4rem] border-t border-white/10 mt-10">
      <p class="text-[10px] opacity-30 uppercase mb-2">Network Yield</p>
      <h2 class="text-5xl font-black mb-10 tracking-tighter"><span id="uBal">0.000000</span></h2>
      <button onclick="startMining()" class="w-full py-6 rounded-3xl bg-blue-600 font-black uppercase text-[10px] tracking-widest shadow-xl btn">Start Mining</button>
    </div>
    <div class="glass p-6 rounded-[2rem] border border-white/5">
      <h3 class="font-black mb-3 uppercase text-[10px] opacity-40 tracking-widest">Your UID</h3>
      <p id="uID" class="font-bold text-blue-400 text-sm"></p>
    </div>
  </main>
</div>

<!-- ADMIN DASHBOARD -->
<div id="adminPanel" class="hidden p-6 space-y-6">
  <header class="flex justify-between items-center glass p-6 rounded-[2.5rem] border-blue-500 border shadow-lg">
    <div>
      <h2 class="text-xl font-black text-blue-500 italic uppercase">Command Center</h2>
      <p class="text-[8px] opacity-40 font-bold tracking-widest">Master Node Status: Active</p>
    </div>
    <button onclick="logout()" class="p-3 bg-red-500/10 rounded-2xl text-red-500"><i data-lucide="power"></i></button>
  </header>

  <button onclick="fetchRegistry()" class="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg btn">Sync Cloud Registry</button>

  <div class="glass rounded-[2rem] overflow-hidden border border-white/5">
    <div class="p-5 border-b border-white/5 bg-white/5 text-[10px] font-black uppercase tracking-widest opacity-50">Global User Database</div>
    <div class="overflow-x-auto">
      <table class="w-full text-left text-[11px]">
        <thead class="bg-black/20 text-slate-500 uppercase font-bold">
          <tr><th class="p-4">Node / ID</th><th class="p-4">Status</th><th class="p-4 text-right">Action</th></tr>
        </thead>
        <tbody id="registryBody" class="divide-y divide-white/5">
          <tr><td colspan="3" class="p-10 text-center opacity-30 italic">Registry Pending Sync...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="glass p-6 rounded-[2rem] border border-white/5 mt-6">
    <h3 class="font-black mb-3 uppercase text-[10px] opacity-40 tracking-widest">Broadcast Announcement</h3>
    <textarea id="announcementText" class="w-full p-4 rounded-xl bg-white/5 text-sm outline-none border border-white/5" placeholder="Type announcement here..."></textarea>
    <button onclick="sendAnnouncement()" class="mt-3 w-full py-4 rounded-2xl bg-green-600 font-black uppercase text-[10px] tracking-widest shadow-xl btn">Post Announcement</button>
  </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzVzQ3WkMcDY69MIGuOG-xQlc5tlxe4RfEbiMWWn7446IM0rYSMFgX9FdRh9q8YCPj6CQ/exec";

function showRegister(){ document.getElementById('loginView').classList.add('hidden'); document.getElementById('registerView').classList.remove('hidden'); }
function showLogin(){ document.getElementById('registerView').classList.add('hidden'); document.getElementById('loginView').classList.remove('hidden'); }

async function handleLogin(){
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('pass').value.trim();
  if(!email || !pass) return alert("All fields required.");
  
  const payload = { email, pass };
  const res = await fetch(`${WEB_APP_URL}?action=login&payload=${encodeURIComponent(JSON.stringify(payload))}`);
  const data = await res.json();
  if(!data.success) return alert(data.msg || "Login failed.");

  localStorage.setItem('rida_session', JSON.stringify(data.user));
  renderView();
}

async function handleRegister(){
  const name = document.getElementById('r_name').value.trim();
  const email = document.getElementById('r_email').value.trim();
  const pass = document.getElementById('r_pass').value.trim();
  if(!name || !email || !pass) return alert("All fields required.");

  const payload = { name, email, pass };
  const res = await fetch(`${WEB_APP_URL}?action=register&payload=${encodeURIComponent(JSON.stringify(payload))}`);
  const data = await res.json();
  if(!data.success) return alert(data.msg || "Register failed.");
  alert("Registration Successful! UID: "+data.uid);
  showLogin();
}

function logout(){ localStorage.clear(); location.reload(); }

async function renderView(){
  const session = JSON.parse(localStorage.getItem('rida_session'));
  document.getElementById('loginView').classList.add('hidden');
  document.getElementById('registerView').classList.add('hidden');
  document.getElementById('userApp').classList.add('hidden');
  document.getElementById('adminPanel').classList.add('hidden');

  if(!session) { document.getElementById('loginView').classList.remove('hidden'); return; }
  if(session.role === 'ADMIN'){ document.getElementById('adminPanel').classList.remove('hidden'); fetchRegistry(); }
  else{ 
    document.getElementById('userApp').classList.remove('hidden'); 
    document.getElementById('uBal').innerText = (session.balance||0).toFixed(6);
    document.getElementById('uID').innerText = session.uid;
  }
  lucide.createIcons();
}

async function startMining(){
  const session = JSON.parse(localStorage.getItem('rida_session'));
  if(!session) return alert("Login first.");
  const payload = { uid: session.uid };
  const res = await fetch(`${WEB_APP_URL}?action=startMining&payload=${encodeURIComponent(JSON.stringify(payload))}`);
  const data = await res.json();
  if(!data.success) return alert(data.msg || "Mining failed.");
  session.balance = data.balance;
  localStorage.setItem('rida_session', JSON.stringify(session));
  document.getElementById('uBal').innerText = data.balance.toFixed(6);
  alert("Mining Successful! +0.2 RIDA");
}

async function fetchRegistry(){
  const body = document.getElementById('registryBody');
  body.innerHTML = `<tr><td colspan="3" class="p-10 text-center opacity-30 italic">Syncing...</td></tr>`;
  const res = await fetch(`${WEB_APP_URL}?action=sync`);
  const data = await res.json();
  if(!data.success){ body.innerHTML = `<tr><td colspan="3">Failed to fetch registry</td></tr>`; return; }

  body.innerHTML = data.users.map(u=>`
    <tr class="hover:bg-white/5 transition-colors">
      <td class="p-4 font-bold text-blue-400">${u.uid}<br><span class="text-[8px] opacity-20 font-normal lowercase">${u.email}</span></td>
      <td class="p-4"><span class="px-2 py-1 rounded-lg bg-blue-600/10 text-[9px] font-black uppercase text-blue-500 border border-blue-500/20">${u.verified}</span></td>
      <td class="p-4 text-right"><button onclick="approveUser('${u.uid}')" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-xl text-[9px] font-black uppercase btn">Verify</button></td>
    </tr>
  `).join('');
}

async function approveUser(uid){
  const payload = { uid };
  const res = await fetch(`${WEB_APP_URL}?action=approveUser&payload=${encodeURIComponent(JSON.stringify(payload))}`);
  const data = await res.json();
  if(!data.success) return alert(data.msg || "Approve failed.");
  alert("User verified: "+uid);
  fetchRegistry();
}

async function sendAnnouncement(){
  const session = JSON.parse(localStorage.getItem('rida_session'));
  const text = document.getElementById('announcementText').value.trim();
  if(!text) return alert("Enter announcement text.");
  const payload = { uid: session.uid, text };
  const res = await fetch(`${WEB_APP_URL}?action=postAnnouncement&payload=${encodeURIComponent(JSON.stringify(payload))}`);
  const data = await res.json();
  if(!data.success) return alert(data.msg || "Announcement failed.");
  alert("Announcement posted!");
  document.getElementById('announcementText').value = '';
}

window.onload = renderView;
</script>
</body>
</html>
