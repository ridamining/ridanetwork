<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rida Network | V10.0 Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap');
        body { background: #020617; color: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-prime { background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%); transition: 0.2s; border: none; }
        .btn-prime:active { transform: scale(0.95); opacity: 0.9; }
        .hidden { display: none; }
        .nav-active { color: #38bdf8 !important; filter: drop-shadow(0 0 8px #38bdf8); }
        .section { height: calc(100vh - 180px); overflow-y: auto; padding-bottom: 100px; scrollbar-width: none; }
        .section::-webkit-scrollbar { display: none; }
        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(1.4); opacity: 0; } }
        .mining-active { position: relative; }
        .mining-active::after { content: ''; position: absolute; inset: -10px; border: 2px solid #38bdf8; border-radius: 50%; animation: pulse-ring 2s infinite; }
    </style>
</head>
<body class="max-w-md mx-auto relative border-x border-white/5">

    <div id="loader" class="fixed inset-0 z-[100] bg-black/90 flex flex-col items-center justify-center hidden">
        <div class="w-12 h-12 border-4 border-sky-500/20 border-t-sky-500 rounded-full animate-spin mb-4"></div>
        <p class="text-[10px] font-bold tracking-[0.4em] text-sky-400 uppercase">Verifying Node</p>
    </div>

    <div id="auth-scr" class="h-full p-8 flex flex-col justify-center">
        <div class="text-center mb-12">
            <h1 class="text-7xl font-black italic tracking-tighter">RIDA<span class="text-sky-400">.</span></h1>
            <p class="text-slate-500 text-[10px] font-bold tracking-[0.3em] uppercase mt-2">Decentralized Simulation</p>
        </div>
        
        <div id="login-box" class="glass p-8 rounded-[2.5rem] space-y-4">
            <input type="email" id="l-email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none text-sm">
            <input type="password" id="l-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none text-sm">
            <button onclick="auth('login')" class="w-full btn-prime p-4 rounded-2xl font-bold uppercase tracking-widest text-xs">Access Terminal</button>
            <p class="text-center text-[11px] text-slate-500">New Miner? <span class="text-sky-400 font-bold cursor-pointer" onclick="toggleAuth(true)">Register</span></p>
        </div>

        <div id="reg-box" class="glass p-8 rounded-[2.5rem] space-y-4 hidden">
            <input type="text" id="r-user" placeholder="Username" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none text-sm">
            <input type="email" id="r-email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none text-sm">
            <input type="password" id="r-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none text-sm">
            <button onclick="auth('register')" class="w-full btn-prime p-4 rounded-2xl font-bold uppercase tracking-widest text-xs">Create Node</button>
            <p class="text-center text-[11px] text-slate-500"><span class="text-sky-400 font-bold cursor-pointer" onclick="toggleAuth(false)">Return</span></p>
        </div>
    </div>

    <div id="app-scr" class="h-full hidden flex flex-col">
        <header class="p-8 flex justify-between items-center">
            <div>
                <p id="u-uid" class="text-sky-500 text-[9px] font-bold tracking-widest uppercase">---</p>
                <h2 id="u-name" class="text-2xl font-black italic uppercase tracking-tighter">Miner</h2>
            </div>
            <div id="adm-badge" class="hidden px-3 py-1 bg-red-500/10 border border-red-500/20 rounded-full text-[8px] font-black text-red-500 uppercase">Admin</div>
        </header>

        <main class="flex-1 px-8">
            <div id="sec-home" class="section space-y-6">
                <div class="glass p-8 rounded-[2.5rem] border-sky-500/20">
                    <p class="text-white/40 text-[10px] font-bold uppercase tracking-widest mb-1">Available Balance</p>
                    <h1 id="u-bal" class="text-5xl font-black tabular-nums tracking-tighter">0.000000</h1>
                    <div id="u-v-tag" class="mt-4 text-[9px] font-bold uppercase flex items-center gap-2"></div>
                </div>

                <div class="glass p-10 rounded-[3rem] text-center">
                    <div id="m-off">
                        <button onclick="startMining()" class="w-32 h-32 rounded-full btn-prime shadow-2xl mx-auto flex items-center justify-center">
                            <i class="fas fa-hammer text-3xl"></i>
                        </button>
                        <p class="mt-6 font-bold text-slate-400 uppercase text-[10px] tracking-[0.2em]">Initialize Mining</p>
                    </div>
                    <div id="m-on" class="hidden">
                        <div class="w-32 h-32 rounded-full border-2 border-sky-400 mx-auto flex items-center justify-center mining-active">
                            <i class="fas fa-bolt text-3xl text-sky-400 animate-pulse"></i>
                        </div>
                        <p id="timer" class="mt-6 font-mono text-3xl font-black text-sky-400">24:00:00</p>
                    </div>
                </div>
            </div>

            <div id="sec-news" class="section hidden space-y-4">
                <h3 class="text-xl font-black italic uppercase">Broadcasts</h3>
                <div id="news-feed" class="space-y-4"></div>
            </div>

            <div id="sec-chat" class="section hidden flex flex-col h-full">
                <h3 class="text-xl font-black italic uppercase mb-4">Support Hub</h3>
                <div id="chat-win" class="flex-1 glass rounded-3xl p-4 overflow-y-auto space-y-3 mb-4 text-xs"></div>
                <div class="flex gap-2 mb-24">
                    <input type="text" id="chat-in" placeholder="Message..." class="flex-1 bg-white/5 p-4 rounded-2xl border border-white/10 outline-none text-sm">
                    <button onclick="sendMsg()" class="btn-prime px-6 rounded-2xl"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>

            <div id="sec-admin" class="section hidden space-y-6">
                <div class="flex justify-between items-center">
                    <h3 class="text-xl font-black italic text-red-500">Terminal Control</h3>
                    <button onclick="adminPost()" class="text-[10px] text-sky-400 font-bold uppercase underline">Post News</button>
                </div>
                <div id="admin-list" class="space-y-2"></div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 h-24 glass flex justify-around items-center px-6 rounded-t-[2.5rem] z-50">
            <i onclick="go('home', this)" class="nav-btn fas fa-home text-xl nav-active cursor-pointer"></i>
            <i onclick="go('news', this)" class="nav-btn fas fa-newspaper text-xl text-slate-600 cursor-pointer"></i>
            <i onclick="go('chat', this)" class="nav-btn fas fa-comments text-xl text-slate-600 cursor-pointer"></i>
            <i onclick="go('admin', this)" id="nav-adm" class="nav-btn fas fa-user-shield text-xl text-slate-600 hidden cursor-pointer"></i>
            <i onclick="logout()" class="fas fa-power-off text-xl text-red-500/20 cursor-pointer"></i>
        </nav>
    </div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbz3JJ-cenrZ_jjwcf-okm1_IO36eDUTaMKdDNuzizqMNbRHa8MxLkxKQAXBadRlbfTI/exec';
        let user = JSON.parse(localStorage.getItem('rida_v10_user')) || null;
        let ticker;

        window.onload = () => { if(user) startApp(); };

        async function auth(action) {
            loading(true);
            const data = action === 'login' ? 
                { action, email: document.getElementById('l-email').value, password: document.getElementById('l-pass').value } :
                { action, username: document.getElementById('r-user').value, email: document.getElementById('r-email').value, password: document.getElementById('r-pass').value };
            
            try {
                const res = await (await fetch(API, { method: 'POST', body: JSON.stringify(data) })).json();
                if(res.success) {
                    if(action === 'login') {
                        user = res.data;
                        localStorage.setItem('rida_v10_user', JSON.stringify(user));
                        startApp();
                    } else { alert("Registration Complete!"); toggleAuth(false); }
                } else alert(res.msg);
            } catch(e) { alert("Node Connection Failed"); }
            loading(false);
        }

        function startApp() {
            document.getElementById('auth-scr').classList.add('hidden');
            document.getElementById('app-scr').classList.remove('hidden');
            document.getElementById('u-name').innerText = user.username;
            document.getElementById('u-uid').innerText = "UID: " + user.uid;
            if(user.role === 'Admin') {
                document.getElementById('adm-badge').classList.remove('hidden');
                document.getElementById('nav-adm').classList.remove('hidden');
            }
            sync();
        }

        async function sync() {
            try {
                const res = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getDashboard', uid: user.uid }) })).json();
                if(res.success) {
                    const d = res.data;
                    document.getElementById('u-v-tag').innerHTML = d.verified === 'Yes' ? 
                        '<i class="fas fa-check-circle text-green-400"></i> Verified Node' : 
                        '<i class="fas fa-times-circle text-red-400"></i> Unverified';
                    
                    if(d.miningStatus === 'Active') {
                        runTicker(d.balance, d.lastMiningTime);
                        runTimer(d.lastMiningTime);
                    } else {
                        document.getElementById('u-bal').innerText = parseFloat(d.balance).toFixed(6);
                        document.getElementById('m-off').classList.remove('hidden');
                        document.getElementById('m-on').classList.add('hidden');
                    }
                }
            } catch(e) { console.error("Sync error"); }
        }

        function runTicker(base, start) {
            if(ticker) clearInterval(ticker);
            ticker = setInterval(() => {
                const elapsed = (Date.now() - parseInt(start)) / 1000;
                const earned = elapsed * (0.1 / 86400); 
                document.getElementById('u-bal').innerText = (parseFloat(base) + earned).toFixed(6);
            }, 1000);
        }

        function runTimer(start) {
            document.getElementById('m-off').classList.add('hidden');
            document.getElementById('m-on').classList.remove('hidden');
            const timerInt = setInterval(() => {
                const rem = 86400000 - (Date.now() - parseInt(start));
                if(rem <= 0) { clearInterval(timerInt); sync(); }
                const h = Math.floor(rem/3600000).toString().padStart(2,'0');
                const m = Math.floor((rem%3600000)/60000).toString().padStart(2,'0');
                const s = Math.floor((rem%60000)/1000).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        async function startMining() {
            loading(true);
            const res = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'startMining', uid: user.uid }) })).json();
            if(res.success) sync();
            else alert(res.msg);
            loading(false);
        }

        async function loadNews() {
            const res = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getAnnouncements' }) })).json();
            document.getElementById('news-feed').innerHTML = res.data.map(n => `
                <div class="glass p-5 rounded-[2rem]">
                    <p class="text-[9px] text-sky-400 font-bold mb-1 uppercase">${new Date(n[0]).toLocaleDateString()}</p>
                    <p class="text-xs text-slate-300">${n[1]}</p>
                </div>
            `).join('');
        }

        async function loadChat() {
            const res = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getMessages', uid: user.uid }) })).json();
            const win = document.getElementById('chat-win');
            win.innerHTML = res.data.map(m => `
                <div class="flex ${m[0] === user.uid ? 'justify-end' : 'justify-start'}">
                    <div class="px-4 py-2 rounded-2xl ${m[0] === user.uid ? 'btn-prime text-white font-bold' : 'glass border-white/10'}">
                        ${m[2]}
                    </div>
                </div>
            `).join('');
            win.scrollTop = win.scrollHeight;
        }

        async function sendMsg() {
            const input = document.getElementById('chat-in');
            if(!input.value) return;
            await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'sendMessage', uid: user.uid, message: input.value }) });
            input.value = ''; loadChat();
        }

        async function loadAdmin() {
            const res = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'adminGetUsers' }) })).json();
            document.getElementById('admin-list').innerHTML = res.data.map(u => `
                <div class="bg-white/5 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                    <div><p class="text-xs font-bold uppercase tracking-tighter">${u.username}</p><p class="text-[8px] text-slate-500">${u.uid}</p></div>
                    <p class="text-xs font-black text-sky-400">${parseFloat(u.balance).toFixed(2)}</p>
                </div>
            `).join('');
        }

        function adminPost() {
            const m = prompt("Enter announcement:");
            if(m) fetch(API, { method: 'POST', body: JSON.stringify({ action: 'broadcast', message: m }) }).then(() => loadNews());
        }

        function go(scr, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + scr).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('nav-active', 'text-slate-600'));
            if(el) el.classList.add('nav-active');
            if(scr === 'news') loadNews();
            if(scr === 'chat') loadChat();
            if(scr === 'admin') loadAdmin();
        }

        function toggleAuth(reg) {
            document.getElementById('login-box').classList.toggle('hidden', reg);
            document.getElementById('reg-box').classList.toggle('hidden', !reg);
        }
        function loading(s) { document.getElementById('loader').classList.toggle('hidden', !s); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
                    </html>
