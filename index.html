<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIDA NETWORK</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap" rel="stylesheet">
<style>
body{background:#050508;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;margin:0;padding:0;}
.glass{background:rgba(255,255,255,0.03);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:20px;margin:10px 0;}
.btn-primary{background:linear-gradient(135deg,#6366f1,#a855f7);border-radius:16px;font-weight:700;padding:15px;width:100%;cursor:pointer;transition:.2s;}
.btn-primary:active{transform:scale(0.95);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.page{display:none;}
.active{display:block;}
.nav-item{color:#64748b;font-size:10px;font-weight:800;text-transform:uppercase;cursor:pointer;}
.nav-active{color:#6366f1;}
.badge-v{background:rgba(34,197,94,.1);color:#22c55e;border:1px solid rgba(34,197,94,.2);font-size:9px;padding:2px 8px;border-radius:6px;}
.badge-u{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2);font-size:9px;padding:2px 8px;border-radius:6px;}
input{width:100%;padding:12px;border-radius:12px;border:none;background:rgba(255,255,255,0.05);color:#fff;margin-bottom:10px;outline:none;}
</style>
</head>
<body>

<!-- Login/Register Page -->
<div id="authPage" class="page active">
  <h1 style="text-align:center;margin-bottom:20px;">RIDA NETWORK</h1>
  <div class="glass">
    <input id="uName" placeholder="Full Name (Register only)">
    <input id="uEmail" placeholder="Email">
    <input id="uPass" type="password" placeholder="Password">
    <button class="btn-primary" id="authBtn">Login / Register</button>
    <p id="authMsg" style="color:#f87171;font-size:12px;margin-top:8px;"></p>
  </div>
</div>

<!-- Main App Page -->
<div id="mainApp" class="page">
  <h2 id="userName">---</h2>
  <p id="userEmail">---</p>
  <p id="userRole">---</p>
  <p>Balance: <span id="userBal">0</span> RIDA</p>
  <button class="btn-primary" id="startMine">Start Mining</button>
  <h3>P2P Transfer</h3>
  <input id="p2pTo" placeholder="Receiver UID">
  <input id="p2pAmount" type="number" placeholder="Amount">
  <button class="btn-primary" id="sendP2P">Send</button>
  <div id="announcements" class="glass"></div>
  <button class="btn-primary" id="logoutBtn" style="background:red;">Logout</button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzJK41PueHcl5QVMdMU4mp9vuDkEPMnMRbuC5x_vaSbpzRCnI4OaER5-kTnZkTZ4wuCXQ/exec";
let currentUser = null;

function callAPI(action, payload){
  return new Promise((resolve)=>{
    const cb = "cb"+Date.now();
    window[cb] = function(res){ resolve(res); delete window[cb]; }
    const url = `${API_URL}?action=${action}&payload=${encodeURIComponent(JSON.stringify(payload))}&callback=${cb}`;
    const s = document.createElement("script");
    s.src = url;
    document.body.appendChild(s);
    s.onload = ()=>document.body.removeChild(s);
  });
}

// Login/Register
document.getElementById("authBtn").onclick = async ()=>{
  const email = document.getElementById("uEmail").value.trim();
  const pass = document.getElementById("uPass").value.trim();
  const name = document.getElementById("uName").value.trim();
  let res;
  if(name) res = await callAPI("register",{email, pass, name});
  else res = await callAPI("login",{email, pass});
  if(res.success){
    currentUser = res.user;
    loadMainUI();
  }else{
    document.getElementById("authMsg").innerText = res.msg || "Error";
  }
};

function loadMainUI(){
  document.getElementById("authPage").style.display="none";
  document.getElementById("mainApp").style.display="block";
  document.getElementById("userName").innerText = currentUser.name;
  document.getElementById("userEmail").innerText = currentUser.email;
  document.getElementById("userRole").innerText = currentUser.role;
  document.getElementById("userBal").innerText = currentUser.bal;
  loadAnnouncements();
}

// Mining
document.getElementById("startMine").onclick = async ()=>{
  if(!currentUser) return;
  const res = await callAPI("startMining",{uid:currentUser.uid});
  if(res.success){
    currentUser.bal = parseFloat(currentUser.bal)+0.2;
    document.getElementById("userBal").innerText = currentUser.bal;
    alert("Mining successful +0.2 RIDA");
  }
};

// P2P
document.getElementById("sendP2P").onclick = async ()=>{
  const to = document.getElementById("p2pTo").value.trim();
  const amt = parseFloat(document.getElementById("p2pAmount").value);
  if(!to||!amt){alert("Invalid");return;}
  const res = await callAPI("p2pTransfer",{from:currentUser.uid, to, amount:amt});
  if(res.success){
    currentUser.bal -= amt;
    document.getElementById("userBal").innerText = currentUser.bal;
    alert("Transfer successful");
  }else alert(res.msg);
};

// Announcements
async function loadAnnouncements(){
  const res = await callAPI("sync",{uid:currentUser.uid});
  if(res.success) document.getElementById("announcements").innerText = "Node synced successfully.";
}

// Logout
document.getElementById("logoutBtn").onclick = ()=>{
  currentUser = null;
  document.getElementById("mainApp").style.display="none";
  document.getElementById("authPage").style.display="block";
};
</script>
</body>
</html>
