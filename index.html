<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rida Network | Node V9.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap');
        :root { --sky: #38bdf8; --bg: #020617; }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-main { background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%); transition: 0.3s; cursor: pointer; }
        .btn-main:active { transform: scale(0.95); }
        .hidden { display: none; }
        .nav-active { color: var(--sky) !important; filter: drop-shadow(0 0 10px var(--sky)); }
        .section { height: calc(100vh - 180px); overflow-y: auto; padding-bottom: 120px; scrollbar-width: none; }
        .section::-webkit-scrollbar { display: none; }
        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(1.3); opacity: 0; } }
        .active-ring { position: relative; }
        .active-ring::after { content: ''; position: absolute; inset: -10px; border: 2px solid var(--sky); border-radius: 50%; animation: pulse-ring 2s infinite; }
    </style>
</head>
<body class="max-w-md mx-auto relative border-x border-white/5">

    <div id="loader" class="fixed inset-0 z-[100] bg-black/95 flex flex-col items-center justify-center hidden">
        <div class="w-10 h-10 border-2 border-sky-500/20 border-t-sky-500 rounded-full animate-spin mb-4"></div>
        <p class="text-[10px] font-black tracking-widest text-sky-400 uppercase">Connecting to Blockchain...</p>
    </div>

    <div id="auth-scr" class="h-full p-8 flex flex-col justify-center">
        <div class="text-center mb-10">
            <h1 class="text-7xl font-black italic tracking-tighter">RIDA<span class="text-sky-400">.</span></h1>
            <p class="text-slate-500 text-[10px] font-bold tracking-[0.4em] uppercase mt-2">Decentralized Mining Node</p>
        </div>
        
        <div id="login-box" class="glass p-8 rounded-[3rem] space-y-4">
            <input type="email" id="l-email" placeholder="Email Address" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none">
            <input type="password" id="l-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none">
            <button onclick="auth('login')" class="w-full btn-main p-4 rounded-2xl font-bold">Access Node</button>
            <p class="text-center text-xs text-slate-500 pt-2">New Miner? <span class="text-sky-400 font-bold cursor-pointer" onclick="toggleAuth(true)">Register</span></p>
        </div>

        <div id="reg-box" class="glass p-8 rounded-[3rem] space-y-4 hidden">
            <input type="text" id="r-user" placeholder="Username" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none">
            <input type="email" id="r-email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none">
            <input type="password" id="r-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none">
            <button onclick="auth('register')" class="w-full btn-main p-4 rounded-2xl font-bold">Create Account</button>
            <p class="text-center text-xs text-slate-500 pt-2"><span class="text-sky-400 font-bold cursor-pointer" onclick="toggleAuth(false)">Back to Login</span></p>
        </div>
    </div>

    <div id="app-scr" class="h-full hidden flex flex-col">
        <header class="p-8 flex justify-between items-center">
            <div>
                <p id="u-uid" class="text-sky-500 text-[9px] font-black tracking-widest uppercase">ID: ---</p>
                <h2 id="u-name" class="text-2xl font-black italic">MINER</h2>
            </div>
            <button onclick="logout()" class="text-[10px] text-red-500 font-black uppercase">Exit</button>
        </header>

        <main class="flex-1 px-8">
            <div id="sec-home" class="section space-y-6">
                <div class="glass p-8 rounded-[2.5rem] relative overflow-hidden border-sky-500/20">
                    <p class="text-white/40 text-[10px] font-bold uppercase tracking-widest mb-1">Rida Assets</p>
                    <h1 id="u-bal" class="text-5xl font-black tabular-nums tracking-tighter">0.000000</h1>
                    <div id="u-v-tag" class="mt-4 text-[9px] font-black uppercase flex items-center gap-2"></div>
                </div>

                <div class="glass p-10 rounded-[3.5rem] text-center">
                    <div id="m-off">
                        <button onclick="startMining()" class="w-32 h-32 rounded-full btn-main shadow-2xl mx-auto flex items-center justify-center">
                            <i class="fas fa-power-off text-3xl"></i>
                        </button>
                        <p class="mt-6 font-bold text-slate-400 uppercase text-xs tracking-[0.2em]">Start Session</p>
                    </div>
                    <div id="m-on" class="hidden">
                        <div class="w-32 h-32 rounded-full border-2 border-sky-400 mx-auto flex items-center justify-center active-ring">
                            <i class="fas fa-bolt text-3xl text-sky-400 animate-pulse"></i>
                        </div>
                        <p id="timer" class="mt-6 font-mono text-3xl font-black text-sky-400 tracking-widest">24:00:00</p>
                    </div>
                </div>
            </div>

            <div id="sec-news" class="section hidden space-y-5">
                <h3 class="text-2xl font-black italic">Network Broadcast</h3>
                <div id="news-feed" class="space-y-4"></div>
            </div>

            <div id="sec-chat" class="section hidden flex flex-col h-full">
                <h3 class="text-2xl font-black italic mb-4">Support</h3>
                <div id="chat-win" class="flex-1 glass rounded-[2rem] p-4 overflow-y-auto space-y-3 mb-4"></div>
                <div class="flex gap-2 mb-24">
                    <input type="text" id="chat-in" placeholder="Message..." class="flex-1 bg-white/5 p-4 rounded-2xl border border-white/10 outline-none text-sm">
                    <button onclick="sendMsg()" class="btn-main px-6 rounded-2xl"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 h-24 glass border-t border-white/10 flex justify-around items-center px-6 rounded-t-[2.5rem] z-50">
            <i onclick="go('home', this)" class="nav-btn fas fa-home text-xl nav-active cursor-pointer"></i>
            <i onclick="go('news', this)" class="nav-btn fas fa-broadcast-tower text-xl text-slate-600 cursor-pointer"></i>
            <i onclick="go('chat', this)" class="nav-btn fas fa-comment-alt text-xl text-slate-600 cursor-pointer"></i>
        </nav>
    </div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbxgl6S-SjM7_TDaV98hZo40Sw1lyDPhBiti_SpgX3yd87VeJ1tWMTUyzGfm2JfIWZJr/exec';
        let user = JSON.parse(localStorage.getItem('rida_v93_user')) || null;
        let ticker;

        window.onload = () => { if(user) startApp(); };

        async function auth(action) {
            loading(true);
            const data = action === 'login' ? 
                { action, email: document.getElementById('l-email').value, password: document.getElementById('l-pass').value } :
                { action, username: document.getElementById('r-user').value, email: document.getElementById('r-email').value, password: document.getElementById('r-pass').value };
            
            try {
                const res = await (await fetch(API, { method: 'POST', body: JSON.stringify(data) })).json();
                if(res.success) {
                    if(action === 'login') {
                        user = res.data;
                        localStorage.setItem('rida_v93_user', JSON.stringify(user));
                        startApp();
                    } else { alert("Registration Successful!"); toggleAuth(false); }
                } else alert(res.msg);
            } catch(e) { alert("API Connection Error"); }
            loading(false);
        }

        function startApp() {
            document.getElementById('auth-scr').classList.add('hidden');
            document.getElementById('app-scr').classList.remove('hidden');
            document.getElementById('u-name').innerText = user.username.toUpperCase();
            document.getElementById('u-uid').innerText = "ID: " + user.uid;
            sync();
        }

        async function sync() {
            const res = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getDashboard', uid: user.uid }) })).json();
            if(res.success) {
                const d = res.data;
                const tag = document.getElementById('u-v-tag');
                if(d.verified === 'Yes') {
                    tag.innerHTML = '<i class="fas fa-check-circle text-green-400"></i> <span class="text-green-400">Verified Node</span>';
                } else {
                    tag.innerHTML = '<i class="fas fa-times-circle text-red-400"></i> <span class="text-red-400">Unverified Node</span>';
                }

                if(d.miningStatus === 'Active') {
                    runTicker(d.balance, d.lastMiningTime);
                    runTimer(d.lastMiningTime);
                } else {
                    document.getElementById('u-bal').innerText = parseFloat(d.balance).toFixed(6);
                }
            }
        }

        function runTicker(base, startTime) {
            if(ticker) clearInterval(ticker);
            ticker = setInterval(() => {
                const elapsedSeconds = (Date.now() - parseInt(startTime)) / 1000;
                const earned = elapsedSeconds * (0.2 / 86400); // 0.2 RIDA per day
                document.getElementById('u-bal').innerText = (parseFloat(base) + earned).toFixed(6);
            }, 1000);
        }

        function runTimer(startTime) {
            document.getElementById('m-off').classList.add('hidden');
            document.getElementById('m-on').classList.remove('hidden');
            const timerObj = setInterval(() => {
                const remaining = 86400000 - (Date.now() - parseInt(startTime));
                if(remaining <= 0) { clearInterval(timerObj); location.reload(); }
                const h = Math.floor(remaining/3600000).toString().padStart(2,'0');
                const m = Math.floor((remaining%3600000)/60000).toString().padStart(2,'0');
                const s = Math.floor((remaining%60000)/1000).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        async function startMining() {
            loading(true);
            await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'startMining', uid: user.uid }) });
            location.reload();
        }

        async function loadNews() {
            const res = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getAnnouncements' }) })).json();
            document.getElementById('news-feed').innerHTML = res.data.map(n => `
                <div class="glass p-5 rounded-[2rem]">
                    <p class="text-[9px] text-sky-400 font-bold mb-1 uppercase">${new Date(n[0]).toLocaleDateString()}</p>
                    <p class="text-sm text-slate-200">${n[1]}</p>
                </div>
            `).join('');
        }

        async function loadChat() {
            const res = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getMessages', uid: user.uid }) })).json();
            const win = document.getElementById('chat-win');
            win.innerHTML = res.data.map(m => `
                <div class="flex ${m[0] === user.uid ? 'justify-end' : 'justify-start'}">
                    <div class="max-w-[80%] px-4 py-2 rounded-2xl text-xs ${m[0] === user.uid ? 'bg-sky-500 text-black font-bold' : 'glass'}">
                        ${m[2]}
                    </div>
                </div>
            `).join('');
            win.scrollTop = win.scrollHeight;
        }

        async function sendMsg() {
            const inp = document.getElementById('chat-in');
            if(!inp.value) return;
            const msg = inp.value; inp.value = '';
            await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'sendMessage', uid: user.uid, message: msg }) });
            loadChat();
        }

        function go(scr, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + scr).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('nav-active', 'text-slate-600'));
            if(el) el.classList.add('nav-active');
            if(scr === 'news') loadNews();
            if(scr === 'chat') loadChat();
        }

        function toggleAuth(isReg) {
            document.getElementById('login-box').classList.toggle('hidden', isReg);
            document.getElementById('reg-box').classList.toggle('hidden', !isReg);
        }
        function loading(s) { document.getElementById('loader').classList.toggle('hidden', !s); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
