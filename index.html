<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rida Network - Backend Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: linear-gradient(180deg, #0a0a0a, #111113); 
            color: white; 
        }
        .title-font { font-family: 'Space Grotesk', sans-serif; }
        .neon { text-shadow: 0 0 20px #00ff9d; }
        .glass { 
            background: rgba(20, 25, 40, 0.95); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(0, 255, 157, 0.2); 
        }
    </style>
</head>
<body class="min-h-screen p-6">

    <div class="max-w-2xl mx-auto">

        <!-- Header -->
        <div class="flex justify-center items-center gap-4 mb-10">
            <div class="w-12 h-12 bg-[#00ff9d] text-black font-bold text-5xl flex items-center justify-center rounded-2xl rotate-12">R</div>
            <h1 class="title-font text-5xl font-bold neon">RIDA NETWORK</h1>
        </div>

        <div class="glass rounded-3xl p-8 mb-8">
            <h2 class="text-2xl font-semibold mb-6 text-center">Backend Connection Test</h2>
            
            <button onclick="testConnection()" 
                    class="w-full py-6 bg-yellow-400 hover:bg-yellow-300 text-black font-bold text-xl rounded-3xl mb-6 flex items-center justify-center gap-3">
                <i class="fa-solid fa-plug"></i>
                TEST BACKEND CONNECTION
            </button>

            <div id="status" class="text-center text-sm font-medium min-h-[80px] p-4 rounded-2xl bg-black/30"></div>
        </div>

        <!-- Login Test -->
        <div class="glass rounded-3xl p-8">
            <h2 class="text-2xl font-semibold mb-6 text-center">Login Test</h2>
            <input id="email" type="email" placeholder="Email (any)" 
                   class="w-full mb-4 bg-[#1a1a1f] border border-white/10 rounded-3xl px-6 py-5 text-lg">
            <input id="password" type="password" placeholder="Password (any)" 
                   class="w-full mb-8 bg-[#1a1a1f] border border-white/10 rounded-3xl px-6 py-5 text-lg">
            <button onclick="performLogin()" 
                    class="w-full py-6 bg-[#00ff9d] text-black font-bold rounded-3xl text-xl">
                PERFORM LOGIN TEST
            </button>
        </div>

        <p class="text-center text-white/50 text-xs mt-10">
            Your test backend URL:<br>
            <span class="font-mono break-all text-[10px]">https://script.google.com/macros/s/AKfycbybp9LYJuU1pl_MQb-y5l-hcv1qpsaxBfPp2rF-QJnd2vceNLIw3hCR_iWSQ70WdHZo2g/exec</span>
        </p>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbybp9LYJuU1pl_MQb-y5l-hcv1qpsaxBfPp2rF-QJnd2vceNLIw3hCR_iWSQ70WdHZo2g/exec";

        async function testConnection() {
            const status = document.getElementById("status");
            status.innerHTML = `<span class="text-yellow-400">Connecting to backend...</span>`;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "text/plain;charset=utf-8"   // Important fix for GAS CORS
                    },
                    body: JSON.stringify({
                        action: "login",
                        email: "test@rida.com",
                        password: "123456"
                    })
                });

                const text = await response.text();
                console.log("Raw backend response:", text);

                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    data = { success: false, error: "Invalid JSON response" };
                }

                if (data.success) {
                    status.innerHTML = `<span class="text-green-400">✅ Backend Connected Successfully!</span><br><small class="text-white/70">You can now proceed to full UI</small>`;
                    alert("Success! Backend is working correctly.\n\nYou can now use the full beautiful UI.");
                } else {
                    status.innerHTML = `<span class="text-red-400">❌ ${data.error || 'Failed'}</span>`;
                }
            } catch (err) {
                console.error(err);
                status.innerHTML = `<span class="text-red-400">❌ Connection Error: ${err.message}</span>`;
            }
        }

        async function performLogin() {
            const email = document.getElementById("email").value.trim() || "test@rida.com";
            const password = document.getElementById("password").value || "123456";

            const status = document.getElementById("status");
            status.innerHTML = `<span class="text-yellow-400">Sending login request...</span>`;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ action: "login", email, password })
                });

                const data = await response.json();
                if (data.success) {
                    status.innerHTML = `<span class="text-green-400">✅ Login Test Successful!</span>`;
                    alert("Login test passed!\n\nBackend is responding correctly.");
                } else {
                    status.innerHTML = `<span class="text-red-400">Login failed: ${data.error || 'Unknown'}</span>`;
                }
            } catch (err) {
                status.innerHTML = `<span class="text-red-400">Error: ${err.message}</span>`;
            }
        }

        // Auto test on load
        window.onload = () => {
            console.log("%cRida Network Test Frontend Loaded", "color:#00ff9d; font-size:14px");
            // Optional: auto test after 1 second
            // setTimeout(testConnection, 800);
        };
    </script>
</body>
</html>
