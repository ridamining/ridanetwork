<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f0c29; color: white; font-family: sans-serif; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #673ab7; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-6">

    <div id="authBox" class="block space-y-6 pt-10">
        <h1 class="text-3xl font-bold text-center italic">RIDA <span class="text-purple-500">NETWORK</span></h1>
        <div class="glass p-6 space-y-4">
            <div id="regOnly" class="hidden"><input id="uName" type="text" placeholder="Full Name" class="w-full p-4 bg-slate-800 rounded-xl outline-none"></div>
            <input id="uEmail" type="email" placeholder="Email" class="w-full p-4 bg-slate-800 rounded-xl outline-none">
            <input id="uPass" type="password" placeholder="Password" class="w-full p-4 bg-slate-800 rounded-xl outline-none">
            <button onclick="runAuth()" id="btnText" class="w-full py-4 bg-purple-600 rounded-xl font-bold">LOGIN</button>
            <p id="status" class="text-center text-xs text-red-400"></p>
            <p onclick="toggleMode()" id="toggle" class="text-center text-sm text-cyan-400 cursor-pointer">Need an account? Register</p>
        </div>
    </div>

    <div id="mainApp" class="hidden space-y-6">
        <div class="flex justify-between items-center">
            <h2 id="hello" class="font-bold">Miner</h2>
            <div class="text-right text-emerald-400 font-bold"><span id="bal">0.00</span> RIDA</div>
        </div>
        <div class="glass p-10 text-center space-y-6">
            <div class="text-4xl font-mono text-emerald-400" id="counter">0.00000000</div>
            <button id="mineBtn" onclick="mine()" class="px-10 py-4 bg-purple-600 rounded-full font-bold">START MINING</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwZbBQejZauENymXM1JIY7dEyo0qVgWh6dQ2nSwY-H-E-UYhV23l1bTYsczIE73k3JFgA/exec";
        let isReg = false;
        let user = null;

        function toggleMode() {
            isReg = !isReg;
            document.getElementById('regOnly').style.display = isReg ? 'block' : 'none';
            document.getElementById('btnText').innerText = isReg ? 'CREATE ACCOUNT' : 'LOGIN';
        }

        // THE ENGINE: This reaches out to your Google Sheet and WAITS for an answer
        function serverRequest(action, payload, callback) {
            const loader = '<span class="loader"></span> Connecting...';
            document.getElementById('status').innerHTML = loader;
            
            const script = document.createElement('script');
            const funcName = 'jsonp_' + Math.round(Math.random() * 1000000);
            
            window[funcName] = (data) => {
                delete window[funcName];
                document.body.removeChild(script);
                callback(data);
            };

            script.src = `${SCRIPT_URL}?callback=${funcName}&action=${action}&payload=${encodeURIComponent(JSON.stringify(payload))}`;
            document.body.appendChild(script);
        }

        function runAuth() {
            const email = document.getElementById('uEmail').value;
            const pass = document.getElementById('uPass').value;
            const name = document.getElementById('uName').value;
            const action = isReg ? 'register' : 'login';

            serverRequest(action, { email, pass, name }, (res) => {
                if (res.success) {
                    if(isReg) {
                        alert("Account Created! You can now login.");
                        toggleMode();
                        document.getElementById('status').innerText = "";
                    } else {
                        user = res.user;
                        document.getElementById('hello').innerText = user.name;
                        document.getElementById('bal').innerText = parseFloat(user.bal).toFixed(2);
                        document.getElementById('authBox').classList.add('hidden');
                        document.getElementById('mainApp').classList.remove('hidden');
                    }
                } else {
                    document.getElementById('status').innerText = res.msg || "Error!";
                }
            });
        }

        function mine() {
            const btn = document.getElementById('mineBtn');
            btn.disabled = true;
            btn.innerText = "MINING...";
            
            serverRequest('startMining', { uid: user.uid }, (res) => {
                let current = 0;
                setInterval(() => {
                    current += (0.1 / 86400);
                    document.getElementById('counter').innerText = current.toFixed(8);
                }, 1000);
            });
        }
    </script>
</body>
</html>
