<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RIDA NETWORK v11.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #050508; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #a855f7); border-radius: 16px; font-weight: 700; transition: 0.2s; }
        .btn-primary:active { transform: scale(0.95); }
        .btn-primary:disabled { opacity: 0.5; filter: grayscale(1); }
        .page { display: none; padding-bottom: 120px; animation: fadeIn 0.3s ease-in-out; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-item { color: #64748b; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .nav-active { color: #6366f1; }
        .badge-v { background: rgba(34, 197, 94, 0.1); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.2); font-size: 9px; padding: 2px 8px; border-radius: 6px; }
        .badge-u { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); font-size: 9px; padding: 2px 8px; border-radius: 6px; }
    </style>
</head>
<body class="p-4">

    <div id="authPage" class="min-h-screen flex flex-col justify-center max-w-md mx-auto">
        <h1 class="text-5xl font-extrabold mb-8 text-center tracking-tighter">RIDA<span class="text-indigo-500">.</span></h1>
        <div class="glass p-8 space-y-4">
            <div id="regInputs" class="hidden">
                <input id="uName" type="text" placeholder="Full Name" class="w-full p-4 bg-white/5 rounded-xl border border-white/10 outline-none">
                <input id="uRef" type="text" placeholder="Referral Code (Optional)" class="w-full p-4 bg-white/5 rounded-xl border border-white/10 outline-none mt-4">
            </div>
            <input id="uEmail" type="email" placeholder="Email" class="w-full p-4 bg-white/5 rounded-xl border border-white/10 outline-none">
            <input id="uPass" type="password" placeholder="Password" class="w-full p-4 bg-white/5 rounded-xl border border-white/10 outline-none">
            <button onclick="handleAuth()" class="w-full py-4 btn-primary uppercase tracking-widest text-sm">Connect Node</button>
            <p id="toggleText" onclick="toggleAuth()" class="text-center text-xs text-slate-500 cursor-pointer pt-2">New user? Register account</p>
        </div>
    </div>

    <div id="mainApp" class="hidden max-w-md mx-auto">
        <header class="flex justify-between items-center mb-6 px-2">
            <div>
                <div class="flex items-center gap-2">
                    <h2 id="viewName" class="font-bold text-lg">---</h2>
                    <span id="viewStatus" class="badge-u">Unverified</span>
                </div>
                <p id="viewUid" class="text-xs text-indigo-400 font-mono font-bold">---</p>
            </div>
            <div class="text-right">
                <p id="viewBal" class="text-3xl font-extrabold tracking-tighter">0.00</p>
                <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">RIDA Asset</p>
            </div>
        </header>

        <div id="page-home" class="page active space-y-6">
            <div id="latestAnn" class="glass p-4 border-l-4 border-indigo-500 relative overflow-hidden">
                <div class="flex justify-between items-start mb-1">
                    <span class="text-[9px] font-black uppercase text-indigo-400">Latest Update</span>
                    <button onclick="toggleAnnModal(true)" class="text-[9px] text-slate-500 underline font-bold">Archive</button>
                </div>
                <p id="annText" class="text-xs text-slate-200 line-clamp-2">No active updates...</p>
            </div>

            <div class="glass p-10 flex flex-col items-center justify-center space-y-6 text-center shadow-xl">
                <div class="relative w-52 h-52 flex items-center justify-center border-4 border-indigo-500/20 rounded-full">
                    <div id="miningPulse" class="absolute inset-0 border-4 border-indigo-500 rounded-full animate-ping opacity-0"></div>
                    <div>
                        <span id="mineTimer" class="text-4xl font-black text-indigo-400">0.20</span>
                        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">Daily Yield</p>
                    </div>
                </div>
                <button id="mineBtn" onclick="processMining()" class="w-full py-5 btn-primary uppercase text-xs tracking-widest">Initialize Mining</button>
                <p id="timerLabel" class="text-xs text-slate-400 font-medium italic">Ready for extraction</p>
            </div>
        </div>

        <div id="page-profile" class="page space-y-4">
            <div class="glass p-6 space-y-6">
                <h3 class="text-sm font-bold uppercase tracking-widest text-indigo-400">Referral Program</h3>
                <div class="bg-indigo-500/10 p-4 rounded-2xl border border-indigo-500/20">
                    <p class="text-[10px] text-indigo-300 font-bold mb-1">Your Referral Link</p>
                    <div class="flex gap-2">
                        <input id="refLink" readonly class="bg-transparent text-xs w-full outline-none font-mono" value="---">
                        <button onclick="copyRef()" class="text-[10px] font-black text-indigo-400">COPY</button>
                    </div>
                </div>
                <div class="flex justify-between text-center px-4">
                    <div><p id="viewRefCount" class="text-xl font-bold">0</p><p class="text-[9px] text-slate-500 uppercase font-bold">Invites</p></div>
                    <div><p class="text-xl font-bold">0.50</p><p class="text-[9px] text-slate-500 uppercase font-bold">Bonus/Ref</p></div>
                </div>
            </div>

            <div class="glass p-6 space-y-4">
                <h3 class="text-sm font-bold uppercase tracking-widest text-indigo-400">Support Terminal</h3>
                <div id="chatBox" class="h-64 overflow-y-auto space-y-3 p-2 text-xs border-y border-white/5 py-4"></div>
                <div class="flex gap-2">
                    <input id="chatInp" type="text" placeholder="Message Admin..." class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none text-xs">
                    <button onclick="sendMsg()" class="px-6 btn-primary text-[10px] font-black">SEND</button>
                </div>
            </div>
            <button onclick="logout()" class="w-full text-center text-[10px] text-red-500/50 font-bold uppercase tracking-[0.3em] py-4">Disconnect Node</button>
        </div>

        <div id="page-admin" class="page space-y-6">
            <div class="glass p-6 space-y-4">
                <h2 class="text-xs font-black text-indigo-400 uppercase tracking-widest">Global Announcement</h2>
                <textarea id="adminAnnInp" placeholder="Type global update..." class="w-full bg-black/30 p-4 rounded-xl text-xs outline-none border border-white/10 h-24"></textarea>
                <button onclick="postAnnouncement()" class="w-full py-3 btn-primary text-[10px] uppercase font-bold">Broadcast Update</button>
            </div>
            <h2 class="text-xs font-black text-red-500 px-2 uppercase tracking-widest">Node Verification</h2>
            <div id="adminChatHub" class="space-y-4"></div>
        </div>

        <div id="annModal" class="hidden fixed inset-0 z-[100] bg-black/90 backdrop-blur-md p-6 overflow-y-auto">
            <div class="max-w-md mx-auto">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-black italic text-indigo-500">ARCHIVE</h2>
                    <button onclick="toggleAnnModal(false)" class="text-xl p-2">✕</button>
                </div>
                <div id="annArchiveList" class="space-y-4"></div>
            </div>
        </div>

        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md glass flex justify-around p-4 z-50">
            <button onclick="switchTab('home', this)" class="nav-item nav-active flex flex-col items-center">
                <span class="text-xl mb-1">⚡</span><span>Mine</span>
            </button>
            <button onclick="switchTab('profile', this)" class="nav-item flex flex-col items-center">
                <span class="text-xl mb-1">👤</span><span>Profile</span>
            </button>
            <button id="adminTab" onclick="switchTab('admin', this)" class="nav-item hidden flex flex-col items-center">
                <span class="text-xl mb-1">⚙️</span><span>Admin</span>
            </button>
        </nav>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbybl0oedgRXxrKvEBcQifMGs18ew5WN4Pb7mdk5oqo2lm5f8iz60xVpL5Zy6mV9aeDWvw/exec";
        let user = JSON.parse(localStorage.getItem('rida_v11'));
        let allAnnouncements = [];

        window.onload = () => { 
            // Automatic referral capture from URL
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('ref')) {
                sessionStorage.setItem('pendingRef', urlParams.get('ref'));
            }
            if(user) { sync(); setInterval(sync, 30000); } 
        };

        function sync() {
            call('sync', { email: user.email }, (res) => {
                if(res.success) {
                    user = res.user;
                    allAnnouncements = res.announcements || [];
                    localStorage.setItem('rida_v11', JSON.stringify(user));
                    renderUI();
                } else logout();
            });
        }

        function renderUI() {
            document.getElementById('authPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            
            document.getElementById('viewName').innerText = user.name;
            document.getElementById('viewUid').innerText = user.uid;
            document.getElementById('viewBal').innerText = parseFloat(user.bal).toFixed(2);
            document.getElementById('viewRefCount').innerText = user.refCount;
            
            // AUTOMATIC LINK GENERATION
            const currentUrl = window.location.origin + window.location.pathname;
            document.getElementById('refLink').value = `${currentUrl}?ref=${user.uid}`;
            
            const badge = document.getElementById('viewStatus');
            if(String(user.verified).toUpperCase() === "TRUE") { badge.className = "badge-v"; badge.innerText = "Verified"; }
            else { badge.className = "badge-u"; badge.innerText = "Unverified"; }
            
            if(user.role === "ADMIN") document.getElementById('adminTab').classList.remove('hidden');
            if(allAnnouncements.length > 0) document.getElementById('annText').innerText = allAnnouncements[0][1];
            
            checkMiningStatus();
            loadChat();
            if(user.role === "ADMIN") loadAdminChats();
        }

        function toggleAnnModal(show) {
            const modal = document.getElementById('annModal');
            modal.classList.toggle('hidden', !show);
            if(show) {
                document.getElementById('annArchiveList').innerHTML = allAnnouncements.map(a => `
                    <div class="glass p-5 border-l-2 border-indigo-500">
                        <p class="text-[10px] text-indigo-400 font-bold mb-2 uppercase">${new Date(a[0]).toLocaleString()}</p>
                        <p class="text-sm text-slate-300 leading-relaxed">${a[1]}</p>
                    </div>
                `).join('');
            }
        }

        function postAnnouncement() {
            const text = document.getElementById('adminAnnInp').value;
            if(!text) return;
            call('postAnn', { text: text }, () => {
                alert("Broadcast Success!");
                document.getElementById('adminAnnInp').value = "";
                sync();
            });
        }

        function checkMiningStatus() {
            const btn = document.getElementById('mineBtn');
            const pulse = document.getElementById('miningPulse');
            const label = document.getElementById('timerLabel');
            if(user.lastMine > 0) {
                const diff = new Date().getTime() - user.lastMine;
                if(diff < 86400000) {
                    pulse.classList.remove('opacity-0');
                    btn.disabled = true;
                    updateCountdown(86400000 - diff);
                    label.innerText = "Mining Active";
                } else {
                    btn.innerText = "Claim 0.2 RIDA";
                    btn.disabled = false;
                    btn.onclick = claim;
                    label.innerText = "Yield ready";
                }
            } else {
                btn.innerText = "Start Mining";
                btn.disabled = false;
                btn.onclick = processMining;
                label.innerText = "Ready";
            }
        }

        function updateCountdown(ms) {
            const btn = document.getElementById('mineBtn');
            const interval = setInterval(() => {
                ms -= 1000;
                if(ms <= 0) { clearInterval(interval); sync(); return; }
                const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000), s = Math.floor((ms%60000)/1000);
                btn.innerText = `${h}h ${m}m ${s}s`;
            }, 1000);
        }

        function processMining() { call('startMining', { uid: user.uid }, () => { sync(); }); }
        function claim() { call('claimMining', { uid: user.uid }, (res) => { if(res.success) sync(); }); }

        function loadChat() {
            call('getMessages', { uid: user.uid }, (res) => {
                if(!res.history) return;
                document.getElementById('chatBox').innerHTML = res.history.map(m => `
                    <div class="p-3 rounded-2xl ${m.sender === 'ADMIN' ? 'bg-white/5 mr-8' : 'bg-indigo-500/10 ml-8 text-right'}">
                        <p class="font-bold text-[9px] mb-1 opacity-50 uppercase tracking-tighter">${m.sender}</p>
                        <p>${m.text}</p>
                    </div>
                `).join('');
                const b = document.getElementById('chatBox'); b.scrollTop = b.scrollHeight;
            });
        }

        function sendMsg() {
            const t = document.getElementById('chatInp').value;
            if(!t) return;
            call('sendMessage', { uid: user.uid, sender: user.name, text: t }, () => {
                document.getElementById('chatInp').value = ""; loadChat();
            });
        }

        function loadAdminChats() {
            call('getMessages', { isAdmin: true }, (res) => {
                if(!res.history) return;
                const groups = {};
                res.history.forEach(m => { if(!groups[m.uid]) groups[m.uid] = []; groups[m.uid].push(m); });
                document.getElementById('adminChatHub').innerHTML = Object.entries(groups).map(([uid, msgs]) => `
                    <div class="glass p-5 space-y-3">
                        <p class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Node: ${uid}</p>
                        <div class="max-h-32 overflow-y-auto space-y-2 text-[10px] opacity-70">${msgs.map(m => `<div><b class="text-white">${m.sender}:</b> ${m.text}</div>`).join('')}</div>
                        <div class="flex gap-2">
                            <input id="reply-${uid}" placeholder="..." class="w-full bg-black/30 p-2 rounded-lg text-xs border border-white/5 outline-none">
                            <button onclick="adminReply('${uid}')" class="bg-indigo-500 px-4 rounded-lg text-[10px] font-bold uppercase">Reply</button>
                            <button onclick="adminVerify('${uid}')" class="bg-green-600 px-4 rounded-lg text-[10px] font-bold uppercase">Verify</button>
                        </div>
                    </div>
                `).join('');
            });
        }

        function adminReply(target) {
            const v = document.getElementById('reply-'+target).value;
            if(!v) return;
            call('sendMessage', { uid: target, sender: "ADMIN", text: v }, () => loadAdminChats());
        }

        function adminVerify(target) {
            if(confirm("Verify node?")) call('adminAction', { targetUid: target, type: 'verify' }, () => { alert('Verified!'); sync(); });
        }

        function handleAuth() {
            let isR = !document.getElementById('regInputs').classList.contains('hidden');
            const e = document.getElementById('uEmail').value, p = document.getElementById('uPass').value;
            const refCode = sessionStorage.getItem('pendingRef') || document.getElementById('uRef').value || "none";
            const pay = { email: e, pass: p, name: document.getElementById('uName').value, ref: refCode };
            call(isR ? 'register' : 'login', pay, (res) => {
                if(res.success) {
                    if(isR) { alert("Registered!"); toggleAuth(); }
                    else { user = res.user; localStorage.setItem('rida_v11', JSON.stringify(user)); sync(); }
                } else alert(res.msg || "Auth Failed");
            });
        }

        function toggleAuth() { 
            const ri = document.getElementById('regInputs');
            const hidden = ri.classList.toggle('hidden');
            document.getElementById('toggleText').innerText = hidden ? "New user? Register account" : "Existing node? Login";
            // Pre-fill referral if exists
            if(!hidden && sessionStorage.getItem('pendingRef')) {
                document.getElementById('uRef').value = sessionStorage.getItem('pendingRef');
            }
        }

        function switchTab(t, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + t).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
            el.classList.add('nav-active');
        }

        function call(action, payload, callback) {
            const cb = 'cb_' + Math.round(Math.random()*10000);
            window[cb] = (d) => { delete window[cb]; document.body.removeChild(s); callback(d); };
            const s = document.createElement('script');
            s.src = `${API}?callback=${cb}&action=${action}&payload=${encodeURIComponent(JSON.stringify(payload))}`;
            document.body.appendChild(s);
        }

        function copyRef() {
            const link = document.getElementById('refLink');
            link.select();
            document.execCommand('copy');
            alert("Copied!");
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
                            </html>
