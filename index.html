<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rida Network | Mobile Miner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #38bdf8;
            --secondary: #818cf8;
            --dark: #070b14;
        }
        body { 
            background: var(--dark); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .rida-btn { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); transition: all 0.2s; }
        .rida-btn:active { transform: scale(0.96); opacity: 0.9; }
        .hidden { display: none; }
        .mining-pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.5); transform: scale(1); }
            70% { box-shadow: 0 0 0 20px rgba(56, 189, 248, 0); transform: scale(1.02); }
            100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); transform: scale(1); }
        }
        input::placeholder { color: rgba(255,255,255,0.3); }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen relative border-x border-white/5">

    <div id="loader" class="fixed inset-0 z-[100] bg-black/90 flex items-center justify-center hidden">
        <div class="flex flex-col items-center">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-sky-500 mb-4"></div>
            <p class="text-sky-400 font-bold text-xs tracking-widest">CONNECTING TO RIDA...</p>
        </div>
    </div>

    <div id="screen-auth" class="p-8 pt-20 animate-in fade-in duration-700">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-black tracking-tighter italic">RIDA<span class="text-sky-400">.</span></h1>
            <p class="text-slate-500 text-sm mt-2 font-medium tracking-widest uppercase">Decentralized Mining</p>
        </div>

        <div id="box-login" class="glass p-8 rounded-[2.5rem]">
            <h2 class="text-2xl font-bold mb-6">Welcome Back</h2>
            <div class="space-y-4">
                <input type="email" id="l-email" placeholder="Email Address" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none focus:border-sky-500/50">
                <input type="password" id="l-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none focus:border-sky-500/50">
                <button onclick="handleAction('login')" class="w-full rida-btn p-4 rounded-2xl font-bold text-lg mt-2 shadow-lg shadow-sky-500/20">Sign In</button>
            </div>
            <p class="text-center mt-8 text-slate-400 text-sm">Don't have an account? <span class="text-sky-400 font-bold cursor-pointer" onclick="toggleAuth(true)">Register</span></p>
        </div>

        <div id="box-register" class="glass p-8 rounded-[2.5rem] hidden">
            <h2 class="text-2xl font-bold mb-6">Join Network</h2>
            <div class="space-y-4">
                <input type="text" id="r-user" placeholder="Username" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none">
                <input type="email" id="r-email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none">
                <input type="password" id="r-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none">
                <input type="text" id="r-ref" placeholder="Referral Code (Optional)" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none">
                <button onclick="handleAction('register')" class="w-full rida-btn p-4 rounded-2xl font-bold text-lg mt-2">Create Account</button>
            </div>
            <p class="text-center mt-8 text-slate-400 text-sm">Already a miner? <span class="text-sky-400 font-bold cursor-pointer" onclick="toggleAuth(false)">Login</span></p>
        </div>
    </div>

    <div id="screen-app" class="hidden pb-32">
        <header class="p-8 flex justify-between items-center">
            <div>
                <p class="text-slate-500 text-[10px] font-bold tracking-widest mb-1">MINER PROFILE</p>
                <h3 id="u-display" class="text-xl font-bold">---</h3>
            </div>
            <div id="v-badge" class="px-4 py-2 rounded-full glass border-sky-500/30 text-[10px] font-black text-sky-400 tracking-tighter uppercase">
                Checking...
            </div>
        </header>

        <div class="px-8">
            <div class="rida-btn p-10 rounded-[3rem] shadow-2xl shadow-sky-500/30 relative overflow-hidden">
                <i class="fas fa-cube absolute -right-4 -bottom-4 text-8xl opacity-10"></i>
                <p class="text-white/60 text-xs font-bold mb-1">ESTIMATED BALANCE</p>
                <div class="flex items-baseline gap-2">
                    <h1 id="u-bal" class="text-5xl font-black tabular-nums">0.0000</h1>
                    <span class="text-lg font-bold opacity-80">RDA</span>
                </div>
            </div>

            <div class="mt-10 glass p-10 rounded-[3rem] text-center border-white/5">
                <div id="m-idle">
                    <button onclick="startMining()" class="w-36 h-36 rounded-full rida-btn mx-auto flex items-center justify-center shadow-2xl relative z-10">
                        <i class="fas fa-hammer text-4xl text-white"></i>
                    </button>
                    <h3 class="mt-6 text-xl font-bold">Start Mining</h3>
                    <p class="text-slate-500 text-sm mt-1 font-medium">Earn +0.20 RDA / 24h</p>
                </div>

                <div id="m-active" class="hidden">
                    <div class="w-36 h-36 rounded-full border-4 border-sky-500 mx-auto flex items-center justify-center mining-pulse bg-sky-500/5">
                        <i class="fas fa-microchip text-4xl text-sky-400"></i>
                    </div>
                    <h3 class="mt-6 text-xl font-bold text-sky-400">Mining Active</h3>
                    <p id="timer" class="mt-2 font-mono text-2xl tracking-[0.2em] font-bold">24:00:00</p>
                </div>
            </div>

            <div class="mt-6 grid grid-cols-2 gap-4">
                <div class="glass p-6 rounded-[2rem]">
                    <p class="text-slate-500 text-[10px] font-bold mb-2 uppercase">Your Code</p>
                    <p id="u-ref" class="font-bold text-sky-400 tracking-wider">---</p>
                </div>
                <div class="glass p-6 rounded-[2rem] flex items-center justify-center" onclick="logout()">
                    <i class="fas fa-power-off text-red-500/70 text-xl"></i>
                </div>
            </div>
        </div>

        <nav class="fixed bottom-8 left-8 right-8 h-20 glass rounded-[2.5rem] flex items-center justify-around px-4 border-white/10">
            <i class="fas fa-home text-sky-400 text-xl"></i>
            <i class="fas fa-wallet text-slate-600 text-xl"></i>
            <i class="fas fa-users text-slate-600 text-xl"></i>
            <i class="fas fa-gear text-slate-600 text-xl"></i>
        </nav>
    </div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbydwJRt6RqsTwbStRGuK5x-2llP2M7nNKkSAkxecqOwoRyBrJID7tj6bLdXbb-K4V3u/exec';
        let session = JSON.parse(localStorage.getItem('rida_session')) || null;
        let timerRef;

        window.onload = () => { if(session) openDashboard(); };

        function toggleAuth(showReg) {
            document.getElementById('box-login').classList.toggle('hidden', showReg);
            document.getElementById('box-register').classList.toggle('hidden', !showReg);
        }

        async function handleAction(type) {
            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');

            const payload = type === 'login' ? {
                action: 'login',
                email: document.getElementById('l-email').value,
                password: document.getElementById('l-pass').value
            } : {
                action: 'register',
                username: document.getElementById('r-user').value,
                email: document.getElementById('r-email').value,
                password: document.getElementById('r-pass').value,
                referredBy: document.getElementById('r-ref').value
            };

            try {
                const response = await fetch(API, { 
                    method: 'POST', 
                    mode: 'cors',
                    body: JSON.stringify(payload) 
                });
                const res = await response.json();

                if(res.success) {
                    if(type === 'login') {
                        session = res.data;
                        localStorage.setItem('rida_session', JSON.stringify(session));
                        openDashboard();
                    } else {
                        alert("Registration Successful! Please login.");
                        toggleAuth(false);
                    }
                } else {
                    alert(res.msg);
                }
            } catch (e) {
                alert("Network Error: Check your internet or API deployment.");
            } finally {
                loader.classList.add('hidden');
            }
        }

        function openDashboard() {
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('screen-app').classList.remove('hidden');
            document.getElementById('u-display').innerText = session.username;
            syncData();
        }

        async function syncData() {
            try {
                const r = await fetch(API, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'getDashboard', uid: session.uid }) 
                });
                const res = await r.json();
                if(res.success) {
                    const d = res.data;
                    document.getElementById('u-bal').innerText = parseFloat(d.balance).toFixed(4);
                    document.getElementById('u-ref').innerText = d.refCode;
                    document.getElementById('v-badge').innerText = d.verified === "Yes" ? "Verified" : "Unverified";
                    
                    if(d.miningStatus === "Active") {
                        runTimer(d.lastMiningTime);
                    } else {
                        document.getElementById('m-idle').classList.remove('hidden');
                        document.getElementById('m-active').classList.add('hidden');
                    }
                }
            } catch(e) { console.error("Sync Failed"); }
        }

        async function startMining() {
            document.getElementById('loader').classList.remove('hidden');
            const r = await fetch(API, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'startMining', uid: session.uid }) 
            });
            const res = await r.json();
            document.getElementById('loader').classList.add('hidden');
            if(res.success) syncData();
        }

        function runTimer(startTime) {
            document.getElementById('m-idle').classList.add('hidden');
            document.getElementById('m-active').classList.remove('hidden');
            
            if(timerRef) clearInterval(timerRef);
            
            timerRef = setInterval(() => {
                const now = Date.now();
                const diff = (24 * 60 * 60 * 1000) - (now - parseInt(startTime));
                
                if(diff <= 0) {
                    clearInterval(timerRef);
                    syncData();
                    return;
                }

                const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `${h}:${m}:${s}`;
                
                // Visual counter animation
                const balEl = document.getElementById('u-bal');
                const newVal = parseFloat(balEl.innerText) + 0.0000023; // Visual only until refresh
                balEl.innerText = newVal.toFixed(6);
            }, 1000);
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
