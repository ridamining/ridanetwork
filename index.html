<script>
var API="https://script.google.com/macros/s/AKfycbymumK9LAnF60Rt1UAyyQqKmthzK1y_qDAQOKAcF9Wj7jZmw7j3zqnPgEHPFWhUsgrOqQ/exec";

var user=null,isLogin=true;

// SAFE JSONP CALL
function api(action,data,cb){
  loader.style.display="flex";

  var callbackName = "cb" + Math.floor(Math.random()*1000000);

  window[callbackName] = function(response){
    loader.style.display="none";

    try{
      cb(response);
    }catch(e){
      alert("Response error");
    }

    delete window[callbackName];
    document.body.removeChild(script);
  };

  var script=document.createElement("script");

  // FAIL SAFE (VERY IMPORTANT)
  var timeout=setTimeout(function(){
    loader.style.display="none";
    alert("Server not responding or wrong backend format ❌");
    delete window[callbackName];
    script.remove();
  },8000);

  script.onload=function(){
    clearTimeout(timeout);
  };

  script.onerror=function(){
    clearTimeout(timeout);
    loader.style.display="none";
    alert("Network error ❌");
  };

  script.src=API+
    "?callback="+callbackName+
    "&action="+action+
    "&payload="+encodeURIComponent(JSON.stringify(data));

  document.body.appendChild(script);
}
</script>
