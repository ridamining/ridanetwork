<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rida Network | Cloud Miner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #38bdf8;
            --secondary: #818cf8;
            --bg: #070b14;
        }
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Outfit', sans-serif; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .rida-gradient { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); }
        .neon-text { text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }
        
        /* Animations */
        .mining-pulse {
            animation: pulse 2s infinite cubic-bezier(0.4, 0, 0.6, 1);
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 5px var(--primary)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 20px var(--primary)); }
        }
        .hidden { display: none; }
        input:focus { border-color: var(--primary); outline: none; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen border-x border-white/5">

    <div id="loader" class="fixed inset-0 z-[100] bg-black/90 flex flex-col items-center justify-center hidden">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-sky-400 mb-4"></div>
        <p class="text-sky-400 text-xs font-bold tracking-[0.3em] uppercase">Connecting to Rida...</p>
    </div>

    <div id="screen-auth" class="p-8 pt-20">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-black italic tracking-tighter">RIDA<span class="text-sky-400">.</span></h1>
            <p class="text-slate-500 text-xs font-bold tracking-[0.2em] mt-2 uppercase">Mining Ecosystem</p>
        </div>

        <div id="box-login" class="glass p-8 rounded-[2.5rem] shadow-2xl">
            <h2 class="text-2xl font-bold mb-6">Welcome Back</h2>
            <div class="space-y-4">
                <div class="relative">
                    <i class="fas fa-envelope absolute left-4 top-4 text-slate-500"></i>
                    <input type="email" id="l-email" placeholder="Email Address" class="w-full bg-white/5 p-4 pl-12 rounded-2xl border border-white/10">
                </div>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-4 text-slate-500"></i>
                    <input type="password" id="l-pass" placeholder="Password" class="w-full bg-white/5 p-4 pl-12 rounded-2xl border border-white/10">
                </div>
                <button onclick="handleAuth('login')" class="w-full rida-gradient p-4 rounded-2xl font-bold text-lg shadow-lg shadow-sky-500/20">Sign In</button>
            </div>
            <p class="text-center mt-8 text-slate-400 text-sm">New miner? <span class="text-sky-400 font-bold cursor-pointer" onclick="toggleAuth(true)">Register</span></p>
        </div>

        <div id="box-register" class="glass p-8 rounded-[2.5rem] hidden">
            <h2 class="text-2xl font-bold mb-6">Create Account</h2>
            <div class="space-y-4">
                <input type="text" id="r-user" placeholder="Username" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10">
                <input type="email" id="r-email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10">
                <input type="password" id="r-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10">
                <input type="text" id="r-ref" placeholder="Referral Code (Optional)" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10">
                <button onclick="handleAuth('register')" class="w-full rida-gradient p-4 rounded-2xl font-bold text-lg">Join Network</button>
            </div>
            <p class="text-center mt-8 text-slate-400 text-sm">Already a member? <span class="text-sky-400 font-bold cursor-pointer" onclick="toggleAuth(false)">Login</span></p>
        </div>
    </div>

    <div id="screen-app" class="hidden pb-32">
        <header class="p-8 flex justify-between items-center">
            <div>
                <p class="text-slate-500 text-[10px] font-bold tracking-widest mb-1">CURRENT MINER</p>
                <h3 id="u-display" class="text-xl font-bold">---</h3>
            </div>
            <div id="v-status" class="px-4 py-2 rounded-full glass border-sky-500/30 text-[10px] font-black text-sky-400 uppercase tracking-tighter">
                UNVERIFIED
            </div>
        </header>

        <div class="px-8 space-y-8">
            <div class="rida-gradient p-10 rounded-[3rem] shadow-2xl relative overflow-hidden">
                <div class="absolute -right-4 -bottom-4 opacity-10">
                    <i class="fas fa-microchip text-9xl"></i>
                </div>
                <p class="text-white/60 text-xs font-bold tracking-widest mb-1 uppercase">Total Rida</p>
                <div class="flex items-baseline gap-2">
                    <h1 id="u-bal" class="text-5xl font-black tabular-nums">0.0000</h1>
                    <span class="text-xl font-bold opacity-80 uppercase">RDA</span>
                </div>
            </div>

            <div class="glass p-10 rounded-[3.5rem] text-center">
                <div id="m-idle">
                    <button onclick="startMining()" class="w-40 h-40 rounded-full rida-gradient mx-auto flex items-center justify-center shadow-2xl active:scale-90 transition-all">
                        <i class="fas fa-hammer text-4xl"></i>
                    </button>
                    <h3 class="mt-8 text-xl font-bold">Start Session</h3>
                    <p class="text-slate-500 text-sm mt-1">Base Rate: 0.20 RDA / 24h</p>
                </div>

                <div id="m-active" class="hidden">
                    <div class="w-40 h-40 rounded-full border-4 border-sky-400 mx-auto flex items-center justify-center mining-pulse">
                        <div class="w-32 h-32 rounded-full bg-slate-900/50 flex items-center justify-center">
                            <i class="fas fa-pickaxe text-4xl text-sky-400"></i>
                        </div>
                    </div>
                    <h3 class="mt-8 text-xl font-bold text-sky-400">Mining Active</h3>
                    <p id="timer" class="mt-2 font-mono text-3xl font-black tracking-widest">24:00:00</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-6 rounded-[2rem]">
                    <p class="text-slate-500 text-[10px] font-bold mb-1 uppercase">Ref Code</p>
                    <p id="u-ref" class="font-bold text-sky-400 text-sm">---</p>
                </div>
                <div class="glass p-6 rounded-[2rem] flex items-center justify-center" onclick="logout()">
                    <i class="fas fa-sign-out-alt text-slate-500 text-xl"></i>
                </div>
            </div>
        </div>

        <nav class="fixed bottom-8 left-8 right-8 h-20 glass rounded-[2.5rem] flex items-center justify-around px-4 border-t border-white/10 z-50">
            <i class="fas fa-home text-sky-400 text-xl"></i>
            <i class="fas fa-wallet text-slate-600 text-xl"></i>
            <i class="fas fa-users text-slate-600 text-xl"></i>
            <i class="fas fa-comment-dots text-slate-600 text-xl"></i>
        </nav>
    </div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbxFL7MjbEN20PohBW7OMH5xzAPI84b6sjnm58FEm5GMudQm6HcsO0rZswE9SI09JZg/exec';
        let user = JSON.parse(localStorage.getItem('rida_v1_session')) || null;
        let timerTick;

        window.onload = () => { if(user) openApp(); };

        function toggleAuth(isReg) {
            document.getElementById('box-login').classList.toggle('hidden', isReg);
            document.getElementById('box-register').classList.toggle('hidden', !isReg);
        }

        async function handleAuth(type) {
            showLoader(true);
            const payload = type === 'login' ? 
                { action: 'login', email: document.getElementById('l-email').value, password: document.getElementById('l-pass').value } :
                { action: 'register', username: document.getElementById('r-user').value, email: document.getElementById('r-email').value, password: document.getElementById('r-pass').value, referredBy: document.getElementById('r-ref').value };

            try {
                const req = await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
                const res = await req.json();
                if(res.success) {
                    if(type === 'login') {
                        user = res.data;
                        localStorage.setItem('rida_v1_session', JSON.stringify(user));
                        openApp();
                    } else {
                        alert("Account Ready! Login now.");
                        toggleAuth(false);
                    }
                } else { alert(res.msg); }
            } catch(e) { alert("API Connection Failed"); }
            showLoader(false);
        }

        function openApp() {
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('screen-app').classList.remove('hidden');
            document.getElementById('u-display').innerText = user.username;
            fetchStats();
        }

        async function fetchStats() {
            try {
                const req = await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getDashboard', uid: user.uid }) });
                const res = await req.json();
                if(res.success) {
                    const d = res.data;
                    document.getElementById('u-bal').innerText = parseFloat(d.balance).toFixed(4);
                    document.getElementById('u-ref').innerText = d.refCode;
                    document.getElementById('v-status').innerText = d.verified === "Yes" ? "Verified" : "Unverified";
                    if(d.miningStatus === "Active") startTimer(d.lastMiningTime);
                }
            } catch(e) { console.error("Sync Error"); }
        }

        async function startMining() {
            showLoader(true);
            const req = await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'startMining', uid: user.uid }) });
            const res = await req.json();
            showLoader(false);
            if(res.success) fetchStats();
        }

        function startTimer(startTime) {
            document.getElementById('m-idle').classList.add('hidden');
            document.getElementById('m-active').classList.remove('hidden');
            if(timerTick) clearInterval(timerTick);
            
            timerTick = setInterval(() => {
                const now = Date.now();
                const rem = (24 * 60 * 60 * 1000) - (now - parseInt(startTime));
                
                if(rem <= 0) {
                    clearInterval(timerTick);
                    location.reload();
                    return;
                }

                const h = Math.floor(rem / 3600000).toString().padStart(2, '0');
                const m = Math.floor((rem % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((rem % 60000) / 1000).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `${h}:${m}:${s}`;
                
                // Live Counter: Smooth increment simulation
                const balEl = document.getElementById('u-bal');
                const current = parseFloat(balEl.innerText);
                balEl.innerText = (current + 0.0000023).toFixed(6);
            }, 1000);
        }

        function showLoader(show) { document.getElementById('loader').classList.toggle('hidden', !show); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
