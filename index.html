<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIDA OS | PRO</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
body { font-family: 'Plus Jakarta Sans', sans-serif; background:#010409; color:white; margin:0; -webkit-tap-highlight-color: transparent; }
.glass { background: rgba(13,17,23,0.9); backdrop-filter: blur(25px); border:1px solid rgba(255,255,255,0.05);}
.hidden { display:none !important; }
button:disabled { opacity:0.6; cursor:not-allowed; }
</style>
</head>
<body class="pb-10">

<!-- LOGIN VIEW -->
<div id="loginView" class="min-h-screen flex items-center justify-center p-6">
  <div class="glass w-full max-w-sm p-10 rounded-[3rem] text-center border-t border-white/10 shadow-2xl">
    <h1 class="text-5xl font-black italic text-blue-500 mb-2">RIDA</h1>
    <p class="text-[8px] font-black opacity-30 uppercase tracking-[0.5em] mb-12">Neural Link PRO</p>
    <div class="space-y-4">
      <input type="email" id="email" placeholder="Email" class="w-full bg-white/5 p-5 rounded-2xl border border-white/5 outline-none text-sm focus:border-blue-500 transition-all">
      <input type="password" id="pass" placeholder="Access Key" class="w-full bg-white/5 p-5 rounded-2xl border border-white/5 outline-none text-sm focus:border-blue-500 transition-all">
      <button onclick="handleLogin()" class="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl active:scale-95 transition-all">Initialize</button>
      <button onclick="showRegister()" class="w-full py-3 text-[10px] uppercase tracking-widest text-blue-500 underline">Create Account</button>
    </div>
  </div>
</div>

<!-- REGISTER VIEW -->
<div id="registerView" class="min-h-screen hidden flex items-center justify-center p-6">
  <div class="glass w-full max-w-sm p-10 rounded-[3rem] text-center border-t border-white/10 shadow-2xl">
    <h2 class="text-2xl font-black italic text-blue-500 mb-6">Create Account</h2>
    <div class="space-y-4">
      <input type="text" id="regName" placeholder="Full Name" class="w-full bg-white/5 p-5 rounded-2xl border border-white/5 outline-none text-sm focus:border-blue-500 transition-all">
      <input type="email" id="regEmail" placeholder="Email" class="w-full bg-white/5 p-5 rounded-2xl border border-white/5 outline-none text-sm focus:border-blue-500 transition-all">
      <input type="password" id="regPass" placeholder="Access Key" class="w-full bg-white/5 p-5 rounded-2xl border border-white/5 outline-none text-sm focus:border-blue-500 transition-all">
      <button onclick="handleRegister()" class="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl active:scale-95 transition-all">Register</button>
      <button onclick="showLogin()" class="w-full py-3 text-[10px] uppercase tracking-widest text-blue-500 underline">Back to Login</button>
    </div>
  </div>
</div>

<!-- USER DASHBOARD -->
<div id="userApp" class="hidden">
  <header class="p-6 flex justify-between items-center glass rounded-b-[2.5rem]">
    <h2 class="text-xl font-black italic">RIDA <span class="text-blue-500 text-sm">MINER</span></h2>
    <button onclick="logout()" class="p-3 bg-white/5 rounded-2xl text-slate-400"><i data-lucide="log-out"></i></button>
  </header>
  <main class="p-6 space-y-6 text-center">
    <div class="glass p-12 rounded-[4rem] border-t border-white/10 mt-10">
      <p class="text-[10px] opacity-30 uppercase mb-2">Network Yield</p>
      <h2 class="text-5xl font-black mb-10 tracking-tighter"><span id="uBal">0.000000</span></h2>
      <button id="mineBtn" onclick="startMining()" class="w-full py-6 rounded-3xl bg-blue-600/50 font-black uppercase text-[10px] tracking-widest shadow-xl">Start Mining</button>
    </div>
    <div class="glass p-5 rounded-[2rem] border border-white/5">
      <h3 class="font-black uppercase text-[10px] opacity-50 mb-2">Transfer Tokens</h3>
      <input id="toUID" placeholder="Recipient UID" class="w-full mb-2 p-3 rounded-xl bg-white/5 border border-white/10 text-[10px]">
      <input id="amount" type="number" placeholder="Amount" class="w-full mb-2 p-3 rounded-xl bg-white/5 border border-white/10 text-[10px]">
      <button onclick="transfer()" class="w-full py-3 bg-blue-600 rounded-xl text-[10px] font-black uppercase shadow-lg">Send</button>
    </div>
  </main>
</div>

<!-- ADMIN DASHBOARD -->
<div id="adminPanel" class="hidden p-6 space-y-6">
  <header class="flex justify-between items-center glass p-6 rounded-[2.5rem] border border-blue-500/20 shadow-lg">
    <div>
      <h2 class="text-xl font-black text-blue-500 italic uppercase">Command Center</h2>
      <p class="text-[8px] opacity-40 font-bold tracking-widest">Master Node Status: Active</p>
    </div>
    <button onclick="logout()" class="p-3 bg-red-500/10 rounded-2xl text-red-500"><i data-lucide="power"></i></button>
  </header>

  <button onclick="fetchRegistry()" class="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg">Sync Cloud Registry</button>

  <div class="glass rounded-[2rem] overflow-hidden border border-white/5">
    <div class="p-5 border-b border-white/5 bg-white/5 text-[10px] font-black uppercase tracking-widest opacity-50">Global User Database</div>
    <div class="overflow-x-auto">
      <table class="w-full text-left text-[11px]">
        <thead class="bg-black/20 text-slate-500 uppercase font-bold">
          <tr><th class="p-4">Node / ID</th><th class="p-4">Status</th><th class="p-4 text-right">Action</th></tr>
        </thead>
        <tbody id="registryBody" class="divide-y divide-white/5">
          <tr><td colspan="3" class="p-10 text-center opacity-30 italic">Registry Pending Sync...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="glass p-5 rounded-[2rem] border border-white/5">
    <h3 class="text-[10px] opacity-50 font-black uppercase mb-2">Broadcast Announcement</h3>
    <textarea id="annText" class="w-full p-3 rounded-xl bg-white/5 border border-white/10 text-[10px]" placeholder="Message"></textarea>
    <button onclick="broadcast()" class="w-full py-3 bg-blue-600 rounded-xl text-[10px] font-black uppercase shadow-lg">Send</button>
  </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxI8rnUobI0K9ORj_llACylYFDcqOpIkYuKrCd26Wmn1ck-Nu-gIXhU5eD3jr2dpd_eGQ/exec";

let user = null;

// JSONP helper
function api(action, payload, cb){
  const callbackName = 'cb'+Date.now();
  window[callbackName] = function(res){ cb(res); delete window[callbackName]; };
  const params = new URLSearchParams();
  params.append('action', action);
  params.append('payload', JSON.stringify(payload));
  params.append('callback', callbackName);

  const script = document.createElement('script');
  script.src = WEB_APP_URL + '?' + params.toString();
  script.onerror = ()=>cb({success:false,msg:'Script load error'});
  document.body.appendChild(script);
  script.onload = ()=>document.body.removeChild(script);
}

// LOGIN
function handleLogin(){
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('pass').value.trim();
  if(!email || !pass) return alert("All fields required");

  api('login',{email,pass},res=>{
    if(res.success){
      user = res.user;
      localStorage.setItem('rida_session',JSON.stringify(user));
      renderView();
    } else alert(res.msg);
  });
}

// REGISTER
function handleRegister(){
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass = document.getElementById('regPass').value.trim();
  if(!name || !email || !pass) return alert("All fields required");

  api('register',{name,email,pass},res=>{
    if(res.success){
      alert("Account created! Login now.");
      showLogin();
    } else alert(res.msg);
  });
}

// MINING
function startMining(){
  if(!user) return;
  const btn = document.getElementById('mineBtn');
  btn.disabled = true; btn.innerText='Mining...';
  api('startMining',{uid:user.uid},res=>{
    btn.disabled = false; btn.innerText='Start Mining';
    if(res.success){
      alert("Mining +0.2 RIDA");
      sync();
    } else alert(res.msg);
  });
}

// P2P TRANSFER
function transfer(){
  if(!user) return;
  const to = document.getElementById('toUID').value.trim();
  const amount = parseFloat(document.getElementById('amount').value);
  if(!to || !amount) return alert("Fill all fields");
  api('p2pTransfer',{from:user.uid,to,amount},res=>{
    if(res.success){
      alert("Transfer Success");
      sync();
    } else alert(res.msg);
  });
}

// ADMIN BROADCAST
function broadcast(){
  if(!user || user.role!=='ADMIN') return alert("Not authorized");
  const text = document.getElementById('annText').value.trim();
  if(!text) return alert("Enter message");
  api('postAnnouncement',{uid:user.uid,text},res=>{
    if(res.success){
      alert("Announcement sent!");
      document.getElementById('annText').value='';
    } else alert(res.msg);
  });
}

// SYNC USER
function sync(){
  if(!user) return;
  api('sync',{uid:user.uid},res=>{
    if(res.success){
      user = res.user;
      localStorage.setItem('rida_session',JSON.stringify(user));
      if(user.role==='ADMIN'){
        renderView();
      } else {
        document.getElementById('uBal').innerText=(user.bal||0).toFixed(6);
      }
    }
  });
}

// ADMIN REGISTRY
function fetchRegistry(){
  if(!user || user.role!=='ADMIN') return;
  const body = document.getElementById('registryBody');
  body.innerHTML='<tr><td colspan="3" class="p-10 text-center opacity-30 italic">Loading...</td></tr>';
  api('sync',{uid:user.uid},()=>{}); // optional: can fetch full users from backend if supported
}

// VIEW SWITCH
function renderView(){
  const session = JSON.parse(localStorage.getItem('rida_session'));
  user = session;
  document.getElementById('loginView').classList.add('hidden');
  document.getElementById('registerView').classList.add('hidden');
  document.getElementById('userApp').classList.add('hidden');
  document.getElementById('adminPanel').classList.add('hidden');

  if(!session){
    document.getElementById('loginView').classList.remove('hidden');
  } else if(session.role==='ADMIN'){
    document.getElementById('adminPanel').classList.remove('hidden');
    fetchRegistry();
  } else {
    document.getElementById('userApp').classList.remove('hidden');
    document.getElementById('uBal').innerText=(session.bal||0).toFixed(6);
  }
  lucide.createIcons();
}

function logout(){ localStorage.clear(); location.reload(); }
function showRegister(){ document.getElementById('loginView').classList.add('hidden'); document.getElementById('registerView').classList.remove('hidden'); }
function showLogin(){ document.getElementById('registerView').classList.add('hidden'); document.getElementById('loginView').classList.remove('hidden'); }

window.onload = renderView;
</script>

</body>
</html>
