<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RIDA NETWORK v13.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #050508; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #a855f7); border-radius: 16px; font-weight: 700; transition: 0.2s; }
        .btn-primary:active { transform: scale(0.95); }
        .btn-primary:disabled { opacity: 0.5; filter: grayscale(1); }
        .page { display: none; padding-bottom: 120px; animation: fadeIn 0.3s ease-in-out; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-item { color: #64748b; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .nav-active { color: #6366f1; }
        .badge-v { background: rgba(34, 197, 94, 0.1); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.2); font-size: 9px; padding: 2px 8px; border-radius: 6px; }
        .badge-u { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); font-size: 9px; padding: 2px 8px; border-radius: 6px; }
    </style>
</head>
<body class="p-4">

    <div id="authPage" class="min-h-screen flex flex-col justify-center max-w-md mx-auto">
        <h1 class="text-5xl font-extrabold mb-8 text-center tracking-tighter">RIDA<span class="text-indigo-500">.</span></h1>
        <div class="glass p-8 space-y-4">
            <div id="regInputs" class="hidden space-y-4">
                <input id="uName" type="text" placeholder="Full Name" class="w-full p-4 bg-white/5 rounded-xl border border-white/10 outline-none">
            </div>
            <input id="uEmail" type="email" placeholder="Email" class="w-full p-4 bg-white/5 rounded-xl border border-white/10 outline-none">
            <input id="uPass" type="password" placeholder="Password" class="w-full p-4 bg-white/5 rounded-xl border border-white/10 outline-none">
            <button id="authBtn" onclick="handleAuth()" class="w-full py-4 btn-primary uppercase tracking-widest text-sm">Connect Node</button>
            <p onclick="toggleAuth()" class="text-center text-xs text-slate-500 cursor-pointer pt-2 uppercase font-bold">New node? Create Identity</p>
        </div>
    </div>

    <div id="mainApp" class="hidden max-w-md mx-auto">
        <header class="flex justify-between items-center mb-6 px-2">
            <div>
                <div class="flex items-center gap-2">
                    <h2 id="viewName" class="font-bold text-lg">---</h2>
                    <span id="viewStatus" class="badge-u">PENDING</span>
                </div>
                <p id="viewUid" class="text-xs text-indigo-400 font-mono font-bold">---</p>
            </div>
            <div class="text-right">
                <p id="viewBal" class="text-3xl font-extrabold tracking-tighter">0.00</p>
                <p class="text-[9px] font-bold text-slate-500 uppercase">RIDA Asset</p>
            </div>
        </header>

        <div id="page-home" class="page active space-y-6">
            <div class="glass p-4 border-l-4 border-indigo-500">
                <span class="text-[9px] font-black uppercase text-indigo-400">Broadcast</span>
                <p id="annText" class="text-xs text-slate-200 mt-1 italic">Syncing...</p>
            </div>

            <div class="glass p-10 flex flex-col items-center justify-center space-y-6 text-center shadow-xl">
                <div class="relative w-52 h-52 flex items-center justify-center border-4 border-indigo-500/20 rounded-full">
                    <div id="miningPulse" class="absolute inset-0 border-4 border-indigo-500 rounded-full animate-ping opacity-0"></div>
                    <span id="mineTimerDisplay" class="text-4xl font-black text-indigo-400">0.20</span>
                </div>
                <button id="mineBtn" class="w-full py-5 btn-primary uppercase text-xs tracking-widest">Initialize Node</button>
            </div>
        </div>

        <div id="page-admin" class="page space-y-6">
            <div class="glass p-6 space-y-4">
                <h2 class="text-xs font-black text-indigo-400 uppercase">Broadcast Manager</h2>
                <textarea id="adminAnnInp" placeholder="Enter network update..." class="w-full bg-black/30 p-4 rounded-xl text-xs border border-white/10 h-24 outline-none text-white"></textarea>
                <button onclick="postAnnouncement()" id="annBtn" class="w-full py-3 btn-primary text-[10px] uppercase font-bold">Post Update</button>
            </div>
        </div>

        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md glass flex justify-around p-4 z-50">
            <button onclick="switchTab('home', this)" class="nav-item nav-active flex flex-col items-center">
                <span class="text-xl mb-1">⚡</span><span>Mine</span>
            </button>
            <button id="adminTab" onclick="switchTab('admin', this)" class="nav-item hidden flex flex-col items-center">
                <span class="text-xl mb-1">⚙️</span><span>Admin</span>
            </button>
            <button onclick="logout()" class="nav-item flex flex-col items-center text-red-500/50">
                <span class="text-xl mb-1">✕</span><span>Exit</span>
            </button>
        </nav>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbweEVQxqGo7ApevNBdeAb5UU-1RyKbrL45DFYugMA7i3nu4cHSOA1Q0Y43d_46l8vIX6g/exec";
        let user = JSON.parse(localStorage.getItem('rida_session')) || null;
        let mineInterval = null;

        window.onload = () => { if(user) sync(); };

        function call(action, payload, callback) {
            const cbName = 'cb_' + Math.floor(Math.random() * 100000);
            window[cbName] = (res) => {
                delete window[cbName];
                document.getElementById(cbName).remove();
                callback(res);
            };
            const script = document.createElement('script');
            script.id = cbName;
            script.src = `${API}?callback=${cbName}&action=${action}&payload=${encodeURIComponent(JSON.stringify(payload))}`;
            document.body.appendChild(script);
        }

        function sync() {
            call('sync', { email: user.email }, (res) => {
                if(res.success) {
                    user = res.user;
                    localStorage.setItem('rida_session', JSON.stringify(user));
                    renderUI(res);
                } else { logout(); }
            });
        }

        function renderUI(res) {
            document.getElementById('authPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('viewName').innerText = user.name;
            document.getElementById('viewUid').innerText = user.uid;
            document.getElementById('viewBal').innerText = parseFloat(user.bal || 0).toFixed(2);
            
            const badge = document.getElementById('viewStatus');
            if(String(user.verified).toUpperCase() === "TRUE") {
                badge.className = "badge-v"; badge.innerText = "VERIFIED";
            } else {
                badge.className = "badge-u"; badge.innerText = "PENDING";
            }

            if(user.role === "ADMIN") document.getElementById('adminTab').classList.remove('hidden');
            if(res.announcements && res.announcements.length > 0) {
                document.getElementById('annText').innerText = res.announcements[0][1];
            }
            updateMiningUI();
        }

        function updateMiningUI() {
            const btn = document.getElementById('mineBtn');
            const pulse = document.getElementById('miningPulse');
            if(mineInterval) clearInterval(mineInterval);

            const now = new Date().getTime();
            const lastMine = parseInt(user.lastMine || 0);
            const diff = now - lastMine;

            if(diff < 86400000) {
                btn.disabled = true;
                pulse.classList.add('opacity-100');
                startCountdown(86400000 - diff);
            } else {
                btn.disabled = false;
                btn.innerText = "CLAIM 0.20 RIDA";
                btn.onclick = () => call('startMining', { uid: user.uid }, sync);
                pulse.classList.remove('opacity-100');
            }
        }

        function startCountdown(ms) {
            const btn = document.getElementById('mineBtn');
            mineInterval = setInterval(() => {
                ms -= 1000;
                if(ms <= 0) { clearInterval(mineInterval); sync(); return; }
                const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000), s = Math.floor((ms%60000)/1000);
                btn.innerText = `${h}H ${m}M ${s}S`;
            }, 1000);
        }

        function handleAuth() {
            const email = document.getElementById('uEmail').value.trim();
            const pass = document.getElementById('uPass').value.trim();
            const name = document.getElementById('uName').value.trim();
            const isReg = !document.getElementById('regInputs').classList.contains('hidden');
            
            if(!email || !pass) return alert("Credentials required");
            
            document.getElementById('authBtn').innerText = "CONNECTING...";
            call(isReg ? 'register' : 'login', { email, pass, name }, (res) => {
                document.getElementById('authBtn').innerText = "CONNECT NODE";
                if(res.success) {
                    user = res.user;
                    localStorage.setItem('rida_session', JSON.stringify(user));
                    sync();
                } else { alert(res.msg || "Access Denied"); }
            });
        }

        function postAnnouncement() {
            const text = document.getElementById('adminAnnInp').value;
            if(!text) return;
            call('adminAction', { type: 'postAnnouncement', text: text }, () => {
                alert("Broadcast Sent");
                document.getElementById('adminAnnInp').value = "";
                sync();
            });
        }

        function switchTab(t) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + t).classList.add('active');
        }

        function toggleAuth() { document.getElementById('regInputs').classList.toggle('hidden'); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
