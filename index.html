<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RIDA NETWORK | DOMINION v5.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --bg: #020208; --card: rgba(15, 15, 35, 0.7); }
        body { background: var(--bg); color: #fff; font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; }
        .cyber-card { background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(0, 242, 255, 0.1); border-radius: 28px; }
        .btn-glow { background: linear-gradient(90deg, #7000ff, #00f2ff); box-shadow: 0 0 20px rgba(0, 242, 255, 0.3); transition: 0.3s; }
        .btn-glow:disabled { background: #1a1a2e; box-shadow: none; color: #444; }
        .page { display: none; padding-bottom: 120px; animation: slideUp 0.3s ease-out; }
        .active-page { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .status-tag { font-size: 8px; padding: 3px 12px; border-radius: 100px; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; }
        .nav-blur { background: rgba(2, 2, 8, 0.95); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.05); }
        #loader-overlay { background: var(--bg); z-index: 9999; }
    </style>
</head>
<body class="p-5">

    <div id="loader-overlay" class="fixed inset-0 flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 text-[10px] font-bold tracking-[0.3em] text-cyan-400">ENCRYPTING SESSION...</p>
    </div>

    <div id="authArea" class="hidden min-h-screen flex flex-col justify-center space-y-10">
        <div class="text-center">
            <h1 class="text-6xl font-black italic tracking-tighter">RIDA<span class="text-cyan-400">.</span></h1>
            <p class="text-cyan-400/50 text-[10px] uppercase tracking-[0.4em] font-bold mt-2">Dominion Protocol v5.2</p>
        </div>
        <div class="cyber-card p-8 space-y-4">
            <div id="regInputs" class="hidden"><input id="uName" type="text" placeholder="Full Name" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none"></div>
            <input id="uEmail" type="email" placeholder="Node Email" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none">
            <input id="uPass" type="password" placeholder="Access Key" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none">
            <button onclick="handleAuth()" class="w-full py-4 btn-glow rounded-2xl font-bold uppercase tracking-widest text-sm">Synchronize</button>
            <p onclick="toggleAuth()" id="toggleTxt" class="text-center text-xs text-gray-500 cursor-pointer pt-2">New user? <span class="text-cyan-400">Register</span></p>
        </div>
    </div>

    <div id="appArea" class="hidden">
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center space-x-3">
                <div class="w-12 h-12 rounded-2xl btn-glow flex items-center justify-center font-bold text-lg">R</div>
                <div>
                    <div class="flex items-center gap-2">
                        <h2 id="topName" class="font-bold text-sm truncate w-24">---</h2>
                        <span id="topStatus" class="status-tag">---</span>
                    </div>
                    <p id="topUid" class="text-[9px] text-gray-500 font-mono">---</p>
                </div>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-cyan-400 font-bold uppercase">Balance</p>
                <p class="text-2xl font-black text-white" id="topBal">0.00</p>
            </div>
        </div>

        <div id="page-home" class="page active-page space-y-6">
            <div class="cyber-card p-10 flex flex-col items-center space-y-8">
                <div id="mineCircle" class="w-56 h-56 rounded-full border-[8px] border-white/5 flex flex-col items-center justify-center transition-all">
                    <span id="liveCounter" class="text-3xl font-bold text-cyan-400">0.00000000</span>
                    <p class="text-[8px] text-gray-500 mt-2 font-black uppercase">Active Extraction</p>
                </div>
                <button onclick="startMining()" id="mineBtn" class="w-full py-5 btn-glow rounded-3xl font-black text-xs uppercase">Initialize Mining</button>
            </div>
            <div class="cyber-card p-5 border-l-4 border-cyan-400 flex items-center gap-4">
                <span class="text-xl">📢</span>
                <p id="newsBox" class="text-xs text-gray-400 italic">Syncing news...</p>
            </div>
        </div>

        <div id="page-profile" class="page space-y-4">
            <div class="cyber-card p-6 space-y-4">
                <div class="flex justify-between items-start">
                    <h2 id="profName" class="text-xl font-bold">---</h2>
                    <span id="profStatus" class="status-tag">---</span>
                </div>
                <div class="grid grid-cols-2 gap-3 text-center">
                    <div class="bg-white/5 p-3 rounded-2xl"><p class="text-[8px] text-gray-500 uppercase">Referrals</p><p id="profRef" class="font-bold">0</p></div>
                    <div class="bg-white/5 p-3 rounded-2xl"><p class="text-[8px] text-gray-500 uppercase">Network</p><p class="font-bold text-[10px] text-cyan-400 uppercase">Live</p></div>
                </div>
                <div class="bg-black/40 p-4 rounded-2xl border border-white/10">
                    <p id="refLink" class="text-[10px] font-mono break-all text-gray-500">---</p>
                    <button onclick="copyRef()" class="mt-3 w-full py-2 bg-white/10 rounded-xl text-[9px] font-bold uppercase">Copy Referral</button>
                </div>
            </div>
            
            <div class="flex gap-2">
                <button onclick="checkVerify('send')" class="flex-1 py-4 cyber-card text-[10px] font-bold uppercase tracking-widest">Send RIDA</button>
                <button onclick="checkVerify('receive')" class="flex-1 py-4 cyber-card text-[10px] font-bold uppercase tracking-widest">Receive</button>
            </div>

            <div class="cyber-card p-6 space-y-4">
                <h3 class="text-[10px] font-black uppercase text-cyan-400 tracking-widest">Support Core (Private)</h3>
                <div id="chatBox" class="h-24 overflow-y-auto text-[10px] space-y-2 pr-2 bg-black/30 p-2 rounded-xl"></div>
                <div class="flex gap-2">
                    <input id="chatInput" type="text" placeholder="Message Admin..." class="flex-1 p-3 bg-white/5 border border-white/10 rounded-xl text-xs outline-none">
                    <button onclick="sendMsg()" class="px-5 py-3 btn-glow rounded-xl text-[10px] font-bold uppercase">Send</button>
                </div>
            </div>
            <button onclick="logout()" class="w-full py-4 text-red-500 text-[10px] font-bold uppercase opacity-30">Logout Session</button>
        </div>

        <div id="page-admin" class="page space-y-6">
            <h1 class="text-3xl font-black text-cyan-400 italic">OVERLORD PANEL</h1>
            <div class="cyber-card p-6 space-y-4">
                <h3 class="text-xs font-bold uppercase">Global Broadcast</h3>
                <textarea id="admMsg" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl text-xs h-24 outline-none" placeholder="Broadcast message..."></textarea>
                <button onclick="adminBroadcast()" class="w-full py-4 btn-glow rounded-xl font-bold uppercase text-xs">Push Globally</button>
            </div>
            <div class="cyber-card p-6 space-y-4">
                <h3 class="text-xs font-bold uppercase">User Manipulation</h3>
                <input id="admUid" type="text" placeholder="Target UID" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-xs outline-none">
                <input id="admBal" type="number" placeholder="New Balance" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-xs outline-none">
                <select id="admVerify" class="w-full p-4 bg-slate-900 border border-white/10 rounded-xl text-xs outline-none">
                    <option value="">Set Verify Status</option>
                    <option value="TRUE">VERIFIED</option>
                    <option value="FALSE">UNVERIFIED</option>
                </select>
                <button onclick="adminUpdate()" class="w-full py-4 bg-emerald-500/20 text-emerald-400 border border-emerald-500/50 rounded-xl font-bold uppercase text-xs">Apply Change</button>
            </div>
        </div>

        <div id="navBar" class="fixed bottom-0 left-0 w-full nav-blur flex justify-around p-4 z-50">
            <button onclick="switchTab('home', this)" class="text-center text-cyan-400"><span class="block text-2xl">⚡</span><span class="text-[9px] font-bold uppercase">Mining</span></button>
            <button onclick="switchTab('profile', this)" class="text-center text-gray-500"><span class="block text-2xl">👤</span><span class="text-[9px] font-bold uppercase">Profile</span></button>
            <button id="adminTab" onclick="switchTab('admin', this)" style="display:none;" class="text-center text-red-500"><span class="block text-2xl">⚙️</span><span class="text-[9px] font-bold uppercase">Admin</span></button>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbyYAxsGl8_gYaZ9SIWnoJATA6tMpmc5EFfmi3VKjIci2o5sndHWjGeDqGEdiX-3BSrKhQ/exec";
        let user = JSON.parse(localStorage.getItem('rida_dominion_52'));
        let isReg = false;
        let sessionBal = 0;

        window.onload = () => { if(user) syncSession(); else hideLoader(); };

        function hideLoader() { document.getElementById('loader-overlay').style.display = 'none'; document.getElementById('authArea').classList.remove('hidden'); }

        function syncSession() {
            server('sync', { email: user.email }, (res) => {
                if(res.success) {
                    user = res.user;
                    localStorage.setItem('rida_dominion_52', JSON.stringify(user));
                    initApp(res.news);
                } else logout();
            });
        }

        function initApp(news) {
            document.getElementById('loader-overlay').style.display = 'none';
            document.getElementById('authArea').classList.add('hidden');
            document.getElementById('appArea').classList.remove('hidden');
            
            document.getElementById('topName').innerText = user.name;
            document.getElementById('topUid').innerText = user.uid;
            document.getElementById('newsBox').innerText = news;
            sessionBal = parseFloat(user.bal || 0);
            document.getElementById('topBal').innerText = sessionBal.toFixed(2);
            
            const isV = String(user.verified).toUpperCase() === "TRUE";
            const tags = [document.getElementById('topStatus'), document.getElementById('profStatus')];
            tags.forEach(t => {
                t.innerText = isV ? "Verified" : "Unverified";
                t.className = isV ? "status-tag bg-emerald-500/20 text-emerald-400" : "status-tag bg-red-500/20 text-red-400";
            });

            document.getElementById('profName').innerText = user.name;
            document.getElementById('profRef').innerText = user.refCount || 0;
            document.getElementById('refLink').innerText = window.location.origin + window.location.pathname + "?ref=" + user.uid;
            
            // STRICT ADMIN LOCK
            if(String(user.role).toUpperCase() === "ADMIN") {
                document.getElementById('adminTab').style.display = "block";
            }
        }

        function handleAuth() {
            const email = document.getElementById('uEmail').value;
            const pass = document.getElementById('uPass').value;
            if(!email || !pass) return alert("Required fields missing");

            server(isReg ? 'register' : 'login', { email, pass, name: document.getElementById('uName').value, ref: new URLSearchParams(window.location.search).get('ref') || "none" }, (res) => {
                if(res.success) {
                    if(isReg) { alert("Registration complete! Login to access node."); toggleAuth(); }
                    else { user = res.user; localStorage.setItem('rida_dominion_52', JSON.stringify(user)); location.reload(); }
                } else alert(res.msg || "Error Connecting to Node");
            });
        }

        function startMining() {
            const btn = document.getElementById('mineBtn');
            btn.disabled = true; btn.innerText = "EXTRACTION IN PROGRESS";
            document.getElementById('mineCircle').style.borderColor = "#00f2ff";
            document.getElementById('mineCircle').style.boxShadow = "0 0 30px rgba(0,242,255,0.2)";
            setInterval(() => {
                sessionBal += (0.1 / 86400);
                document.getElementById('topBal').innerText = sessionBal.toFixed(4);
                document.getElementById('liveCounter').innerText = (sessionBal % 1).toFixed(8);
            }, 1000);
        }

        function checkVerify(type) {
            if(String(user.verified).toUpperCase() !== "TRUE") {
                alert("🔴 NODE ACCESS RESTRICTED\n\nYou must be a verified user to use this service. Send a message to Support Chat to begin verification.");
            } else { alert("Transfer System Initializing..."); }
        }

        function sendMsg() {
            const t = document.getElementById('chatInput').value;
            if(!t) return;
            server('sendMessage', { uid: user.uid, sender: user.name, text: t }, () => {
                document.getElementById('chatBox').innerHTML += `<div class='text-right mb-2'><span class='bg-cyan-500/20 p-2 rounded-xl text-cyan-400'>${t}</span></div>`;
                document.getElementById('chatInput').value = "";
            });
        }

        function adminBroadcast() { server('broadcast', { text: document.getElementById('admMsg').value }, () => alert("Pushed Globally!")); }

        function adminUpdate() {
            server('adminUpdateUser', { targetUid: document.getElementById('admUid').value, newBal: document.getElementById('admBal').value, setVerify: document.getElementById('admVerify').value }, (res) => {
                if(res.success) alert("User Database Updated!");
                else alert(res.msg);
            });
        }

        function server(action, payload, callback) {
            const cb = 'r_' + Math.round(Math.random()*100000);
            window[cb] = (d) => { delete window[cb]; document.body.removeChild(s); callback(d); };
            const s = document.createElement('script');
            s.src = `${API}?callback=${cb}&action=${action}&payload=${encodeURIComponent(JSON.stringify(payload))}`;
            document.body.appendChild(s);
        }

        function switchTab(t, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById('page-' + t).classList.add('active-page');
            document.querySelectorAll('#navBar button').forEach(b => b.className = "text-center text-gray-500");
            el.className = t === 'admin' ? "text-center text-red-500 font-bold" : "text-center text-cyan-400 font-bold";
        }

        function copyRef() { navigator.clipboard.writeText(document.getElementById('refLink').innerText); alert("Invite Link Copied!"); }
        function toggleAuth() { isReg = !isReg; document.getElementById('regInputs').classList.toggle('hidden'); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
