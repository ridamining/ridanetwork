<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIDA Network</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
  background: #050508;
  color: #fff;
  font-family: 'Plus Jakarta Sans', sans-serif;
  margin:0;
}

.container {
  max-width: 420px;
  margin:auto;
  padding:20px;
}

.glass {
  background: rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;
  padding:20px;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#111;
  border:1px solid #333;
  color:#fff;
  border-radius:10px;
}

button {
  width:100%;
  padding:14px;
  margin-top:15px;
  background:#6366f1;
  border:none;
  color:white;
  font-weight:bold;
  border-radius:10px;
  cursor:pointer;
}

.hidden { display:none; }
.center { text-align:center; }
</style>
</head>

<body>

<div class="container">

<!-- AUTH -->
<div id="authBox" class="glass">
  <h2 class="center">RIDA Network</h2>

  <div id="regFields" class="hidden">
    <input id="name" placeholder="Full Name">
  </div>

  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="auth()">Login / Register</button>

  <p class="center" onclick="toggle()">Switch Mode</p>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="glass">
    <h3 id="username"></h3>
    <p>ID: <span id="uid"></span></p>
    <h2 id="balance">0</h2>
  </div>

  <div class="glass">
    <button onclick="mine()">Start Mining</button>
    <button onclick="claim()">Claim Reward</button>
  </div>

  <div class="glass">
    <input id="to" placeholder="Receiver UID">
    <input id="amount" type="number" placeholder="Amount">
    <button onclick="transfer()">Send</button>
  </div>

  <div class="glass">
    <h4>Chat</h4>
    <div id="chat" style="height:150px;overflow:auto;"></div>
    <input id="msg">
    <button onclick="send()">Send</button>
  </div>

  <button onclick="logout()">Logout</button>

</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyiFwRP2P_jPMvntHypZv3RVuk0VTXED5EmTazozpQotmSiOTcIL-omEC9UUU6HmanN2w/exec";

let user = JSON.parse(localStorage.getItem("rida_user"));

let isRegister = false;

function toggle(){
  isRegister = !isRegister;
  document.getElementById("regFields").classList.toggle("hidden");
}

function auth(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("pass").value;
  let name = document.getElementById("name").value;

  call(isRegister ? "register" : "login", {email, pass, name}, (res)=>{
    if(res.success){
      user = res.user;
      localStorage.setItem("rida_user", JSON.stringify(user));
      loadApp();
    } else {
      alert(res.msg);
    }
  });
}

function loadApp(){
  document.getElementById("authBox").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  document.getElementById("username").innerText = user.name;
  document.getElementById("uid").innerText = user.uid;
  document.getElementById("balance").innerText = user.bal;

  loadChat();
}

function mine(){
  call("startMining",{uid:user.uid},sync);
}

function claim(){
  call("claimMining",{uid:user.uid},sync);
}

function transfer(){
  let to = document.getElementById("to").value;
  let amount = document.getElementById("amount").value;

  call("p2pTransfer",{from:user.uid,to,amount},sync);
}

function send(){
  let text = document.getElementById("msg").value;

  call("sendMessage",{uid:user.uid,sender:user.name,text},()=>{
    document.getElementById("msg").value="";
    loadChat();
  });
}

function loadChat(){
  call("getMessages",{uid:user.uid},(res)=>{
    let box = document.getElementById("chat");
    box.innerHTML = "";

    res.history.forEach(m=>{
      box.innerHTML += `<p><b>${m.sender}:</b> ${m.text}</p>`;
    });
  });
}

function sync(){
  call("sync",{uid:user.uid,email:user.email},(res)=>{
    if(res.success){
      user = res.user;
      localStorage.setItem("rida_user", JSON.stringify(user));
      loadApp();
    }
  });
}

function logout(){
  localStorage.clear();
  location.reload();
}

function call(action, payload, cb){
  const callbackName = "cb_" + Math.random().toString(36).substring(2);

  window[callbackName] = function(res){
    delete window[callbackName];
    cb(res);
  };

  const script = document.createElement("script");
  script.src = `${API}?action=${action}&payload=${encodeURIComponent(JSON.stringify(payload))}&callback=${callbackName}`;

  document.body.appendChild(script);
}

if(user){
  loadApp();
}

</script>

</body>
</html>
