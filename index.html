<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIDA OS | MASTER</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #010409; color: white; margin:0; }
  .glass { background: rgba(13,17,23,0.9); backdrop-filter: blur(25px); border:1px solid rgba(255,255,255,0.05); }
  .hidden { display:none !important; }
  .admin-glow { border: 1px solid #3b82f6 !important; box-shadow:0 0 15px rgba(59,130,246,0.1); }
</style>
</head>
<body class="pb-10">

<!-- LOGIN VIEW -->
<div id="loginView" class="min-h-screen flex items-center justify-center p-6">
  <div class="glass w-full max-w-sm p-10 rounded-[3.5rem] text-center border-t border-white/10 shadow-2xl">
    <h1 class="text-5xl font-black italic text-blue-500 mb-2">RIDA</h1>
    <p class="text-[8px] font-black opacity-30 uppercase tracking-[0.5em] mb-12">Neural Link v32.0</p>
    <div class="space-y-4">
      <input type="email" id="email" class="w-full bg-white/5 p-5 rounded-2xl border border-white/5 outline-none text-sm focus:border-blue-500 transition-all" placeholder="Email Address">
      <input type="password" id="pass" class="w-full bg-white/5 p-5 rounded-2xl border border-white/5 outline-none text-sm focus:border-blue-500 transition-all" placeholder="Access Key">
      <button onclick="handleLogin()" class="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl active:scale-95 transition-all">Initialize</button>
    </div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden p-6 space-y-6">
  <header class="flex justify-between items-center glass p-6 rounded-[2.5rem] admin-glow">
    <div>
      <h2 class="text-xl font-black text-blue-500 italic uppercase">Command Center</h2>
      <p class="text-[8px] opacity-40 font-bold tracking-widest">Master Node Status: Active</p>
    </div>
    <button onclick="logout()" class="p-3 bg-red-500/10 rounded-2xl text-red-500"><i data-lucide="power"></i></button>
  </header>

  <button onclick="fetchRegistry()" class="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg active:ring-2 ring-blue-400 transition-all">Sync Cloud Registry</button>

  <div class="glass rounded-[2rem] overflow-hidden border border-white/5">
    <div class="p-5 border-b border-white/5 bg-white/5 text-[10px] font-black uppercase tracking-widest opacity-50">Global User Database</div>
    <div class="overflow-x-auto">
      <table class="w-full text-left text-[11px]">
        <thead class="bg-black/20 text-slate-500 uppercase font-bold">
          <tr><th class="p-4">Node / ID</th><th class="p-4">Status</th><th class="p-4 text-right">Action</th></tr>
        </thead>
        <tbody id="registryBody" class="divide-y divide-white/5">
          <tr><td colspan="3" class="p-10 text-center opacity-30 italic">Registry Pending Sync...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="glass p-5 rounded-[2rem] space-y-3 border border-white/5">
    <h3 class="uppercase font-black text-xs opacity-50 tracking-widest">Broadcast Announcement</h3>
    <textarea id="announcementText" class="w-full p-3 rounded-xl bg-white/5 border border-white/10 outline-none text-[11px]" placeholder="Type your message"></textarea>
    <button onclick="postAnnouncement()" class="w-full bg-blue-600 py-3 rounded-xl text-[10px] font-black uppercase shadow-lg active:scale-95 transition-all">Transmit</button>
  </div>
</div>

<!-- USER PANEL -->
<div id="userApp" class="hidden">
  <header class="p-6 flex justify-between items-center glass rounded-b-[2.5rem]">
    <h2 class="text-xl font-black italic">RIDA <span class="text-blue-500 text-sm">MINER</span></h2>
    <button onclick="logout()" class="p-3 bg-white/5 rounded-2xl text-slate-400"><i data-lucide="log-out"></i></button>
  </header>
  <main class="p-6 text-center space-y-6">
    <div class="glass p-12 rounded-[4rem] border-t border-white/10 mt-10">
      <p class="text-[10px] opacity-30 uppercase mb-2">Network Yield</p>
      <h2 class="text-5xl font-black mb-10 tracking-tighter"><span id="uBal">0.000000</span></h2>
      <button onclick="startMining()" id="mineBtn" class="w-full py-6 rounded-3xl bg-blue-600 font-black uppercase text-[10px] tracking-widest shadow-xl">Start Mining</button>
    </div>
  </main>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxhwFo2ycjOPDunKdrtgjo4uO769ZDqR6ZAyhuhpgG5eL0OxYSpRvnXLSZu0P5Bbp-1uQ/exec";

// --- LOGIN ---
function handleLogin() {
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('pass').value.trim();
  if(!email || !pass) return alert("All fields required.");

  const callbackName = "jsonpCallback_"+Date.now();
  window[callbackName] = function(res){
    if(res.success){
      localStorage.setItem("rida_session", JSON.stringify(res.user));
      renderView();
    } else {
      alert(res.msg || "Login failed");
    }
    delete window[callbackName];
  }

  const script = document.createElement("script");
  script.src = `${WEB_APP_URL}?action=login&payload=${encodeURIComponent(JSON.stringify({email, pass}))}&callback=${callbackName}`;
  document.body.appendChild(script);
}

// --- RENDER ---
function renderView(){
  const session = JSON.parse(localStorage.getItem("rida_session"));
  document.getElementById('loginView').classList.add('hidden');
  document.getElementById('adminPanel').classList.add('hidden');
  document.getElementById('userApp').classList.add('hidden');

  if(!session){
    document.getElementById('loginView').classList.remove('hidden');
  } else if(session.role === "ADMIN"){
    document.getElementById('adminPanel').classList.remove('hidden');
    fetchRegistry();
  } else {
    document.getElementById('userApp').classList.remove('hidden');
    document.getElementById('uBal').innerText = parseFloat(session.bal || 0).toFixed(6);
  }
  lucide.createIcons();
}

// --- LOGOUT ---
function logout(){ localStorage.clear(); location.reload(); }

// --- FETCH REGISTRY (ADMIN) ---
function fetchRegistry(){
  const body = document.getElementById('registryBody');
  body.innerHTML = `<tr><td colspan="3" class="p-10 text-center opacity-50 italic animate-pulse">Syncing Cloud Registry...</td></tr>`;
  const callbackName = "jsonpCallback_"+Date.now();
  window[callbackName] = function(res){
    if(res.success && res.users){
      body.innerHTML = res.users.map(u=>`
        <tr class="hover:bg-white/5 transition-colors">
          <td class="p-4 font-bold text-blue-400">${u.uid}<br><span class="text-[8px] opacity-20">${u.email}</span></td>
          <td class="p-4"><span class="px-2 py-1 rounded-lg bg-blue-600/10 text-[9px] font-black uppercase text-blue-500 border border-blue-500/20">${u.verified}</span></td>
          <td class="p-4 text-right"><button onclick="approveUser('${u.uid}')" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-xl text-[9px] font-black uppercase shadow-lg">Verify</button></td>
        </tr>
      `).join("");
    } else body.innerHTML = `<tr><td colspan="3" class="p-10 text-center opacity-30 italic">No Users Found</td></tr>`;
    delete window[callbackName];
  }
  const script = document.createElement("script");
  script.src = `${WEB_APP_URL}?action=sync&callback=${callbackName}`;
  document.body.appendChild(script);
}

// --- APPROVE USER ---
function approveUser(uid){
  const callbackName = "jsonpCallback_"+Date.now();
  window[callbackName] = function(res){
    alert(res.success?"Node Verified":"Failed: "+(res.msg||"Unknown"));
    fetchRegistry();
    delete window[callbackName];
  }
  const script = document.createElement("script");
  script.src = `${WEB_APP_URL}?action=postAnnouncement&payload=${encodeURIComponent(JSON.stringify({uid, text:"VERIFY"}))}&callback=${callbackName}`;
  document.body.appendChild(script);
}

// --- START MINING ---
function startMining(){
  const session = JSON.parse(localStorage.getItem("rida_session"));
  if(!session) return alert("Login first");
  const callbackName = "jsonpCallback_"+Date.now();
  window[callbackName] = function(res){
    if(res.success){
      session.bal = (parseFloat(session.bal||0)+0.2).toFixed(6);
      localStorage.setItem("rida_session", JSON.stringify(session));
      document.getElementById("uBal").innerText = session.bal;
    } else alert(res.msg||"Mining failed");
    delete window[callbackName];
  }
  const script = document.createElement("script");
  script.src = `${WEB_APP_URL}?action=startMining&payload=${encodeURIComponent(JSON.stringify({uid:session.uid}))}&callback=${callbackName}`;
  document.body.appendChild(script);
}

// --- ANNOUNCEMENT (ADMIN) ---
function postAnnouncement(){
  const text = document.getElementById("announcementText").value.trim();
  if(!text) return alert("Message is empty");
  const session = JSON.parse(localStorage.getItem("rida_session"));
  const callbackName = "jsonpCallback_"+Date.now();
  window[callbackName] = function(res){
    alert(res.success?"Broadcast Sent":"Failed: "+(res.msg||"Unknown"));
    document.getElementById("announcementText").value="";
    delete window[callbackName];
  }
  const script = document.createElement("script");
  script.src = `${WEB_APP_URL}?action=postAnnouncement&payload=${encodeURIComponent(JSON.stringify({uid:session.uid,text}))}&callback=${callbackName}`;
  document.body.appendChild(script);
}

window.onload = renderView;
</script>
</body>
</html>
