<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIDA NETWORK v13.4</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            background: #050508;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        
        .glass {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 16px;
            font-weight: 700;
            color: white;
            padding: 16px;
            width: 100%;
        }
        
        .page { display: none; }
        .active { display: block; }
        
        @keyframes ping {
            75%, 100% { transform: scale(2); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="authPage" style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
        <div style="width:100%; max-width:400px;">
            <h1 style="text-align:center; font-size:3rem; margin-bottom:30px;">RIDA<span style="color:#6366f1;">.</span></h1>
            <div class="glass" style="padding:30px;">
                <div id="regInputs" style="display:none; margin-bottom:15px;">
                    <input id="uName" type="text" placeholder="Full Name" style="width:100%; padding:15px; margin-bottom:10px; background:#ffffff0a; border:1px solid #ffffff1a; border-radius:12px; color:white;">
                    <input id="uRef" type="text" placeholder="Referral Code (Optional)" style="width:100%; padding:15px; margin-bottom:15px; background:#ffffff0a; border:1px solid #ffffff1a; border-radius:12px; color:white;">
                </div>
                <input id="uEmail" type="email" placeholder="Email Address" style="width:100%; padding:15px; margin-bottom:10px; background:#ffffff0a; border:1px solid #ffffff1a; border-radius:12px; color:white;">
                <input id="uPass" type="password" placeholder="Password" style="width:100%; padding:15px; margin-bottom:15px; background:#ffffff0a; border:1px solid #ffffff1a; border-radius:12px; color:white;">
                <button onclick="handleAuth()" id="authBtn" style="padding:16px; font-size:1rem;">CONNECT NODE</button>
                <p onclick="toggleAuth()" id="toggleText" style="text-align:center; margin-top:15px; color:#888; cursor:pointer; font-size:0.9rem;">New node? Create Identity</p>
            </div>
        </div>
    </div>

    <!-- Main App Screen -->
    <div id="mainApp" style="display:none; max-width:400px; margin:0 auto; padding:20px; padding-top:30px;">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <div>
                <h2 id="viewName" style="margin:0;">---</h2>
                <span id="viewStatus" style="font-size:0.8rem; padding:2px 8px; border-radius:6px; background:rgba(239,68,68,0.1); color:#ef4444;">PENDING</span>
            </div>
            <div style="text-align:right;">
                <p id="viewBal" style="font-size:2rem; font-weight:bold; margin:0;">0.00</p>
                <p style="font-size:0.7rem; color:#888;">RIDA ASSET</p>
            </div>
        </header>

        <div id="page-home" class="page active">
            <div class="glass" style="padding:15px; margin-bottom:20px;">
                <p style="font-size:0.8rem; color:#6366f1;">NETWORK BROADCAST</p>
                <p id="annText" style="font-size:0.9rem;">Syncing node data...</p>
            </div>
            <div class="glass" style="padding:40px 20px; text-align:center;">
                <div style="position:relative; width:180px; height:180px; margin:0 auto; border:4px solid rgba(99,102,241,0.2); border-radius:9999px;">
                    <div id="miningPulse" style="position:absolute; inset:0; border:4px solid #6366f1; border-radius:9999px; animation: ping 2s infinite; opacity:0;"></div>
                    <span id="mineTimer" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:2.5rem; font-weight:bold; color:#6366f1;">0.20</span>
                </div>
                <button onclick="processMining()" id="mineBtn" class="btn-primary" style="margin-top:30px;">INITIALIZE NODE</button>
                <p id="timerLabel" style="margin-top:10px; font-size:0.85rem; color:#888;">Ready for extraction</p>
            </div>
        </div>

        <div id="page-profile" class="page" style="display:none;">
            <button onclick="logout()" style="color:#ff6666; width:100%; padding:20px; background:none; border:none; font-size:0.9rem;">TERMINATE SESSION</button>
        </div>

        <nav style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:9999px; padding:10px 20px; display:flex; gap:30px; z-index:100;">
            <button onclick="switchTab('home', this)" style="background:none; border:none; color:#888; font-size:0.8rem;">⚡ MINE</button>
            <button onclick="switchTab('profile', this)" style="background:none; border:none; color:#888; font-size:0.8rem;">💼 ASSET</button>
        </nav>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzkH-SVeIZROvOM0ASXv5Ol4gLcGlPLMgBiCIIXoj6ZhM0Q6enOxNjjVP4SrB8rOSQ1jA/exec";

        let user = null;

        function call(action, payload, callback) {
            console.log("Calling:", action, payload);
            const cb = 'cb_' + Date.now();
            window[cb] = function(res) {
                delete window[cb];
                console.log("Response from", action, ":", res);
                callback(res);
            };
            const script = document.createElement('script');
            script.src = `\( {API}?callback= \){cb}&action=\( {action}&payload= \){encodeURIComponent(JSON.stringify(payload))}`;
            document.body.appendChild(script);
        }

        function handleAuth() {
            const email = document.getElementById('uEmail').value.trim();
            const pass = document.getElementById('uPass').value.trim();
            if (!email || !pass) return alert("Email and password required");

            const btn = document.getElementById('authBtn');
            btn.innerText = "CONNECTING...";
            btn.disabled = true;

            call('login', {email, pass}, function(res) {
                btn.innerText = "CONNECT NODE";
                btn.disabled = false;
                if (res && res.success) {
                    user = res.user;
                    localStorage.setItem('ridaUser', JSON.stringify(user));
                    showMainApp();
                } else {
                    alert(res && res.msg ? res.msg : "Login failed. Check credentials.");
                }
            });
        }

        function showMainApp() {
            document.getElementById('authPage').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('viewName').innerText = user.name || 'User';
            document.getElementById('viewUid').innerText = user.uid || '---';
            document.getElementById('viewBal').innerText = (user.bal || 0).toFixed(2);
        }

        function logout() {
            localStorage.removeItem('ridaUser');
            location.reload();
        }

        function switchTab(tab) {
            console.log("Switching to tab:", tab);
            // Simple for now - you can expand later
        }

        function processMining() {
            if (!user) return;
            call('startMining', {uid: user.uid}, function(res) {
                alert(res && res.success ? "Mining started" : "Failed");
            });
        }

        // Start the app
        window.onload = function() {
            console.log("🚀 RIDA v13.4 loading...");

            // Clear old broken data
            localStorage.removeItem('rida_v13_1');

            const saved = localStorage.getItem('ridaUser');
            if (saved) {
                try {
                    user = JSON.parse(saved);
                    if (user && user.uid) {
                        showMainApp();
                        return;
                    }
                } catch(e) {}
            }

            // Show login by default
            document.getElementById('authPage').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';

            console.log("✅ Showing login screen. Try email: asd@gmail.com | pass: pakistan");
        };
    </script>
</body>
</html>
