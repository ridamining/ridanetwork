<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rida Network – Final Test</title>
    <style>
        body { background: #0a0f1e; color: white; font-family: monospace; padding: 20px; }
        button { background: #3b82f6; border: none; padding: 10px 20px; border-radius: 2rem; color: white; margin: 5px; }
        pre { background: #1e293b; padding: 1rem; border-radius: 1rem; overflow-x: auto; }
    </style>
</head>
<body>
<h1>🔧 Rida Network – Backend Test</h1>
<button id="testLogin">Test Login (admin@rida.com / admin123)</button>
<button id="testDashboard">Test Dashboard</button>
<pre id="output">Click a button...</pre>

<script>
    // Replace this with your actual Apps Script URL
    const API_URL = 'https://script.google.com/macros/s/AKfycbwz3_kw0XIVFEU4X6qNUgm2cuvpZeDIQXnJO56Pw4J9GpNWgfcaz6lBgmBdrFC78FsedA/exec';
    const PROXY = 'https://corsproxy.io/?' + encodeURIComponent(API_URL);

    async function callApi(action, payload) {
        try {
            const res = await fetch(PROXY, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, ...payload })
            });
            const text = await res.text();
            document.getElementById('output').innerText = 'Raw response:\n' + text;
            try {
                return JSON.parse(text);
            } catch(e) {
                return { error: 'Invalid JSON', raw: text };
            }
        } catch(err) {
            document.getElementById('output').innerText = 'Fetch error: ' + err.message;
        }
    }

    document.getElementById('testLogin').onclick = async () => {
        const result = await callApi('login', { email: 'admin@rida.com', password: 'admin123' });
        console.log(result);
    };
    document.getElementById('testDashboard').onclick = async () => {
        const result = await callApi('getDashboard', { email: 'admin@rida.com' });
        console.log(result);
    };
</script>
</body>
</html>
