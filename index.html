<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIDA Engine 4.0</title>
</head>
<body>

<h2>Login</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="pass" placeholder="Password">
<button onclick="handleLogin()">Login</button>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxhwFo2ycjOPDunKdrtgjo4uO769ZDqR6ZAyhuhpgG5eL0OxYSpRvnXLSZu0P5Bbp-1uQ/exec";

// JSONP request function
function jsonpRequest(action, payload, callback) {
    const cbName = "jsonp_cb_" + Math.floor(Math.random()*1000000);
    window[cbName] = function(result) {
        callback(result);
        delete window[cbName];
        document.body.removeChild(script);
    };
    const params = new URLSearchParams();
    params.append("action", action);
    if(payload) params.append("payload", JSON.stringify(payload));
    params.append("callback", cbName);
    const script = document.createElement('script');
    script.src = WEB_APP_URL + "?" + params.toString();
    document.body.appendChild(script);
}

// Login handler
function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('pass').value.trim();
    if(!email || !pass) return alert("Enter email & password");

    jsonpRequest("login", {email, pass}, function(res){
        console.log("Response:", res);
        if(res.success) {
            alert("Login success! Welcome " + res.user.name);
        } else {
            alert("Login failed: " + res.msg);
        }
    });
}
</script>
</body>
</html>
