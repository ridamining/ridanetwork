<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIDA OS | MASTER</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; background: #010409; color: white; margin:0; }
.glass { background: rgba(13,17,23,0.85); backdrop-filter: blur(25px); border:1px solid rgba(255,255,255,0.05);}
.hidden { display:none !important;}
.admin-glow { border: 1px solid #3b82f6 !important; box-shadow:0 0 15px rgba(59,130,246,0.2);}
</style>
</head>
<body class="pb-10">

<!-- LOGIN -->
<div id="loginView" class="min-h-screen flex items-center justify-center p-6">
  <div class="glass w-full max-w-sm p-10 rounded-[3.5rem] text-center border-t border-white/10 shadow-2xl">
    <h1 class="text-5xl font-black italic text-blue-500 mb-2">RIDA</h1>
    <p class="text-[8px] font-black opacity-30 uppercase tracking-[0.5em] mb-12">Neural Link v32.0</p>
    <div class="space-y-4">
      <input type="email" id="email" class="w-full bg-white/5 p-5 rounded-2xl border border-white/5 outline-none text-sm focus:border-blue-500 transition-all" placeholder="Email Address">
      <input type="password" id="pass" class="w-full bg-white/5 p-5 rounded-2xl border border-white/5 outline-none text-sm focus:border-blue-500 transition-all" placeholder="Access Key">
      <button onclick="handleLogin()" class="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl active:scale-95 transition-all">Initialize</button>
      <button onclick="showRegister()" class="w-full py-3 text-[9px] text-blue-400 uppercase">Register New Node</button>
    </div>
  </div>
</div>

<!-- REGISTER -->
<div id="registerView" class="min-h-screen flex items-center justify-center p-6 hidden">
  <div class="glass w-full max-w-sm p-10 rounded-[3.5rem] text-center border-t border-white/10 shadow-2xl">
    <h1 class="text-3xl font-black italic text-green-500 mb-6">Register Node</h1>
    <div class="space-y-4">
      <input type="text" id="rName" placeholder="Full Name" class="w-full bg-white/5 p-5 rounded-2xl border border-white/5 outline-none text-sm focus:border-green-500 transition-all">
      <input type="email" id="rEmail" placeholder="Email Address" class="w-full bg-white/5 p-5 rounded-2xl border border-white/5 outline-none text-sm focus:border-green-500 transition-all">
      <input type="password" id="rPass" placeholder="Access Key" class="w-full bg-white/5 p-5 rounded-2xl border border-white/5 outline-none text-sm focus:border-green-500 transition-all">
      <button onclick="handleRegister()" class="w-full bg-green-600 py-5 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl active:scale-95 transition-all">Register</button>
      <button onclick="showLogin()" class="w-full py-3 text-[9px] text-blue-400 uppercase">Back to Login</button>
    </div>
  </div>
</div>

<!-- USER APP -->
<div id="userApp" class="hidden">
  <header class="p-6 flex justify-between items-center glass rounded-b-[2.5rem]">
    <h2 class="text-xl font-black italic">RIDA <span class="text-blue-500 text-sm">MINER</span></h2>
    <button onclick="logout()" class="p-3 bg-white/5 rounded-2xl text-slate-400"><i data-lucide="log-out"></i></button>
  </header>
  <main class="p-6 text-center space-y-6">
    <div class="glass p-12 rounded-[4rem] border-t border-white/10 mt-10">
      <p class="text-[10px] opacity-30 uppercase mb-2">Network Yield</p>
      <h2 class="text-5xl font-black mb-10 tracking-tighter"><span id="uBal">0.000000</span></h2>
      <button id="mineBtn" onclick="startMining()" class="w-full py-6 rounded-3xl bg-blue-600/50 font-black uppercase text-[10px] tracking-widest shadow-xl transition-all">Start Mining</button>
    </div>
  </main>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden p-6 space-y-6">
  <header class="flex justify-between items-center glass p-6 rounded-[2.5rem] admin-glow">
    <div>
      <h2 class="text-xl font-black text-blue-500 italic uppercase">Command Center</h2>
      <p class="text-[8px] opacity-40 font-bold tracking-widest">Master Node Status: Active</p>
    </div>
    <button onclick="logout()" class="p-3 bg-red-500/10 rounded-2xl text-red-500"><i data-lucide="power"></i></button>
  </header>

  <input type="text" id="announcementText" placeholder="Broadcast Announcement" class="w-full p-4 rounded-xl glass border border-white/10 bg-white/5 text-[10px] mb-2">
  <button onclick="postAnnouncement()" class="w-full py-4 bg-blue-600 rounded-xl font-black text-[10px] tracking-widest shadow-lg active:scale-95 transition-all">Post Announcement</button>

  <div class="glass rounded-[2rem] overflow-hidden border border-white/5 mt-6">
    <div class="p-5 border-b border-white/5 bg-white/5 text-[10px] font-black uppercase tracking-widest opacity-50">Global User Database</div>
    <div class="overflow-x-auto">
      <table class="w-full text-left text-[11px]">
        <thead class="bg-black/20 text-slate-500 uppercase font-bold">
          <tr><th class="p-4">Node / ID</th><th class="p-4">Status</th><th class="p-4 text-right">Action</th></tr>
        </thead>
        <tbody id="registryBody" class="divide-y divide-white/5">
          <tr><td colspan="3" class="p-10 text-center opacity-30 italic">Registry Pending Sync...</td></tr>
        </tbody>
      </table>
    </div>
    <button onclick="fetchRegistry()" class="w-full py-3 bg-blue-600/30 text-[10px] font-black uppercase">Sync Registry</button>
  </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxH7PtsDT8jrkWtpdIcktfU2aEg5z9UgJM5uQNBzf5sDKJzfMkMDt_aebSEDb4JY23GLg/exec";
let session = null;

function showRegister(){ document.getElementById('loginView').classList.add('hidden'); document.getElementById('registerView').classList.remove('hidden'); }
function showLogin(){ document.getElementById('registerView').classList.add('hidden'); document.getElementById('loginView').classList.remove('hidden'); }

function handleRegister(){
  const name = document.getElementById('rName').value.trim();
  const email = document.getElementById('rEmail').value.trim();
  const pass = document.getElementById('rPass').value.trim();
  if(!name||!email||!pass) return alert("All fields required.");

  fetch(`${WEB_APP_URL}?action=register&payload=${encodeURIComponent(JSON.stringify({name,email,pass}))}`)
  .then(r=>r.json()).then(r=>{
    if(r.success){ alert("Registered successfully!"); showLogin(); }
    else alert(r.msg||"Error");
  });
}

function handleLogin(){
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('pass').value.trim();
  if(!email||!pass) return alert("All fields required.");

  fetch(`${WEB_APP_URL}?action=login&payload=${encodeURIComponent(JSON.stringify({email,pass}))}`)
  .then(r=>r.json()).then(r=>{
    if(r.success){
      session = r.user;
      renderView();
    } else alert(r.msg||"Invalid credentials");
  });
}

function startMining(){
  if(!session) return alert("Session expired.");
  fetch(`${WEB_APP_URL}?action=startMining&payload=${encodeURIComponent(JSON.stringify({uid:session.uid}))}`)
  .then(r=>r.json()).then(r=>{
    if(r.success){
      document.getElementById('uBal').innerText = r.newBal.toFixed(6);
      document.getElementById('mineBtn').disabled=true;
      document.getElementById('mineBtn').innerText="Mining Active";
    } else alert(r.msg||"Cannot mine now");
  });
}

function fetchRegistry(){
  fetch(`${WEB_APP_URL}?action=sync&payload=${encodeURIComponent(JSON.stringify({uid:session.uid}))}`)
  .then(r=>r.json()).then(r=>{
    if(!r.success) return alert("Failed to sync");
    if(session.role=="ADMIN"){
      fetch(`${WEB_APP_URL}?action=sync&payload=${encodeURIComponent(JSON.stringify({uid:session.uid}))}`)
      .then(res=>res.json()).then(data=>{
        // This is basic example: fill user table with current user only
        document.getElementById('registryBody').innerHTML = `<tr>
          <td class="p-4">${data.user.name} / ${data.user.uid}</td>
          <td class="p-4">${data.user.verified}</td>
          <td class="p-4 text-right">---</td>
        </tr>`;
      });
    }
  });
}

function postAnnouncement(){
  const text = document.getElementById('announcementText').value.trim();
  if(!text) return alert("Enter announcement text");
  fetch(`${WEB_APP_URL}?action=postAnnouncement&payload=${encodeURIComponent(JSON.stringify({uid:session.uid,text}))}`)
  .then(r=>r.json()).then(r=>{
    if(r.success){ alert("Announcement posted"); document.getElementById('announcementText').value=""; }
    else alert(r.msg||"Failed");
  });
}

function logout(){ session=null; showLogin(); }
function renderView(){
  document.getElementById('loginView').classList.add('hidden');
  document.getElementById('registerView').classList.add('hidden');
  document.getElementById('userApp').classList.add('hidden');
  document.getElementById('adminPanel').classList.add('hidden');

  if(!session) document.getElementById('loginView').classList.remove('hidden');
  else if(session.role=="ADMIN") document.getElementById('adminPanel').classList.remove('hidden');
  else document.getElementById('userApp').classList.remove('hidden');

  lucide.createIcons();
}

window.onload = renderView;
</script>
</body>
</html>
