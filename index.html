<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rida Network | Final Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap');
        body { background: #020617; color: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-main { background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%); transition: 0.3s; cursor: pointer; }
        .btn-main:active { transform: scale(0.95); }
        .hidden { display: none; }
        .nav-active { color: #38bdf8 !important; filter: drop-shadow(0 0 8px #38bdf8); }
        .section { height: calc(100vh - 180px); overflow-y: auto; padding-bottom: 120px; scrollbar-width: none; }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.5; } 100% { transform: scale(1.3); opacity: 0; } }
        .mining-anim { position: relative; }
        .mining-anim::after { content: ''; position: absolute; inset: -8px; border: 2px solid #38bdf8; border-radius: 50%; animation: pulse 2s infinite; }
    </style>
</head>
<body class="max-w-md mx-auto relative border-x border-white/5">

    <div id="loader" class="fixed inset-0 z-[100] bg-black/95 flex flex-col items-center justify-center hidden">
        <div class="w-10 h-10 border-2 border-sky-500/20 border-t-sky-500 rounded-full animate-spin mb-4"></div>
        <p class="text-[10px] font-black tracking-widest text-sky-400">CONNECTING NODE...</p>
    </div>

    <div id="auth-scr" class="h-full p-8 flex flex-col justify-center">
        <div class="text-center mb-10">
            <h1 class="text-6xl font-black italic tracking-tighter">RIDA<span class="text-sky-400">.</span></h1>
            <p class="text-slate-500 text-[10px] font-bold tracking-widest uppercase mt-2">v9.5 Master Node</p>
        </div>
        
        <div id="login-box" class="glass p-8 rounded-[3rem] space-y-4">
            <input type="email" id="l-email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none">
            <input type="password" id="l-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none">
            <button onclick="auth('login')" class="w-full btn-main p-4 rounded-2xl font-bold">Sign In</button>
            <p class="text-center text-xs text-slate-500">New? <span class="text-sky-400 font-bold cursor-pointer" onclick="toggleAuth(true)">Register</span></p>
        </div>

        <div id="reg-box" class="glass p-8 rounded-[3rem] space-y-4 hidden">
            <input type="text" id="r-user" placeholder="Username" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none">
            <input type="email" id="r-email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none">
            <input type="password" id="r-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none">
            <input type="text" id="r-ref" placeholder="Referral Code" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none">
            <button onclick="auth('register')" class="w-full btn-main p-4 rounded-2xl font-bold">Create Node</button>
            <p class="text-center text-xs text-slate-500"><span class="text-sky-400 font-bold cursor-pointer" onclick="toggleAuth(false)">Back</span></p>
        </div>
    </div>

    <div id="app-scr" class="h-full hidden flex flex-col">
        <header class="p-8 flex justify-between items-start">
            <div>
                <p id="u-uid" class="text-sky-500 text-[9px] font-black tracking-widest">---</p>
                <h2 id="u-name" class="text-2xl font-black italic uppercase">Miner</h2>
            </div>
            <div id="adm-badge" class="hidden px-4 py-1.5 bg-red-500/10 border border-red-500/30 rounded-full text-[8px] font-black text-red-500 uppercase">Admin</div>
        </header>

        <main class="flex-1 px-8">
            <div id="sec-home" class="section space-y-6">
                <div class="btn-main p-8 rounded-[2.5rem] relative" onclick="go('verify')">
                    <p class="text-white/40 text-[10px] font-bold uppercase tracking-widest mb-1">Assets</p>
                    <h1 id="u-bal" class="text-5xl font-black tabular-nums tracking-tighter">0.000000</h1>
                    <div id="u-v-tag" class="mt-4 text-[9px] font-black uppercase flex items-center gap-2"></div>
                </div>

                <div class="glass p-10 rounded-[3.5rem] text-center">
                    <div id="m-off">
                        <button onclick="startMining()" class="w-32 h-32 rounded-full btn-main mx-auto flex items-center justify-center">
                            <i class="fas fa-hammer text-3xl"></i>
                        </button>
                        <p class="mt-6 font-bold text-slate-400 uppercase text-xs tracking-widest">Start Mining</p>
                    </div>
                    <div id="m-on" class="hidden">
                        <div class="w-32 h-32 rounded-full border-2 border-sky-400 mx-auto flex items-center justify-center mining-anim">
                            <i class="fas fa-bolt text-3xl text-sky-400 animate-pulse"></i>
                        </div>
                        <p id="timer" class="mt-6 font-mono text-3xl font-black text-sky-400">24:00:00</p>
                    </div>
                </div>
            </div>

            <div id="sec-news" class="section hidden space-y-4">
                <h3 class="text-2xl font-black italic">Network Broadcast</h3>
                <div id="news-feed" class="space-y-4"></div>
            </div>

            <div id="sec-chat" class="section hidden flex flex-col h-full">
                <h3 class="text-2xl font-black italic mb-4">Support Hub</h3>
                <div id="chat-win" class="flex-1 glass rounded-3xl p-4 overflow-y-auto space-y-3 mb-4"></div>
                <div class="flex gap-2 mb-24">
                    <input type="text" id="chat-in" placeholder="Message..." class="flex-1 bg-white/5 p-4 rounded-2xl border border-white/10 outline-none text-sm">
                    <button onclick="sendMsg()" class="btn-main px-6 rounded-2xl"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>

            <div id="sec-verify" class="section hidden space-y-6">
                <h3 class="text-2xl font-black italic text-sky-400">KYC Verify</h3>
                <div class="glass p-8 rounded-[2.5rem] text-center">
                    <p class="text-xs text-slate-400 mb-6">Send 5$ USDT (BEP20) to address:</p>
                    <div class="bg-black/40 p-4 rounded-2xl mb-6 border border-white/10 text-[10px] font-mono text-sky-400 break-all select-all">0xCeC73F7C0e6709eD740Bc8f486fa6623bC0873b3</div>
                    <button onclick="submitKYC()" class="w-full btn-main p-4 rounded-2xl font-bold">Submit Hash</button>
                </div>
            </div>

            <div id="sec-admin" class="section hidden space-y-6">
                <div class="flex justify-between items-center"><h3 class="text-2xl font-black italic text-red-500">Control</h3><button onclick="adminPost()" class="text-[10px] text-sky-400 font-black uppercase">Post News</button></div>
                <div id="admin-list" class="space-y-2"></div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 h-24 glass flex justify-around items-center px-6 rounded-t-[2.5rem] z-50">
            <i onclick="go('home', this)" class="nav-btn fas fa-home text-xl nav-active"></i>
            <i onclick="go('news', this)" class="nav-btn fas fa-newspaper text-xl text-slate-600"></i>
            <i onclick="go('chat', this)" class="nav-btn fas fa-comment-dots text-xl text-slate-600"></i>
            <i onclick="go('admin', this)" id="nav-adm" class="nav-btn fas fa-shield-halved text-xl text-slate-600 hidden"></i>
            <i onclick="logout()" class="fas fa-power-off text-xl text-red-500/30"></i>
        </nav>
    </div>

    <script>
        const API = 'REPLACE_WITH_YOUR_NEW_DEPLOYMENT_URL';
        let user = JSON.parse(localStorage.getItem('rida_v95_user')) || null;
        let ticker;

        window.onload = () => { if(user) startApp(); };

        async function auth(action) {
            loading(true);
            const data = action === 'login' ? 
                { action, email: document.getElementById('l-email').value, password: document.getElementById('l-pass').value } :
                { action, username: document.getElementById('r-user').value, email: document.getElementById('r-email').value, password: document.getElementById('r-pass').value, referredBy: document.getElementById('r-ref').value };
            
            try {
                const res = await (await fetch(API, { method: 'POST', body: JSON.stringify(data) })).json();
                if(res.success) {
                    if(action === 'login') {
                        user = res.data;
                        localStorage.setItem('rida_v95_user', JSON.stringify(user));
                        startApp();
                    } else { alert("Node Registered!"); toggleAuth(false); }
                } else alert(res.msg);
            } catch(e) { alert("Check Connection"); }
            loading(false);
        }

        function startApp() {
            document.getElementById('auth-scr').classList.add('hidden');
            document.getElementById('app-scr').classList.remove('hidden');
            document.getElementById('u-name').innerText = user.username;
            document.getElementById('u-uid').innerText = user.uid;
            if(user.role === 'Admin') {
                document.getElementById('adm-badge').classList.remove('hidden');
                document.getElementById('nav-adm').classList.remove('hidden');
            }
            sync();
        }

        async function sync() {
            const res = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getDashboard', uid: user.uid }) })).json();
            if(res.success) {
                const d = res.data;
                const tag = document.getElementById('u-v-tag');
                tag.innerHTML = d.verified === 'Yes' ? '<i class="fas fa-check-circle text-green-400"></i> Verified' : '<i class="fas fa-times-circle text-red-400"></i> Unverified';
                tag.className = d.verified === 'Yes' ? "mt-4 text-[9px] font-black uppercase text-green-400" : "mt-4 text-[9px] font-black uppercase text-red-400";
                
                if(d.miningStatus === 'Active') {
                    startTicker(d.balance, d.lastMiningTime);
                    startTimer(d.lastMiningTime);
                } else { document.getElementById('u-bal').innerText = parseFloat(d.balance).toFixed(6); }
            }
        }

        function startTicker(base, start) {
            if(ticker) clearInterval(ticker);
            ticker = setInterval(() => {
                const earned = ((Date.now() - parseInt(start)) / 1000) * (0.1 / 86400);
                document.getElementById('u-bal').innerText = (parseFloat(base) + earned).toFixed(6);
            }, 1000);
        }

        function startTimer(start) {
            document.getElementById('m-off').classList.add('hidden');
            document.getElementById('m-on').classList.remove('hidden');
            setInterval(() => {
                const rem = 86400000 - (Date.now() - parseInt(start));
                if(rem <= 0) location.reload();
                const h = Math.floor(rem/3600000).toString().padStart(2,'0');
                const m = Math.floor((rem%3600000)/60000).toString().padStart(2,'0');
                const s = Math.floor((rem%60000)/1000).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        async function startMining() {
            loading(true);
            await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'startMining', uid: user.uid }) });
            location.reload();
        }

        async function loadNews() {
            const res = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getAnnouncements' }) })).json();
            document.getElementById('news-feed').innerHTML = res.data.map(n => `<div class="glass p-5 rounded-[2rem]"><p class="text-[9px] text-sky-400 font-bold mb-1 uppercase">${new Date(n[0]).toLocaleDateString()}</p><p class="text-sm">${n[1]}</p></div>`).join('');
        }

        async function loadChat() {
            const res = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getMessages', uid: user.uid }) })).json();
            const win = document.getElementById('chat-win');
            win.innerHTML = res.data.map(m => `<div class="flex ${m[0] === user.uid ? 'justify-end' : 'justify-start'}"><div class="max-w-[80%] px-4 py-2 rounded-2xl text-xs ${m[0] === user.uid ? 'bg-sky-500 text-black font-bold' : 'glass'}">${m[2]}</div></div>`).join('');
            win.scrollTop = win.scrollHeight;
        }

        async function sendMsg() {
            const val = document.getElementById('chat-in').value; if(!val) return;
            document.getElementById('chat-in').value = '';
            await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'sendMessage', uid: user.uid, message: val }) });
            loadChat();
        }

        async function submitKYC() {
            const hash = prompt("Tx Hash:"); if(!hash) return;
            loading(true);
            const res = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'submitKYC', uid: user.uid, hash: hash }) })).json();
            loading(false); alert(res.msg);
        }

        async function loadAdmin() {
            const res = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'adminGetUsers', uid: user.uid }) })).json();
            document.getElementById('admin-list').innerHTML = res.data.map(u => `<div class="bg-white/5 p-4 rounded-2xl flex justify-between"><div><p class="text-xs font-bold">${u.username}</p><p class="text-[8px] text-slate-500">${u.uid}</p></div><p class="text-xs font-black text-sky-400">${parseFloat(u.balance).toFixed(2)}</p></div>`).join('');
        }

        function adminPost() {
            const msg = prompt("Broadcast News:");
            if(msg) fetch(API, { method: 'POST', body: JSON.stringify({ action: 'broadcast', message: msg }) });
        }

        function go(scr, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + scr).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('nav-active', 'text-slate-600'));
            if(el) el.classList.add('nav-active');
            if(scr === 'news') loadNews();
            if(scr === 'chat') loadChat();
            if(scr === 'admin') loadAdmin();
        }

        function toggleAuth(reg) {
            document.getElementById('login-box').classList.toggle('hidden', reg);
            document.getElementById('reg-box').classList.toggle('hidden', !reg);
        }
        function loading(s) { document.getElementById('loader').classList.toggle('hidden', !s); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
