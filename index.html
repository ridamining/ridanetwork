<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rida Network | Mining Node</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap');
        body { background: #020617; color: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-prime { background: linear-gradient(135deg, #38bdf8 0%, #6366f1 100%); transition: 0.3s; }
        .mining-glow { box-shadow: 0 0 40px rgba(56, 189, 248, 0.15); }
        .tab-content { display: none; height: 100%; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="max-w-md mx-auto flex flex-col border-x border-white/5">

    <div id="auth-screen" class="fixed inset-0 z-[100] bg-[#020617] flex flex-col p-8 hidden">
        <div class="mt-20 text-center">
            <h1 class="text-4xl font-black italic tracking-tighter text-sky-400">RIDA<span class="text-white">NETWORK</span></h1>
            <p class="text-[8px] tracking-[0.6em] opacity-30 uppercase mt-2">Mobile Mining Protocol</p>
        </div>
        
        <div class="mt-12 space-y-4">
            <div id="login-fields" class="space-y-4">
                <input type="text" id="auth-uid" placeholder="RIDA ID (e.g. RIDA-101)" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-sky-500 text-sm">
                <input type="password" id="auth-pass" placeholder="Security PIN" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-sky-500 text-sm">
                <button onclick="handleAuth('login')" class="w-full btn-prime py-5 rounded-2xl font-black text-xs tracking-widest uppercase">Start Node Session</button>
                <p class="text-center text-[10px] opacity-40 uppercase font-black">Need a Node? <button onclick="toggleAuth(false)" class="text-sky-400">Register</button></p>
            </div>

            <div id="register-fields" class="space-y-4 hidden">
                <input type="text" id="reg-user" placeholder="Create Username" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-sky-500 text-sm">
                <input type="password" id="reg-pass" placeholder="Create PIN" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-sky-500 text-sm">
                <input type="text" id="reg-ref" placeholder="Referral ID (Optional)" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-sky-500 text-sm">
                <button onclick="handleAuth('register')" class="w-full btn-prime py-5 rounded-2xl font-black text-xs tracking-widest uppercase">Initialize Node</button>
                <p class="text-center text-[10px] opacity-40 uppercase font-black">Existing Node? <button onclick="toggleAuth(true)" class="text-sky-400">Login</button></p>
            </div>
        </div>
    </div>

    <header class="p-6 flex justify-between items-center glass">
        <div>
            <h2 id="display-name" class="text-lg font-black uppercase italic tracking-tight text-white">---</h2>
            <div class="flex items-center gap-2">
                <p id="display-uid" class="text-[8px] font-mono text-sky-400/60">NODE-ID: SYNCING...</p>
            </div>
        </div>
        <button onclick="logout()" class="h-10 w-10 flex items-center justify-center rounded-full bg-white/5 text-red-500 text-xs"><i class="fas fa-power-off"></i></button>
    </header>

    <main class="flex-1 overflow-y-auto p-4 pb-24">
        
        <div id="tab-home" class="tab-content active space-y-6">
            <div class="glass p-8 rounded-[3rem] text-center mining-glow border-b border-sky-500/20">
                <p class="text-[8px] font-black tracking-[0.4em] opacity-30 uppercase mb-2">Validated Balance</p>
                <h3 class="text-5xl font-black italic tracking-tighter text-white"><span id="balance">0.00</span> <span class="text-xs not-italic text-sky-400">RIDA</span></h3>
            </div>

            <div class="flex flex-col items-center py-10">
                <div class="relative">
                    <div id="spinner" class="absolute inset-0 rounded-full border-2 border-sky-500/20 hidden"></div>
                    <button onclick="startMining()" id="mine-btn" class="h-44 w-44 btn-prime rounded-full flex flex-col items-center justify-center shadow-2xl active:scale-95 transition-all border-4 border-white/10 relative z-10">
                        <i class="fas fa-microchip text-3xl mb-2"></i>
                        <span class="text-[9px] font-black uppercase tracking-[0.2em]">Start Miner</span>
                    </button>
                </div>
                <p id="mining-status" class="mt-8 text-[9px] font-black uppercase tracking-[0.5em] text-slate-600">Status: Node Ready</p>
            </div>
        </div>

        <div id="tab-wallet" class="tab-content space-y-4">
            <div class="glass p-6 rounded-3xl border-t border-sky-500/20">
                <h4 class="text-[10px] font-black uppercase mb-4 opacity-40 tracking-widest">Network Expansion</h4>
                <div class="flex justify-between items-center bg-black/40 p-4 rounded-2xl border border-white/5">
                    <div>
                        <p class="text-[7px] opacity-40 uppercase mb-1">Your Referral Code</p>
                        <p id="refer-code" class="text-sm font-black text-sky-400 tracking-widest">---</p>
                    </div>
                    <button onclick="copyRef()" class="btn-prime px-5 py-2 rounded-xl text-[9px] font-black uppercase">Copy Link</button>
                </div>
                <div class="mt-4 flex justify-between text-[10px] px-2 font-black">
                    <span class="opacity-30 uppercase">Active Referrals:</span>
                    <span id="refer-count" class="text-sky-400 font-mono">0</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="glass p-6 rounded-3xl text-center border border-white/5">
                    <i class="fas fa-arrow-up-right text-sky-400 mb-2"></i>
                    <p class="text-[9px] font-black uppercase tracking-widest">Send RIDA</p>
                </div>
                <div class="glass p-6 rounded-3xl text-center border border-white/5">
                    <i class="fas fa-users text-sky-400 mb-2"></i>
                    <p class="text-[9px] font-black uppercase tracking-widest">P2P Hub</p>
                </div>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass py-5 flex justify-around items-center px-10 z-50">
        <button onclick="showTab('home')" id="nav-home" class="text-sky-400 transition-all"><i class="fas fa-bolt text-xl"></i></button>
        <button onclick="showTab('wallet')" id="nav-wallet" class="opacity-20 hover:opacity-100 transition-all"><i class="fas fa-wallet text-xl"></i></button>
        <a href="https://ridamining.github.io/ridanetwork/explorer" class="opacity-20 hover:opacity-100 transition-all"><i class="fas fa-globe text-xl"></i></a>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbwzJFT4ZYDvT2TEuo-3TPUIyNOCUMtCHiMRE7qutU-rd08ZIPFMfSXCULNENPB9OM9r/exec";
        let userData = JSON.parse(localStorage.getItem('rida_user')) || null;

        window.onload = () => {
            if(!userData) {
                document.getElementById('auth-screen').classList.remove('hidden');
            } else {
                syncData();
            }
        };

        function toggleAuth(showLogin) {
            document.getElementById('login-fields').classList.toggle('hidden', !showLogin);
            document.getElementById('register-fields').classList.toggle('hidden', showLogin);
        }

        async function handleAuth(type) {
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "CONNECTING...";
            
            let payload = { action: type };
            if(type === 'login') {
                payload.uid = document.getElementById('auth-uid').value.trim();
                payload.pass = document.getElementById('auth-pass').value.trim();
            } else {
                payload.username = document.getElementById('reg-user').value.trim();
                payload.pass = document.getElementById('reg-pass').value.trim();
                payload.refBy = document.getElementById('reg-ref').value.trim();
            }

            try {
                const res = await (await fetch(API, { method: 'POST', body: JSON.stringify(payload) })).json();
                if(res.success) {
                    userData = res.data;
                    localStorage.setItem('rida_user', JSON.stringify(userData));
                    document.getElementById('auth-screen').classList.add('hidden');
                    syncData();
                } else {
                    alert(res.msg);
                }
            } catch (e) { alert("Link Error: Check internet connection."); }
            btn.innerText = originalText;
        }

        function logout() {
            localStorage.removeItem('rida_user');
            location.reload();
        }

        async function syncData() {
            if(!userData) return;
            
            // Immediate UI update from local storage
            document.getElementById('display-name').innerText = userData.username;
            document.getElementById('display-uid').innerText = "ID: " + userData.uid;
            document.getElementById('refer-code').innerText = userData.uid; // Your ID IS your code

            // Live Sync with Google Sheet
            try {
                const res = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getUser', uid: userData.uid }) })).json();
                if(res.success) {
                    userData = res.data;
                    localStorage.setItem('rida_user', JSON.stringify(userData));
                    document.getElementById('balance').innerText = parseFloat(userData.balance).toFixed(2);
                    document.getElementById('refer-count').innerText = userData.refCount || 0;
                }
            } catch (e) { console.warn("Live sync delayed..."); }
        }

        async function startMining() {
            const btn = document.getElementById('mine-btn');
            const status = document.getElementById('mining-status');
            
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-sync animate-spin text-3xl mb-2"></i><span class="text-[9px] font-black uppercase">Hashing</span>`;
            status.innerText = "Status: Mining Block...";
            status.classList.add('text-sky-400');

            try {
                const res = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'mine', uid: userData.uid }) })).json();
                if(res.success) {
                    setTimeout(() => {
                        syncData();
                        alert("Mining Complete! Node Rewards Distributed.");
                        resetMiner();
                    }, 3000);
                } else {
                    alert(res.msg);
                    resetMiner();
                }
            } catch (e) { 
                alert("Mining Interrupt: Connection lost."); 
                resetMiner();
            }
        }

        function resetMiner() {
            const btn = document.getElementById('mine-btn');
            const status = document.getElementById('mining-status');
            btn.disabled = false;
            btn.innerHTML = `<i class="fas fa-microchip text-3xl mb-2"></i><span class="text-[9px] font-black uppercase">Start Miner</span>`;
            status.innerText = "Status: Node Ready";
            status.classList.remove('text-sky-400');
        }

        function showTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.add('opacity-20'));
            document.getElementById('nav-'+t).classList.remove('opacity-20');
            document.getElementById('nav-'+t).classList.add('text-sky-400');
        }

        function copyRef() {
            const link = `https://ridamining.github.io/ridanetwork/?ref=${userData.uid}`;
            navigator.clipboard.writeText(link);
            alert("Referral Link Copied!");
        }
    </script>
</body>
</html>
