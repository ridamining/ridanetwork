<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rida Network</title>
<style>
body {
  margin:0;
  font-family:system-ui;
  background:#020617;
  color:#fff;
}
.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}
.card{
  background:#0f172a;
  padding:15px;
  border-radius:14px;
  margin-bottom:12px;
  box-shadow:0 0 15px rgba(0,0,0,0.5);
}
input,button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
}
button{
  background:linear-gradient(45deg,#06b6d4,#3b82f6);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#020617;
  z-index:10;
}
.nav button{
  flex:1;
  background:none;
  color:#fff;
}
.hidden{display:none;}
.mining{
  text-align:center;
  color:#22c55e;
  font-size:20px;
  animation:pulse 1s infinite;
}
@keyframes pulse{
  50%{opacity:0.5;}
}
.chat{
  height:150px;
  overflow:auto;
  background:#020617;
  padding:10px;
  border-radius:10px;
}
</style>
</head>
<body>

<div class="container">

<!-- AUTH -->
<div id="auth">
<h2>Rida Network</h2>
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<input id="wallet" placeholder="BSC Wallet">
<input id="ref" placeholder="Referral Code (Optional)">
<button onclick="register()">Register</button>
<hr>
<input id="lemail" placeholder="Email">
<input id="lpassword" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<!-- HOME -->
<div id="home" class="card">
<h3 id="userName"></h3>
<p>Email: <span id="userEmail"></span></p>
<p>Balance: <span id="balance">0</span> RIDA</p>
<p>Status: <span id="status"></span></p>

<div class="card">
<h3>Mining</h3>
<div id="miningBox">Inactive</div>
<p id="timer"></p>
<button onclick="mine()">Claim & Start Mining</button>
</div>

<div class="card">
<h3>Broadcast</h3>
<div id="broadcast"></div>
</div>
</div>

<!-- PROFILE -->
<div id="profile" class="card hidden">
<h3>Profile</h3>
<p>Name: <span id="pname"></span></p>
<p>Email: <span id="pemail"></span></p>
<p>Wallet: <span id="pwallet"></span></p>
<p>UID: <span id="puid"></span></p>
<p>Referral: <span id="pref"></span></p>
</div>

<!-- TRANSFER -->
<div id="transfer" class="card hidden">
<h3>Send RIDA</h3>
<input id="toUID" placeholder="Receiver UID">
<input id="amount" type="number" placeholder="Amount (min 10)">
<button onclick="send()">Send</button>
</div>

<!-- CHAT -->
<div id="chatPage" class="card hidden">
<h3>Support Chat</h3>
<div class="chat" id="chatBox"></div>
<input id="msg">
<button onclick="sendMsg()">Send</button>
</div>

</div>

<!-- NAV -->
<div class="nav hidden" id="navBar">
<button onclick="nav('home')">Home</button>
<button onclick="nav('profile')">Profile</button>
<button onclick="nav('transfer')">Transfer</button>
<button onclick="nav('chatPage')">Chat</button>
<button onclick="logout()">Logout</button>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycby72ufm-zdJVDeuz3QWewT4wJF4NLVHw6yGKyHBtRHSvwur-Nu6Z3SCxl8yGcGlzgfeMA/exec";

let user=null;

// REGISTER
function register(){
fetch(API,{
method:"POST",
body:JSON.stringify({
action:"register",
name:name.value,
email:email.value,
password:password.value,
wallet:wallet.value,
ref:ref.value
})
}).then(r=>r.json()).then(d=>alert(d.status));
}

// LOGIN
function login(){
fetch(API,{
method:"POST",
body:JSON.stringify({
action:"login",
email:lemail.value,
password:lpassword.value
})
}).then(r=>r.json()).then(d=>{
if(d.status==="success"){
user=d.user;
localStorage.setItem("user",JSON.stringify(user));
startApp();
}else alert("Invalid login");
});
}

// START APP
function startApp(){
auth.classList.add("hidden");
app.classList.remove("hidden");
navBar.classList.remove("hidden");

user=JSON.parse(localStorage.getItem("user"));

userName.innerText=user.name;
userEmail.innerText=user.email;
balance.innerText=user.balance;
status.innerText=user.isVerified ? "Verified" : "Unverified";

// PROFILE
pname.innerText=user.name;
pemail.innerText=user.email;
pwallet.innerText=user.wallet;
puid.innerText=user.uid;
pref.innerText=user.referralCode || "None";

loadBroadcast();
loadChat();
updateTimer();
}

// NAV
function nav(p){
['home','profile','transfer','chatPage'].forEach(x=>{
document.getElementById(x).classList.add('hidden');
});
document.getElementById(p).classList.remove('hidden');
}

// MINING
function mine(){
fetch(API,{
method:"POST",
body:JSON.stringify({action:"mine",uid:user.uid})
})
.then(r=>r.json())
.then(d=>{
if(d.status==="success"){
balance.innerText=d.balance;
alert("Mining success!");
}else alert(d.status);
});
}

// TIMER
function updateTimer(){
setInterval(()=>{
let last=new Date(user.lastCheckIn||0);
let now=new Date();
let diff=86400000-(now-last);
if(diff>0){
let h=Math.floor(diff/3600000);
let m=Math.floor((diff%3600000)/60000);
timer.innerText="Next claim in "+h+"h "+m+"m";
}else{
timer.innerText="Ready to mine!";
}
},1000);
}

// TRANSFER
function send(){
let amt = Number(amount.value);
if(amt<10){alert("Minimum 10 RIDA"); return;}
fetch(API,{
method:"POST",
body:JSON.stringify({
action:"transfer",
from:user.uid,
to:toUID.value,
amount:amt
})
})
.then(r=>r.json())
.then(d=>{
alert(d.status);
if(d.status==="Success") balance.innerText=d.newBalance;
});
}

// BROADCAST
function loadBroadcast(){
fetch(API,{
method:"POST",
body:JSON.stringify({action:"getBroadcasts"})
})
.then(r=>r.json())
.then(d=>{
if(d.status==="success"){
broadcast.innerHTML=d.data.map(x=>`<p>📢 ${x.msg}</p>`).join("");
}
});
}

// CHAT
function sendMsg(){
if(msg.value.trim()==="") return;
fetch(API,{
method:"POST",
body:JSON.stringify({action:"sendMsg",uid:user.uid,msg:msg.value})
});
msg.value="";
}

function loadChat(){
setInterval(()=>{
fetch(API,{
method:"POST",
body:JSON.stringify({action:"getMsg",uid:user.uid})
})
.then(r=>r.json())
.then(d=>{
chatBox.innerHTML=d.data.map(x=>`<p>${x.from}: ${x.msg}</p>`).join("");
});
},3000);
}

// LOGOUT
function logout(){
localStorage.clear();
location.reload();
}

// AUTO LOGIN
if(localStorage.getItem("user")) startApp();
</script>

</body>
</html>
