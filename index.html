<script>
const API = "https://script.google.com/macros/s/AKfycbxi-O3HM35ytPK_Hic8R5eJibliPih8b3gsNNvkU62Bk62n4npIAz9DZShx_ECpKATyVg/exec";

let user = JSON.parse(localStorage.getItem('rida_v13_1'));
let mineInterval = null;

// ---------------- INIT ----------------
window.onload = () => {
    if (user) {
        sync();
        setInterval(sync, 30000);
    } else {
        document.getElementById('authPage').classList.remove('hidden');
    }
};

// ---------------- API ----------------
function call(action, payload, callback) {
    const cb = 'cb_' + Date.now();

    window[cb] = (data) => {
        delete window[cb];
        script.remove();
        callback(data);
    };

    const script = document.createElement('script');
    script.src = `${API}?callback=${cb}&action=${action}&payload=${encodeURIComponent(JSON.stringify(payload))}`;

    document.body.appendChild(script);
}

// ---------------- SYNC ----------------
function sync() {
    if (!user) return;

    call('sync', { email: user.email, uid: user.uid }, (res) => {
        if (res.success) {
            user = res.user;
            localStorage.setItem('rida_v13_1', JSON.stringify(user));
            renderUI(res);
        } else logout();
    });
}

// ---------------- UI ----------------
function renderUI(fullRes) {
    document.getElementById('authPage').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');

    document.getElementById('viewName').innerText = user.name;
    document.getElementById('viewUid').innerText = user.uid;
    document.getElementById('viewBal').innerText = Number(user.bal || 0).toFixed(2);

    document.getElementById('refLink').value =
        window.location.origin + window.location.pathname + "?ref=" + user.uid;

    const badge = document.getElementById('viewStatus');

    if (String(user.verified).toUpperCase() === "TRUE") {
        badge.className = "badge-v";
        badge.innerText = "VERIFIED";
    } else {
        badge.className = "badge-u";
        badge.innerText = "UNVERIFIED";
    }

    if (user.role === "ADMIN") {
        document.getElementById('adminTab').classList.remove('hidden');
    }

    if (fullRes.announcements?.length) {
        document.getElementById('annText').innerText = fullRes.announcements[0][1];
    }

    checkMiningStatus();
    loadChat();

    if (user.role === "ADMIN") loadAdminChats();
}

// ---------------- AUTH ----------------
function handleAuth() {
    const email = document.getElementById('uEmail').value.trim();
    const pass = document.getElementById('uPass').value.trim();
    const name = document.getElementById('uName').value.trim();
    const isReg = !document.getElementById('regInputs').classList.contains('hidden');

    if (!email || !pass || (isReg && !name)) {
        alert("All fields required");
        return;
    }

    const btn = document.getElementById('authBtn');
    btn.disabled = true;
    btn.innerText = "Processing...";

    call(isReg ? 'register' : 'login',
        { email, pass, name },
        (res) => {
            btn.disabled = false;
            btn.innerText = "Connect Node";

            if (res.success) {
                if (isReg) {
                    alert("Registered! Login now.");
                    toggleAuth();
                } else {
                    user = res.user;
                    localStorage.setItem('rida_v13_1', JSON.stringify(user));
                    sync();
                }
            } else {
                alert(res.msg || "Error");
            }
        }
    );
}

// ---------------- MINING ----------------
function checkMiningStatus() {
    const btn = document.getElementById('mineBtn');

    if (mineInterval) clearInterval(mineInterval);

    if (user.lastMine > 0) {
        const diff = Date.now() - user.lastMine;

        if (diff < 86400000) {
            btn.disabled = true;
            updateCountdown(86400000 - diff);
        } else {
            btn.innerText = "Claim 0.2 RIDA";
            btn.onclick = claim;
        }
    } else {
        btn.innerText = "Start Mining";
        btn.onclick = processMining;
    }
}

function updateCountdown(ms) {
    const btn = document.getElementById('mineBtn');

    mineInterval = setInterval(() => {
        ms -= 1000;

        if (ms <= 0) {
            clearInterval(mineInterval);
            sync();
            return;
        }

        const h = Math.floor(ms / 3600000);
        const m = Math.floor((ms % 3600000) / 60000);
        const s = Math.floor((ms % 60000) / 1000);

        btn.innerText = `${h}H ${m}M ${s}S`;
    }, 1000);
}

function processMining() {
    call('startMining', { uid: user.uid }, sync);
}

function claim() {
    call('claimMining', { uid: user.uid }, sync);
}

// ---------------- CHAT ----------------
function sendMsg() {
    const input = document.getElementById('chatInp');
    const text = input.value;

    if (!text) return;

    call('sendMessage',
        { uid: user.uid, sender: user.name, text },
        () => {
            input.value = "";
            loadChat();
        });
}

function loadChat() {
    call('getMessages', { uid: user.uid }, (res) => {
        if (!res.history) return;

        const box = document.getElementById('chatBox');

        box.innerHTML = res.history.map(m => `
            <div class="p-2 rounded-xl ${m.sender === 'ADMIN' ? 'bg-white/5' : 'bg-indigo-500/10 text-right'}">
                <p class="text-[8px] opacity-40">${m.sender}</p>
                <p>${m.text}</p>
            </div>
        `).join('');

        box.scrollTop = box.scrollHeight;
    });
}

// ---------------- ADMIN ----------------
function loadAdminChats() {
    call('getMessages', { isAdmin: true }, (res) => {
        if (!res.history) return;

        const hub = document.getElementById('adminChatHub');

        const groups = {};

        res.history.forEach(m => {
            if (!groups[m.uid]) groups[m.uid] = [];
            groups[m.uid].push(m);
        });

        hub.innerHTML = Object.entries(groups).map(([uid, msgs]) => `
            <div class="glass p-4 text-xs">
                <b>${uid}</b>
                ${msgs.map(m => `<p><b>${m.sender}:</b> ${m.text}</p>`).join('')}
                <input id="reply-${uid}" placeholder="Reply..." />
                <button onclick="adminReply('${uid}')">Reply</button>
            </div>
        `).join('');
    });
}

function adminReply(uid) {
    const text = document.getElementById(`reply-${uid}`).value;
    if (!text) return;

    call('sendMessage',
        { uid, sender: "ADMIN", text },
        loadAdminChats
    );
}

// ---------------- UTIL ----------------
function logout() {
    localStorage.clear();
    location.reload();
}

function toggleAuth() {
    document.getElementById('regInputs').classList.toggle('hidden');
}

function switchTab(t, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + t).classList.add('active');

    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
    el.classList.add('nav-active');
}
                    </script>
