<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RIDA NETWORK v12.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #050508; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #a855f7); border-radius: 16px; font-weight: 700; transition: 0.2s; }
        .btn-primary:active { transform: scale(0.95); }
        .btn-primary:disabled { opacity: 0.5; filter: grayscale(1); }
        .page { display: none; padding-bottom: 120px; animation: fadeIn 0.3s ease-in-out; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-item { color: #64748b; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .nav-active { color: #6366f1; }
        .badge-v { background: rgba(34, 197, 94, 0.1); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.2); font-size: 9px; padding: 2px 8px; border-radius: 6px; }
        .badge-u { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); font-size: 9px; padding: 2px 8px; border-radius: 6px; }
    </style>
</head>
<body class="p-4">

    <div id="authPage" class="min-h-screen flex flex-col justify-center max-w-md mx-auto">
        <h1 class="text-5xl font-extrabold mb-8 text-center tracking-tighter">RIDA<span class="text-indigo-500">.</span></h1>
        <div class="glass p-8 space-y-4">
            <div id="regInputs" class="hidden">
                <input id="uName" type="text" placeholder="Full Name" class="w-full p-4 bg-white/5 rounded-xl border border-white/10 outline-none">
                <input id="uRef" type="text" placeholder="Referral Code (Optional)" class="w-full p-4 bg-white/5 rounded-xl border border-white/10 outline-none mt-4">
            </div>
            <input id="uEmail" type="email" placeholder="Email" class="w-full p-4 bg-white/5 rounded-xl border border-white/10 outline-none">
            <input id="uPass" type="password" placeholder="Password" class="w-full p-4 bg-white/5 rounded-xl border border-white/10 outline-none">
            <button onclick="handleAuth()" class="w-full py-4 btn-primary uppercase tracking-widest text-sm">Connect Node</button>
            <p id="toggleText" onclick="toggleAuth()" class="text-center text-xs text-slate-500 cursor-pointer pt-2">New user? Register account</p>
        </div>
    </div>

    <div id="mainApp" class="hidden max-w-md mx-auto">
        <header class="flex justify-between items-center mb-6 px-2">
            <div>
                <div class="flex items-center gap-2">
                    <h2 id="viewName" class="font-bold text-lg">---</h2>
                    <span id="viewStatus" class="badge-u">Unverified</span>
                </div>
                <p id="viewUid" class="text-xs text-indigo-400 font-mono font-bold">---</p>
            </div>
            <div class="text-right">
                <p id="viewBal" class="text-3xl font-extrabold tracking-tighter">0.00</p>
                <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">RIDA Asset</p>
            </div>
        </header>

        <div id="page-home" class="page active space-y-6">
            <div id="latestAnn" class="glass p-4 border-l-4 border-indigo-500 relative overflow-hidden">
                <div class="flex justify-between items-start mb-1">
                    <span class="text-[9px] font-black uppercase text-indigo-400">Latest Update</span>
                    <button onclick="toggleAnnModal(true)" class="text-[9px] text-slate-500 underline font-bold">Archive</button>
                </div>
                <p id="annText" class="text-xs text-slate-200 line-clamp-2">No active updates...</p>
            </div>

            <div class="glass p-10 flex flex-col items-center justify-center space-y-6 text-center shadow-xl">
                <div class="relative w-52 h-52 flex items-center justify-center border-4 border-indigo-500/20 rounded-full">
                    <div id="miningPulse" class="absolute inset-0 border-4 border-indigo-500 rounded-full animate-ping opacity-0"></div>
                    <div>
                        <span id="mineTimer" class="text-4xl font-black text-indigo-400">0.20</span>
                        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">Daily Yield</p>
                    </div>
                </div>
                <button id="mineBtn" onclick="processMining()" class="w-full py-5 btn-primary uppercase text-xs tracking-widest">Initialize Mining</button>
                <p id="timerLabel" class="text-xs text-slate-400 font-medium italic">Ready for extraction</p>
            </div>
        </div>

        <div id="page-profile" class="page space-y-4">
            <div class="glass p-6 space-y-4 border-t-4 border-indigo-500">
                <h3 class="text-xs font-black uppercase tracking-widest text-indigo-400">P2P Transfer</h3>
                <div class="space-y-3">
                    <input id="p2pTarget" type="text" placeholder="Receiver UID" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none text-xs">
                    <input id="p2pAmount" type="number" placeholder="Amount (Min 10)" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none text-xs">
                    <button onclick="processP2P()" class="w-full py-4 btn-primary text-[10px] uppercase font-bold tracking-widest">Send RIDA</button>
                </div>
            </div>

            <div class="glass p-6 space-y-4">
                <h3 class="text-xs font-black uppercase tracking-widest text-indigo-400">Ledger History</h3>
                <div id="txList" class="space-y-3 max-h-60 overflow-y-auto pr-2">
                    <p class="text-[10px] text-slate-500 text-center py-4">No recent activity</p>
                </div>
            </div>

            <div class="glass p-6">
                <h3 class="text-xs font-black uppercase tracking-widest text-indigo-400 mb-4">Referral Link</h3>
                <input id="refLink" readonly class="bg-indigo-500/10 p-4 rounded-xl text-xs w-full outline-none font-mono text-indigo-300 mb-2">
                <button onclick="copyRef()" class="w-full text-[10px] font-black text-indigo-400 uppercase tracking-widest">Copy Link</button>
            </div>

            <div class="glass p-6 space-y-4">
                <h3 class="text-xs font-black uppercase tracking-widest text-indigo-400">Support</h3>
                <div id="chatBox" class="h-48 overflow-y-auto space-y-3 p-2 text-xs border-y border-white/5 py-4"></div>
                <div class="flex gap-2">
                    <input id="chatInp" type="text" placeholder="Message..." class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none text-xs">
                    <button onclick="sendMsg()" class="px-4 btn-primary text-[10px] font-black">SEND</button>
                </div>
            </div>
            <button onclick="logout()" class="w-full text-center text-[10px] text-red-500/50 font-bold uppercase py-4">Disconnect Node</button>
        </div>

        <div id="page-admin" class="page space-y-6">
            <div class="glass p-6 space-y-4">
                <h2 class="text-xs font-black text-indigo-400 uppercase">Broadcast</h2>
                <textarea id="adminAnnInp" class="w-full bg-black/30 p-4 rounded-xl text-xs outline-none border border-white/10 h-20"></textarea>
                <button onclick="postAnnouncement()" class="w-full py-3 btn-primary text-[10px] uppercase font-bold">Post Update</button>
            </div>
            <div id="adminChatHub" class="space-y-4"></div>
        </div>

        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md glass flex justify-around p-4 z-50">
            <button onclick="switchTab('home', this)" class="nav-item nav-active flex flex-col items-center">
                <span class="text-xl mb-1">⚡</span><span>Mine</span>
            </button>
            <button onclick="switchTab('profile', this)" class="nav-item flex flex-col items-center">
                <span class="text-xl mb-1">👤</span><span>Profile</span>
            </button>
            <button id="adminTab" onclick="switchTab('admin', this)" class="nav-item hidden flex flex-col items-center">
                <span class="text-xl mb-1">⚙️</span><span>Admin</span>
            </button>
        </nav>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzn-QEd3KX4ng0CJa8mHyKoffsuJmkQn6s4FECPSzjwucJWAHy-ND-oyo9TC4GhyBoFjA/exec";
        let user = JSON.parse(localStorage.getItem('rida_v12_5'));
        let allAnnouncements = [];
        let transactions = [];

        window.onload = () => { 
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('ref')) sessionStorage.setItem('pendingRef', urlParams.get('ref'));
            if(user) { sync(); setInterval(sync, 30000); } 
        };

        function sync() {
            call('sync', { email: user.email, uid: user.uid }, (res) => {
                if(res.success) {
                    user = res.user;
                    allAnnouncements = res.announcements || [];
                    transactions = res.transactions || [];
                    localStorage.setItem('rida_v12_5', JSON.stringify(user));
                    renderUI();
                } else logout();
            });
        }

        function renderUI() {
            document.getElementById('authPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('viewName').innerText = user.name;
            document.getElementById('viewUid').innerText = user.uid;
            document.getElementById('viewBal').innerText = parseFloat(user.bal).toFixed(2);
            document.getElementById('refLink').value = `${window.location.origin + window.location.pathname}?ref=${user.uid}`;
            
            const badge = document.getElementById('viewStatus');
            if(String(user.verified).toUpperCase() === "TRUE") { badge.className = "badge-v"; badge.innerText = "Verified"; }
            else { badge.className = "badge-u"; badge.innerText = "Unverified"; }
            
            if(user.role === "ADMIN") document.getElementById('adminTab').classList.remove('hidden');
            if(allAnnouncements.length > 0) document.getElementById('annText').innerText = allAnnouncements[0][1];
            
            const txBox = document.getElementById('txList');
            if(transactions.length > 0) {
                txBox.innerHTML = transactions.map(t => {
                    const isOut = t.from === user.uid;
                    const color = isOut ? 'text-red-400' : 'text-green-400';
                    const prefix = isOut ? '-' : '+';
                    return `
                        <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl">
                            <div>
                                <p class="text-[10px] font-bold uppercase tracking-tighter">${t.type}</p>
                                <p class="text-[8px] opacity-40">${new Date(t.date).toLocaleDateString()}</p>
                            </div>
                            <p class="font-black ${color}">${prefix}${parseFloat(t.amt).toFixed(2)}</p>
                        </div>
                    `;
                }).join('');
            }

            checkMiningStatus(); loadChat();
            if(user.role === "ADMIN") loadAdminChats();
        }

        function processP2P() {
            const target = document.getElementById('p2pTarget').value;
            const amount = document.getElementById('p2pAmount').value;
            if(!target || !amount) return alert("Fill all fields");
            if(confirm(`Send ${amount} RIDA to ${target}?`)) {
                call('p2p', { senderUid: user.uid, targetUid: target, amount: amount }, (res) => {
                    alert(res.msg);
                    if(res.success) { sync(); document.getElementById('p2pTarget').value = ""; document.getElementById('p2pAmount').value = ""; }
                });
            }
        }

        function checkMiningStatus() {
            const btn = document.getElementById('mineBtn'); const pulse = document.getElementById('miningPulse'); const label = document.getElementById('timerLabel');
            if(user.lastMine > 0) {
                const diff = new Date().getTime() - user.lastMine;
                if(diff < 86400000) { pulse.classList.remove('opacity-0'); btn.disabled = true; updateCountdown(86400000 - diff); label.innerText = "Mining Active"; } 
                else { btn.innerText = "Claim 0.2 RIDA"; btn.disabled = false; btn.onclick = claim; label.innerText = "Yield ready"; }
            } else { btn.innerText = "Start Mining"; btn.disabled = false; btn.onclick = processMining; label.innerText = "Ready"; }
        }
        function updateCountdown(ms) {
            const btn = document.getElementById('mineBtn');
            const interval = setInterval(() => { ms -= 1000; if(ms <= 0) { clearInterval(interval); sync(); return; }
                const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000), s = Math.floor((ms%60000)/1000);
                btn.innerText = `${h}h ${m}m ${s}s`;
            }, 1000);
        }
        function processMining() { call('startMining', { uid: user.uid }, () => { sync(); }); }
        function claim() { call('claimMining', { uid: user.uid }, (res) => { if(res.success) sync(); }); }
        function loadChat() {
            call('getMessages', { uid: user.uid }, (res) => {
                if(!res.history) return;
                document.getElementById('chatBox').innerHTML = res.history.map(m => `<div class="p-2 rounded-xl ${m.sender === 'ADMIN' ? 'bg-white/5 mr-6' : 'bg-indigo-500/10 ml-6 text-right'}"><p class="text-[10px] opacity-40">${m.sender}</p><p>${m.text}</p></div>`).join('');
                const b = document.getElementById('chatBox'); b.scrollTop = b.scrollHeight;
            });
        }
        function sendMsg() {
            const t = document.getElementById('chatInp').value; if(!t) return;
            call('sendMessage', { uid: user.uid, sender: user.name, text: t }, () => { document.getElementById('chatInp').value = ""; loadChat(); });
        }
        function loadAdminChats() {
            call('getMessages', { isAdmin: true }, (res) => {
                if(!res.history) return;
                const groups = {}; res.history.forEach(m => { if(!groups[m.uid]) groups[m.uid] = []; groups[m.uid].push(m); });
                document.getElementById('adminChatHub').innerHTML = Object.entries(groups).map(([uid, msgs]) => `
                    <div class="glass p-4 space-y-2 text-[10px]"><p class="font-bold text-indigo-400">Node: ${uid}</p>
                        <div class="max-h-24 overflow-y-auto space-y-1">${msgs.map(m => `<div><b>${m.sender}:</b> ${m.text}</div>`).join('')}</div>
                        <div class="flex gap-1"><input id="reply-${uid}" placeholder="..." class="w-full bg-black/30 p-2 rounded-lg outline-none border border-white/5">
                            <button onclick="adminReply('${uid}')" class="bg-indigo-500 px-3 rounded-lg font-bold">Reply</button>
                            <button onclick="adminVerify('${uid}')" class="bg-green-600 px-3 rounded-lg font-bold">Verify</button>
                        </div>
                    </div>`).join('');
            });
        }
        function adminReply(target) { const v = document.getElementById('reply-'+target).value; if(!v) return; call('sendMessage', { uid: target, sender: "ADMIN", text: v }, () => loadAdminChats()); }
        function adminVerify(target) { if(confirm("Verify node?")) call('adminAction', { targetUid: target, type: 'verify' }, () => { alert('Verified!'); sync(); }); }
        function handleAuth() {
            let isR = !document.getElementById('regInputs').classList.contains('hidden');
            const e = document.getElementById('uEmail').value, p = document.getElementById('uPass').value;
            const refCode = sessionStorage.getItem('pendingRef') || document.getElementById('uRef').value || "none";
            call(isR ? 'register' : 'login', { email: e, pass: p, name: document.getElementById('uName').value, ref: refCode }, (res) => {
                if(res.success) { if(isR) { alert("Registered!"); toggleAuth(); } else { user = res.user; localStorage.setItem('rida_v12_5', JSON.stringify(user)); sync(); }
                } else alert(res.msg || "Auth Failed");
            });
        }
        function toggleAuth() { const ri = document.getElementById('regInputs'); const h = ri.classList.toggle('hidden'); document.getElementById('toggleText').innerText = h ? "New user? Register account" : "Existing node? Login"; }
        function switchTab(t, el) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById('page-' + t).classList.add('active'); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active')); el.classList.add('nav-active'); }
        function postAnnouncement() { const t = document.getElementById('adminAnnInp').value; if(!t) return; call('postAnn', { text: t }, () => { alert("Success!"); document.getElementById('adminAnnInp').value = ""; sync(); }); }
        function call(action, payload, callback) { const cb = 'cb_' + Math.round(Math.random()*10000); window[cb] = (d) => { delete window[cb]; document.body.removeChild(s); callback(d); }; const s = document.createElement('script'); s.src = `${API}?callback=${cb}&action=${action}&payload=${encodeURIComponent(JSON.stringify(payload))}`; document.body.appendChild(s); }
        function copyRef() { const link = document.getElementById('refLink'); link.select(); document.execCommand('copy'); alert("Copied!"); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
        </html>
