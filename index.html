<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rida Network • Mine RIDA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');
        :root { --primary: #00ff9d; }
        body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(180deg, #0a0a0a, #111113); }
        .title-font { font-family: 'Space Grotesk', sans-serif; }
        .neon-text { text-shadow: 0 0 15px #00ff9d, 0 0 35px #00ff9d; }
        .glass { background: rgba(15,23,42,0.92); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .mining-ring { animation: miningPulse 3s infinite ease-in-out; }
        .mining-active .mining-ring { animation: miningActive 2.2s infinite linear; }
        @keyframes miningPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        @keyframes miningActive { from { transform: rotate(0deg) scale(1); } to { transform: rotate(360deg) scale(1.08); } }
        .tab-active { color: #00ff9d; border-bottom: 3px solid #00ff9d; font-weight: 600; }
    </style>
</head>
<body class="text-white min-h-screen pb-20">

    <nav class="bg-[#111113] border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-5 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-[#00ff9d] text-black font-bold text-3xl flex items-center justify-center rounded-2xl rotate-12">R</div>
                <h1 class="title-font text-3xl font-semibold tracking-tighter neon-text">RIDA NETWORK</h1>
            </div>
            <div class="flex items-center gap-x-6">
                <div onclick="navigateTo('profile')" class="flex items-center gap-x-3 cursor-pointer">
                    <div id="header-avatar" class="w-9 h-9 bg-gradient-to-br from-[#00ff9d] to-emerald-500 rounded-2xl flex items-center justify-center font-bold text-black">U</div>
                    <div><p id="header-name" class="font-medium text-sm">User</p></div>
                </div>
                <button onclick="logout()" class="text-red-400">Logout</button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-5 pt-8">

        <div class="text-center mb-8">
            <button onclick="testConnection()" 
                    class="bg-yellow-500 hover:bg-yellow-600 text-black px-8 py-4 rounded-3xl font-semibold">
                🔄 Test Backend Connection
            </button>
            <p id="connection-status" class="mt-4 text-sm"></p>
        </div>

        <!-- Auth Modal -->
        <div id="auth-modal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-[9999]">
            <div class="glass max-w-md w-full mx-4 rounded-3xl p-8">
                <div class="flex justify-center mb-8">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-[#00ff9d] rounded-2xl flex items-center justify-center text-4xl text-black rotate-12">R</div>
                        <h1 class="title-font text-4xl font-bold neon-text">RIDA NETWORK</h1>
                    </div>
                </div>
                <div id="login-form">
                    <input id="login-email" type="email" placeholder="Email" class="w-full mb-4 bg-[#1a1a1f] border border-white/10 rounded-3xl px-6 py-5">
                    <input id="login-password" type="password" placeholder="Password" class="w-full mb-8 bg-[#1a1a1f] border border-white/10 rounded-3xl px-6 py-5">
                    <button onclick="performLogin()" class="w-full py-6 bg-[#00ff9d] text-black font-semibold rounded-3xl">LOGIN</button>
                    <p onclick="switchToRegister()" class="text-center mt-6 text-[#00ff9d] cursor-pointer">Register</p>
                </div>
                <div id="register-form" class="hidden">
                    <input id="reg-name" placeholder="Full Name" class="w-full mb-4 bg-[#1a1a1f] border border-white/10 rounded-3xl px-6 py-5">
                    <input id="reg-email" type="email" placeholder="Email" class="w-full mb-4 bg-[#1a1a1f] border border-white/10 rounded-3xl px-6 py-5">
                    <input id="reg-password" type="password" placeholder="Password" class="w-full mb-8 bg-[#1a1a1f] border border-white/10 rounded-3xl px-6 py-5">
                    <button onclick="performRegister()" class="w-full py-6 bg-[#00ff9d] text-black font-semibold rounded-3xl">REGISTER</button>
                    <p onclick="switchToLogin()" class="text-center mt-6 text-[#00ff9d] cursor-pointer">Login</p>
                </div>
            </div>
        </div>

        <p class="text-center text-white/60">If you see this page, the UI is loaded. Click the Test button above first.</p>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyF2uu5oG3rGDuyLj2WXEfT67sH1rrfC8obYaJn4qMqZc1vouwxBCouOwU1wENWQx6rgg/exec";

        let currentUser = null;

        async function testConnection() {
            const status = document.getElementById("connection-status");
            status.textContent = "Testing connection...";
            
            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action: "login", email: "test@test.com", password: "123" })
                });

                const text = await res.text();
                console.log("Raw response from backend:", text);

                let data;
                try { data = JSON.parse(text); } 
                catch(e) { data = { success: false, error: "Invalid JSON: " + text }; }

                if (data.success) {
                    status.innerHTML = `<span class="text-green-400">✅ Backend Connected Successfully!</span>`;
                    showToast("Backend is working! You can now login.", false);
                } else {
                    status.innerHTML = `<span class="text-red-400">❌ ${data.error || 'Failed'}</span>`;
                }
            } catch (err) {
                console.error(err);
                status.innerHTML = `<span class="text-red-400">❌ Fetch Error: ${err.message}</span>`;
                showToast("Cannot reach backend. Check deployment.", true);
            }
        }

        function showToast(msg, isError = false) {
            const toast = document.createElement("div");
            toast.style.position = "fixed";
            toast.style.bottom = "20px";
            toast.style.left = "50%";
            toast.style.transform = "translateX(-50%)";
            toast.style.background = isError ? "#ef4444" : "#00ff9d";
            toast.style.color = isError ? "#fff" : "#000";
            toast.style.padding = "16px 24px";
            toast.style.borderRadius = "9999px";
            toast.style.boxShadow = "0 10px 15px -3px rgb(0 0 0 / 0.3)";
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        async function performLogin() {
            const email = document.getElementById("login-email").value.trim().toLowerCase();
            const password = document.getElementById("login-password").value;
            const result = await callAPI("login", { email, password });
            if (result && result.user) {
                currentUser = result.user;
                document.getElementById("auth-modal").classList.add("hidden");
                showToast("Login successful! Welcome to Rida Network", false);
            }
        }

        async function performRegister() {
            // Similar to login - you can expand later
            showToast("Registration working (demo)", false);
        }

        function switchToRegister() {
            document.getElementById("login-form").classList.add("hidden");
            document.getElementById("register-form").classList.remove("hidden");
        }

        function switchToLogin() {
            document.getElementById("register-form").classList.add("hidden");
            document.getElementById("login-form").classList.remove("hidden");
        }

        async function callAPI(action, payload = {}) {
            try {
                const body = { action, ...payload };
                if (currentUser) body.email = currentUser.email;

                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });

                const data = await res.json();
                return data;
            } catch (e) {
                console.error("API Error:", e);
                return { success: false, error: e.message };
            }
        }

        function logout() { location.reload(); }
        function navigateTo() { showToast("Navigation ready - login first", false); }

        window.onload = () => {
            document.getElementById("auth-modal").classList.remove("hidden");
            console.log("%cRida Network Frontend v1.5 - Ready", "color:#00ff9d");
        };
    </script>
</body>
</html>
