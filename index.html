<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIDA OS | MASTER</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; background:#010409; color:white; margin:0; }
.glass { background: rgba(13,17,23,0.9); backdrop-filter: blur(25px); border:1px solid rgba(255,255,255,0.05); }
.hidden { display:none !important; }
button:disabled { opacity:0.5; cursor:not-allowed; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginView" class="min-h-screen flex items-center justify-center p-6">
  <div class="glass p-10 rounded-3xl text-center max-w-sm w-full">
    <h1 class="text-4xl font-black text-blue-500 mb-6">RIDA</h1>
    <input type="email" id="email" placeholder="Email" class="w-full mb-4 p-4 rounded-xl bg-white/5 border border-white/10">
    <input type="password" id="pass" placeholder="Password" class="w-full mb-6 p-4 rounded-xl bg-white/5 border border-white/10">
    <button onclick="handleLogin()" class="w-full py-4 bg-blue-600 rounded-xl font-bold uppercase">Login</button>
    <button onclick="showRegister()" class="w-full mt-2 py-2 bg-white/10 rounded-xl">Register</button>
  </div>
</div>

<!-- REGISTER -->
<div id="registerView" class="hidden min-h-screen flex items-center justify-center p-6">
  <div class="glass p-10 rounded-3xl text-center max-w-sm w-full">
    <h1 class="text-3xl font-black text-green-400 mb-6">Create Account</h1>
    <input type="text" id="r_name" placeholder="Name" class="w-full mb-4 p-4 rounded-xl bg-white/5 border border-white/10">
    <input type="email" id="r_email" placeholder="Email" class="w-full mb-4 p-4 rounded-xl bg-white/5 border border-white/10">
    <input type="password" id="r_pass" placeholder="Password" class="w-full mb-6 p-4 rounded-xl bg-white/5 border border-white/10">
    <button onclick="handleRegister()" class="w-full py-4 bg-green-600 rounded-xl font-bold uppercase">Register</button>
    <button onclick="showLogin()" class="w-full mt-2 py-2 bg-white/10 rounded-xl">Back to Login</button>
  </div>
</div>

<!-- USER APP -->
<div id="userApp" class="hidden p-6">
  <header class="flex justify-between mb-6">
    <h2 class="text-xl font-bold">RIDA MINER</h2>
    <button onclick="logout()" class="text-red-500"><i data-lucide="log-out"></i></button>
  </header>
  <div class="glass p-6 rounded-xl text-center mb-6">
    <h3 class="mb-2">Balance</h3>
    <p id="uBal" class="text-2xl font-bold">0.000000</p>
    <button onclick="startMining()" id="mineBtn" class="w-full py-3 mt-4 bg-blue-600 rounded-xl font-bold">Start Mining</button>
    <p id="mineMsg" class="mt-2 text-xs text-gray-400"></p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden p-6">
  <header class="flex justify-between mb-6">
    <h2 class="text-xl font-bold text-blue-500">Command Center</h2>
    <button onclick="logout()" class="text-red-500"><i data-lucide="power"></i></button>
  </header>
  <div class="glass p-6 rounded-xl mb-4">
    <h3 class="mb-2">Broadcast Announcement</h3>
    <input type="text" id="annText" placeholder="Announcement" class="w-full p-3 rounded-xl bg-white/5 border border-white/10 mb-2">
    <button onclick="broadcastAnnouncement()" class="w-full py-3 bg-blue-600 rounded-xl font-bold">Send</button>
  </div>
  <button onclick="fetchRegistry()" class="w-full py-3 bg-blue-600 rounded-xl mb-4 font-bold">Sync Registry</button>
  <div class="glass rounded-xl overflow-auto">
    <table class="w-full text-left">
      <thead class="text-xs text-gray-400 uppercase">
        <tr><th class="p-2">UID</th><th class="p-2">Email</th><th class="p-2">Balance</th></tr>
      </thead>
      <tbody id="registryBody">
        <tr><td colspan="3" class="p-4 text-center opacity-30">Sync Pending...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwA5xH5h2tzwKlvxDNEbmpHMQTNGZOgPlBmAKqkPaTceIXFOh8e0IQ6l41fgtXiJLYc0g/exec";

function showRegister(){ document.getElementById('loginView').classList.add('hidden'); document.getElementById('registerView').classList.remove('hidden'); }
function showLogin(){ document.getElementById('registerView').classList.add('hidden'); document.getElementById('loginView').classList.remove('hidden'); }

function handleRegister(){
  const name = document.getElementById('r_name').value.trim();
  const email = document.getElementById('r_email').value.trim();
  const pass = document.getElementById('r_pass').value.trim();
  if(!name||!email||!pass){ alert("All fields required"); return; }

  fetch(`${WEB_APP_URL}?action=register&payload=${encodeURIComponent(JSON.stringify({name,email,pass}))}`)
    .then(r=>r.text()).then(t=>{
      const data = JSON.parse(t.replace(/^[^\(]*\(|\)$/g,""));
      if(data.success){ alert("Registered successfully!"); showLogin(); }
      else alert(data.msg);
    });
}

function handleLogin(){
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('pass').value.trim();
  if(!email||!pass){ alert("All fields required"); return; }

  fetch(`${WEB_APP_URL}?action=login&payload=${encodeURIComponent(JSON.stringify({email,pass}))}`)
    .then(r=>r.text()).then(t=>{
      const data = JSON.parse(t.replace(/^[^\(]*\(|\)$/g,""));
      if(data.success){
        localStorage.setItem('rida_session', JSON.stringify(data.user));
        renderView();
      } else alert(data.msg);
    });
}

function renderView(){
  const session = JSON.parse(localStorage.getItem('rida_session'));
  document.getElementById('loginView').classList.add('hidden');
  document.getElementById('registerView').classList.add('hidden');
  document.getElementById('userApp').classList.add('hidden');
  document.getElementById('adminPanel').classList.add('hidden');

  if(!session) document.getElementById('loginView').classList.remove('hidden');
  else if(session.role==="ADMIN") document.getElementById('adminPanel').classList.remove('hidden');
  else { 
    document.getElementById('userApp').classList.remove('hidden'); 
    document.getElementById('uBal').innerText = parseFloat(session.bal||0).toFixed(6); 
  }
  lucide.createIcons();
}

function logout(){ localStorage.removeItem('rida_session'); location.reload(); }

function startMining(){
  const session = JSON.parse(localStorage.getItem('rida_session'));
  const btn = document.getElementById('mineBtn');
  const msg = document.getElementById('mineMsg');
  btn.disabled = true; msg.innerText = "Mining in progress...";

  fetch(`${WEB_APP_URL}?action=startMining&payload=${encodeURIComponent(JSON.stringify({uid: session.uid}))}`)
    .then(r=>r.text()).then(t=>{
      const data = JSON.parse(t.replace(/^[^\(]*\(|\)$/g,""));
      if(data.success){ 
        session.bal = data.bal; 
        localStorage.setItem('rida_session',JSON.stringify(session));
        document.getElementById('uBal').innerText = data.bal.toFixed(6);
        msg.innerText = "Mining 0.2 RIDA completed!";
      } else msg.innerText = data.msg;
      setTimeout(()=>{ btn.disabled=false; msg.innerText=""; }, 1000);
    });
}

function broadcastAnnouncement(){
  const session = JSON.parse(localStorage.getItem('rida_session'));
  const text = document.getElementById('annText').value.trim();
  if(!text) return alert("Enter text");
  fetch(`${WEB_APP_URL}?action=postAnnouncement&payload=${encodeURIComponent(JSON.stringify({uid:session.uid,text}))}`)
    .then(r=>r.text()).then(t=>{
      const data = JSON.parse(t.replace(/^[^\(]*\(|\)$/g,""));
      if(data.success){ alert("Announcement Sent"); document.getElementById('annText').value=''; }
      else alert(data.msg);
    });
}

function fetchRegistry(){
  fetch(`${WEB_APP_URL}?action=sync&payload=${encodeURIComponent(JSON.stringify({uid:"admin"}))}`)
    .then(r=>r.text()).then(t=>{
      const data = JSON.parse(t.replace(/^[^\(]*\(|\)$/g,""));
      const tbody = document.getElementById('registryBody');
      if(data.success){
        tbody.innerHTML = `<tr><td>${data.user.uid}</td><td>${data.user.email}</td><td>${parseFloat(data.user.bal).toFixed(6)}</td></tr>`;
      } else tbody.innerHTML = `<tr><td colspan="3" class="p-4 text-center opacity-30">${data.msg}</td></tr>`;
    });
}

window.onload = renderView;
</script>
</body>
</html>
