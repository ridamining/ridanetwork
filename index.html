<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rida Network | V9.2 Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap');
        :root { --sky: #38bdf8; --bg: #020617; }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-main { background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .btn-main:active { transform: scale(0.95); opacity: 0.9; }
        .hidden { display: none; }
        .nav-active { color: var(--sky) !important; filter: drop-shadow(0 0 10px var(--sky)); }
        .section { height: calc(100vh - 180px); overflow-y: auto; padding-bottom: 120px; scrollbar-width: none; }
        .section::-webkit-scrollbar { display: none; }
        @keyframes pulse-neon { 0% { box-shadow: 0 0 5px var(--sky); } 50% { box-shadow: 0 0 20px var(--sky); } 100% { box-shadow: 0 0 5px var(--sky); } }
        .mining-glow { animation: pulse-neon 2s infinite; border: 2px solid var(--sky); }
    </style>
</head>
<body class="max-w-md mx-auto relative border-x border-white/5">

    <div id="loader" class="fixed inset-0 z-[100] bg-black/95 flex flex-col items-center justify-center hidden">
        <div class="w-10 h-10 border-2 border-sky-500/20 border-t-sky-500 rounded-full animate-spin mb-4"></div>
        <p class="text-[10px] font-black tracking-widest text-sky-400 uppercase">Synchronizing...</p>
    </div>

    <div id="auth-scr" class="h-full p-8 flex flex-col justify-center">
        <div class="text-center mb-10">
            <h1 class="text-7xl font-black italic tracking-tighter">RIDA<span class="text-sky-400">.</span></h1>
            <p class="text-slate-500 text-[10px] font-bold tracking-[0.4em] uppercase mt-2">Serverless Node V9.2</p>
        </div>
        
        <div id="login-box" class="glass p-8 rounded-[3rem] space-y-4">
            <input type="email" id="l-email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none">
            <input type="password" id="l-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none">
            <button onclick="auth('login')" class="w-full btn-main p-4 rounded-2xl font-bold">Sign In</button>
            <p class="text-center text-xs text-slate-500 pt-2">New Miner? <span class="text-sky-400 font-bold cursor-pointer" onclick="toggleAuth(true)">Register</span></p>
        </div>

        <div id="reg-box" class="glass p-8 rounded-[3rem] space-y-4 hidden">
            <input type="text" id="r-user" placeholder="Username" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none">
            <input type="email" id="r-email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none">
            <input type="password" id="r-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none">
            <button onclick="auth('register')" class="w-full btn-main p-4 rounded-2xl font-bold">Create Node</button>
            <p class="text-center text-xs text-slate-500 pt-2"><span class="text-sky-400 font-bold cursor-pointer" onclick="toggleAuth(false)">Back to Login</span></p>
        </div>
    </div>

    <div id="app-scr" class="h-full hidden flex flex-col">
        <header class="p-8 flex justify-between items-start">
            <div>
                <p id="u-uid" class="text-sky-500 text-[9px] font-black tracking-widest">---</p>
                <h2 id="u-name" class="text-2xl font-black italic">MINER</h2>
            </div>
            <div id="adm-badge" class="hidden px-4 py-1.5 bg-red-500/10 border border-red-500/30 rounded-full text-[8px] font-black text-red-500 uppercase tracking-widest">Admin</div>
        </header>

        <main class="flex-1 px-8">
            <div id="sec-home" class="section space-y-6">
                <div class="btn-main p-8 rounded-[2.5rem] shadow-2xl relative" onclick="go('verify')">
                    <p class="text-white/50 text-[10px] font-bold uppercase tracking-widest mb-1">Live Balance</p>
                    <h1 id="u-bal" class="text-5xl font-black tabular-nums tracking-tighter">0.000000</h1>
                    <div id="u-v-tag" class="mt-4 text-[9px] font-black uppercase flex items-center gap-2"></div>
                </div>

                <div class="glass p-10 rounded-[3.5rem] text-center">
                    <div id="m-off">
                        <button onclick="mine()" class="w-32 h-32 rounded-full btn-main mx-auto flex items-center justify-center">
                            <i class="fas fa-hammer text-3xl"></i>
                        </button>
                        <p class="mt-6 font-bold text-slate-400 uppercase text-xs tracking-widest">Start Mining</p>
                    </div>
                    <div id="m-on" class="hidden">
                        <div class="w-32 h-32 rounded-full mx-auto flex items-center justify-center mining-glow">
                            <i class="fas fa-bolt text-3xl text-sky-400 animate-pulse"></i>
                        </div>
                        <p id="timer" class="mt-6 font-mono text-3xl font-black text-sky-400">24:00:00</p>
                    </div>
                </div>
            </div>

            <div id="sec-news" class="section hidden space-y-4">
                <h3 class="text-2xl font-black italic">Network News</h3>
                <div id="news-feed" class="space-y-4"></div>
            </div>

            <div id="sec-chat" class="section hidden flex flex-col h-full">
                <h3 class="text-2xl font-black italic mb-4">Support</h3>
                <div id="chat-win" class="flex-1 glass rounded-3xl p-4 overflow-y-auto space-y-3 mb-4"></div>
                <div class="flex gap-2 mb-24">
                    <input type="text" id="chat-in" placeholder="Message Admin..." class="flex-1 bg-white/5 p-4 rounded-2xl border border-white/10 outline-none">
                    <button onclick="sendMsg()" class="btn-main px-6 rounded-2xl"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>

            <div id="sec-verify" class="section hidden space-y-6">
                <h3 class="text-2xl font-black italic">Verify Account</h3>
                <div class="glass p-8 rounded-[2.5rem] text-center">
                    <p class="text-xs text-slate-400 mb-6">Send 5$ USDT (BEP20) to address below:</p>
                    <div class="bg-black/40 p-4 rounded-2xl mb-6 border border-white/10 text-[10px] font-mono text-sky-400 break-all">0xCeC73F7C0e6709eD740Bc8f486fa6623bC0873b3</div>
                    <button onclick="submitKYC()" class="w-full btn-main p-4 rounded-2xl font-bold">Submit Hash</button>
                </div>
            </div>

            <div id="sec-admin" class="section hidden space-y-6">
                <div class="flex justify-between items-center"><h3 class="text-2xl font-black italic text-red-500">Admin</h3><button onclick="postNews()" class="text-[10px] text-sky-400 font-black uppercase">Post News</button></div>
                <div id="admin-list" class="space-y-2"></div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 h-24 glass border-t border-white/10 flex justify-around items-center px-6 rounded-t-[2.5rem] z-50">
            <i onclick="go('home', this)" class="nav-btn fas fa-home text-xl nav-active cursor-pointer"></i>
            <i onclick="go('news', this)" class="nav-btn fas fa-broadcast-tower text-xl text-slate-600 cursor-pointer"></i>
            <i onclick="go('chat', this)" class="nav-btn fas fa-comment-dots text-xl text-slate-600 cursor-pointer"></i>
            <i onclick="go('admin', this)" id="nav-adm" class="nav-btn fas fa-user-shield text-xl text-slate-600 hidden cursor-pointer"></i>
            <i onclick="logout()" class="fas fa-power-off text-xl text-red-500/20 cursor-pointer"></i>
        </nav>
    </div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbxZkM6ByisCu77DDdweHv8-na8wuiAqqZ97pQ2YUjgpRqsgowZvIBR0QONbpT-FzFbf/exec';
        let user = JSON.parse(localStorage.getItem('rida_v92_user')) || null;
        let ticker;

        window.onload = () => { if(user) start(); };

        async function auth(action) {
            load(true);
            const data = action === 'login' ? 
                { action, email: document.getElementById('l-email').value, password: document.getElementById('l-pass').value } :
                { action, username: document.getElementById('r-user').value, email: document.getElementById('r-email').value, password: document.getElementById('r-pass').value };
            try {
                const r = await (await fetch(API, { method: 'POST', body: JSON.stringify(data) })).json();
                if(r.success) {
                    if(action === 'login') { user = r.data; localStorage.setItem('rida_v92_user', JSON.stringify(user)); start(); }
                    else { alert("Created! Please Login."); toggleAuth(false); }
                } else alert(r.msg);
            } catch(e) { alert("Server Connection Error"); }
            load(false);
        }

        function start() {
            document.getElementById('auth-scr').classList.add('hidden');
            document.getElementById('app-scr').classList.remove('hidden');
            document.getElementById('u-name').innerText = user.username.toUpperCase();
            document.getElementById('u-uid').innerText = user.uid;
            if(user.role === 'Admin') { document.getElementById('adm-badge').classList.remove('hidden'); document.getElementById('nav-adm').classList.remove('hidden'); }
            sync();
        }

        async function sync() {
            const r = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getDashboard', uid: user.uid }) })).json();
            if(r.success) {
                const d = r.data;
                const tag = document.getElementById('u-v-tag');
                if(d.verified === 'Yes') { tag.innerHTML = '<i class="fas fa-check-circle"></i> Verified'; tag.className = "mt-4 text-[9px] font-black uppercase text-green-400"; }
                else { tag.innerHTML = '<i class="fas fa-circle-exclamation"></i> Unverified'; tag.className = "mt-4 text-[9px] font-black uppercase text-red-400"; }
                
                if(d.miningStatus === 'Active') {
                    tick(d.balance, d.lastMiningTime);
                    timer(d.lastMiningTime);
                } else document.getElementById('u-bal').innerText = parseFloat(d.balance).toFixed(6);
            }
        }

        function tick(base, start) {
            if(ticker) clearInterval(ticker);
            ticker = setInterval(() => {
                const earned = ((Date.now() - parseInt(start)) / 1000) * (0.2 / 86400);
                document.getElementById('u-bal').innerText = (parseFloat(base) + earned).toFixed(6);
            }, 1000);
        }

        function timer(start) {
            document.getElementById('m-off').classList.add('hidden');
            document.getElementById('m-on').classList.remove('hidden');
            setInterval(() => {
                const rem = 86400000 - (Date.now() - parseInt(start));
                if(rem <= 0) location.reload();
                const h = Math.floor(rem/3600000).toString().padStart(2,'0');
                const m = Math.floor((rem%3600000)/60000).toString().padStart(2,'0');
                const s = Math.floor((rem%60000)/1000).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        async function mine() { load(true); await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'startMining', uid: user.uid }) }); location.reload(); }

        async function loadNews() {
            const r = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getAnnouncements' }) })).json();
            document.getElementById('news-feed').innerHTML = r.data.map(n => `<div class="glass p-5 rounded-[2rem]"><p class="text-[9px] text-sky-400 font-bold mb-1">${new Date(n[0]).toLocaleDateString()}</p><p class="text-sm">${n[1]}</p></div>`).join('');
        }

        async function loadChat() {
            const r = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getMessages', uid: user.uid }) })).json();
            const win = document.getElementById('chat-win');
            win.innerHTML = r.data.map(m => `<div class="flex ${m[0] === user.uid ? 'justify-end' : 'justify-start'}"><div class="px-4 py-2 rounded-2xl text-xs ${m[0] === user.uid ? 'bg-sky-500 text-black font-bold' : 'glass'}">${m[2]}</div></div>`).join('');
            win.scrollTop = win.scrollHeight;
        }

        async function sendMsg() {
            const i = document.getElementById('chat-in'); if(!i.value) return;
            await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'sendMessage', uid: user.uid, message: i.value }) });
            i.value = ''; loadChat();
        }

        async function submitKYC() {
            const h = prompt("USDT TxHash:");
            if(h) { load(true); await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'submitKYC', uid: user.uid, hash: h }) }); load(false); alert("Submitted!"); }
        }

        async function loadAdmin() {
            const r = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'adminGetUsers', uid: user.uid }) })).json();
            document.getElementById('admin-list').innerHTML = r.data.map(u => `<div class="bg-white/5 p-4 rounded-2xl flex justify-between"><div><p class="text-xs font-bold">${u.username}</p><p class="text-[8px] text-slate-500 uppercase">${u.uid}</p></div><p class="text-xs font-black text-sky-400">${parseFloat(u.balance).toFixed(2)}</p></div>`).join('');
        }

        function go(s, el) {
            document.querySelectorAll('.section').forEach(x => x.classList.add('hidden'));
            document.getElementById('sec-' + s).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('nav-active', 'text-slate-600'));
            if(el) el.classList.add('nav-active');
            if(s === 'news') loadNews(); if(s === 'chat') loadChat(); if(s === 'admin') loadAdmin();
        }

        function postNews() { const m = prompt("News Content:"); if(m) fetch(API, { method: 'POST', body: JSON.stringify({ action: 'broadcast', message: m }) }); }
        function toggleAuth(r) { document.getElementById('login-box').classList.toggle('hidden', r); document.getElementById('reg-box').classList.toggle('hidden', !r); }
        function load(s) { document.getElementById('loader').classList.toggle('hidden', !s); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
