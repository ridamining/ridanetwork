<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rida Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #38bdf8; --bg: #070b14; }
        body { background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; height: 100vh; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        .hidden { display: none; }
        .active-nav { color: var(--primary) !important; }
    </style>
</head>
<body class="max-w-md mx-auto relative border-x border-white/5">

    <div id="loader" class="fixed inset-0 z-[100] bg-black flex flex-col items-center justify-center hidden">
        <div class="w-12 h-12 border-4 border-sky-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <div id="screen-auth" class="h-full p-8 flex flex-col justify-center">
        <h1 class="text-4xl font-black text-center mb-10">RIDA<span class="text-sky-400">.</span></h1>
        <div id="login-box" class="glass p-8 rounded-[2rem] space-y-4">
            <input type="email" id="l-email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none">
            <input type="password" id="l-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none">
            <button onclick="auth('login')" class="w-full bg-sky-500 p-4 rounded-xl font-bold">Login</button>
            <p class="text-center text-sm">No account? <span class="text-sky-400 cursor-pointer" onclick="toggleAuth(true)">Register</span></p>
        </div>
        <div id="reg-box" class="glass p-8 rounded-[2rem] space-y-4 hidden">
             <input type="text" id="r-user" placeholder="Username" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none">
             <input type="email" id="r-email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none">
             <input type="password" id="r-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none">
             <button onclick="auth('register')" class="w-full bg-sky-500 p-4 rounded-xl font-bold">Create Account</button>
             <p class="text-center text-sm"><span class="text-sky-400 cursor-pointer" onclick="toggleAuth(false)">Back to Login</span></p>
        </div>
    </div>

    <div id="screen-app" class="h-full hidden flex flex-col">
        <div class="p-6 flex justify-between items-center">
            <h2 id="u-name" class="font-bold">Miner</h2>
            <div id="admin-badge" class="hidden px-3 py-1 bg-red-500 rounded-full text-[10px] font-bold">ADMIN</div>
        </div>

        <div class="flex-1 overflow-y-auto px-6 pb-24">
            
            <div id="sec-home" class="section space-y-6">
                <div class="bg-gradient-to-br from-sky-500 to-indigo-600 p-8 rounded-[2rem]">
                    <p class="text-xs opacity-70">Balance</p>
                    <h1 id="u-bal" class="text-4xl font-black">0.0000 RDA</h1>
                </div>
                <div class="glass p-10 rounded-[2rem] text-center" id="mining-ctrl">
                    <button onclick="startMining()" class="w-32 h-32 rounded-full bg-sky-500 shadow-lg shadow-sky-500/50">
                        <i class="fas fa-hammer text-3xl"></i>
                    </button>
                    <p class="mt-4 font-bold">Start Mining</p>
                </div>
            </div>

            <div id="sec-wallet" class="section hidden space-y-4">
                <h3 class="text-xl font-bold">My Wallet</h3>
                <div class="glass p-6 rounded-2xl">
                    <p class="text-sm text-slate-400">Withdrawal is currently locked for Mainnet launch.</p>
                </div>
            </div>

            <div id="sec-team" class="section hidden space-y-4">
                <h3 class="text-xl font-bold">My Team</h3>
                <div class="glass p-6 rounded-2xl">
                    <p class="text-xs text-slate-400">Referral Code:</p>
                    <p id="u-ref" class="text-sky-400 font-mono font-bold">---</p>
                </div>
            </div>

            <div id="sec-admin" class="section hidden space-y-4">
                <h3 class="text-xl font-bold text-red-400">Admin Console</h3>
                <button class="w-full bg-white/5 p-4 rounded-xl border border-white/10">View Total Users</button>
                <button class="w-full bg-white/5 p-4 rounded-xl border border-white/10">Adjust Global Rates</button>
            </div>

        </div>

        <nav class="fixed bottom-0 left-0 right-0 h-20 glass flex items-center justify-around">
            <i onclick="showSection('home', this)" class="nav-btn fas fa-home text-xl active-nav"></i>
            <i onclick="showSection('wallet', this)" class="nav-btn fas fa-wallet text-xl text-slate-600"></i>
            <i onclick="showSection('team', this)" class="nav-btn fas fa-users text-xl text-slate-600"></i>
            <i id="nav-admin" onclick="showSection('admin', this)" class="nav-btn fas fa-shield-halved text-xl text-slate-600 hidden"></i>
        </nav>
    </div>

    <script>
        const API = 'YOUR_NEW_API_URL_HERE';
        let user = JSON.parse(localStorage.getItem('rida_user')) || null;

        window.onload = () => { if(user) loadApp(); };

        function showSection(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            el.classList.add('active-nav');
        }

        async function auth(mode) {
            toggleLoader(true);
            const data = mode === 'login' ? 
                { action: 'login', email: document.getElementById('l-email').value, password: document.getElementById('l-pass').value } :
                { action: 'register', username: document.getElementById('r-user').value, email: document.getElementById('r-email').value, password: document.getElementById('r-pass').value };

            try {
                const req = await fetch(API, { method: 'POST', body: JSON.stringify(data) });
                const res = await req.json();
                if(res.success) {
                    if(mode === 'login') {
                        user = res.data;
                        localStorage.setItem('rida_user', JSON.stringify(user));
                        loadApp();
                    } else { alert("Registered!"); toggleAuth(false); }
                } else { alert(res.msg); }
            } catch(e) { alert("Error connecting to API"); }
            toggleLoader(false);
        }

        function loadApp() {
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('screen-app').classList.remove('hidden');
            document.getElementById('u-name').innerText = user.username;

            // HANDLE ADMIN ROLE
            if(user.role === 'Admin') {
                document.getElementById('admin-badge').classList.remove('hidden');
                document.getElementById('nav-admin').classList.remove('hidden');
            }
        }

        function toggleAuth(reg) {
            document.getElementById('login-box').classList.toggle('hidden', reg);
            document.getElementById('reg-box').classList.toggle('hidden', !reg);
        }

        function toggleLoader(s) { document.getElementById('loader').classList.toggle('hidden', !s); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
