<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIDA OS | Pro Miner</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; background: #010409; color: white; margin:0; }
.glass { background: rgba(13,17,23,0.9); backdrop-filter: blur(25px); border:1px solid rgba(255,255,255,0.05);}
.hidden { display:none !important; }
.button { transition: all 0.2s ease; }
.button:active { transform: scale(0.95);}
</style>
</head>
<body class="min-h-screen">

<!-- Login / Register -->
<div id="loginView" class="flex items-center justify-center min-h-screen p-6">
    <div class="glass w-full max-w-sm p-10 rounded-[3.5rem] text-center border-t border-white/10 shadow-2xl">
        <h1 class="text-5xl font-black italic text-blue-500 mb-2">RIDA</h1>
        <p class="text-[8px] font-black opacity-30 uppercase tracking-[0.5em] mb-12">Neural Link Pro</p>
        <input type="email" id="email" placeholder="Email Address" class="w-full bg-white/5 p-5 rounded-2xl border border-white/5 outline-none text-sm mb-4 focus:border-blue-500">
        <input type="password" id="pass" placeholder="Password" class="w-full bg-white/5 p-5 rounded-2xl border border-white/5 outline-none text-sm mb-4 focus:border-blue-500">
        <input type="text" id="name" placeholder="Full Name (Register Only)" class="w-full bg-white/5 p-5 rounded-2xl border border-white/5 outline-none text-sm mb-4 focus:border-blue-500">
        <button onclick="handleRegister()" class="w-full py-5 bg-green-600 rounded-2xl font-black uppercase text-[10px] mb-2 button">Register</button>
        <button onclick="handleLogin()" class="w-full py-5 bg-blue-600 rounded-2xl font-black uppercase text-[10px] button">Login</button>
    </div>
</div>

<!-- User Dashboard -->
<div id="userApp" class="hidden p-6">
    <header class="flex justify-between items-center glass p-6 rounded-b-[2.5rem] mb-6">
        <h2 class="text-xl font-black italic">RIDA <span class="text-blue-500 text-sm">MINER</span></h2>
        <button onclick="logout()" class="p-3 bg-white/5 rounded-2xl text-slate-400"><i data-lucide="log-out"></i></button>
    </header>
    <main class="space-y-6 text-center">
        <div class="glass p-12 rounded-[4rem] border-t border-white/10 mt-10">
            <p class="text-[10px] opacity-30 uppercase mb-2">Network Yield</p>
            <h2 class="text-5xl font-black mb-10 tracking-tighter"><span id="uBal">0.000000</span></h2>
            <button id="mineBtn" onclick="startMining()" class="w-full py-6 rounded-3xl bg-blue-600 font-black uppercase text-[10px] tracking-widest shadow-xl button">Start Mining</button>
        </div>

        <div class="glass rounded-[2rem] overflow-hidden border border-white/5">
            <div class="p-5 border-b border-white/5 bg-white/5 text-[10px] font-black uppercase tracking-widest opacity-50">Announcements</div>
            <div id="announcements" class="p-4 text-left text-[11px] space-y-2">Loading...</div>
        </div>
    </main>
</div>

<!-- Admin Panel -->
<div id="adminPanel" class="hidden p-6">
    <header class="flex justify-between items-center glass p-6 rounded-[2.5rem] mb-6">
        <h2 class="text-xl font-black italic text-blue-500">Admin Command Center</h2>
        <button onclick="logout()" class="p-3 bg-red-500/10 rounded-2xl text-red-500"><i data-lucide="power"></i></button>
    </header>
    <textarea id="announceText" placeholder="Type Announcement" class="w-full p-4 rounded-2xl glass mb-4"></textarea>
    <button onclick="postAnnouncement()" class="w-full py-4 bg-blue-600 rounded-2xl font-black uppercase button mb-6">Broadcast</button>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbztmx9pPM_9pmlNpxQaYjxevPCQLUWzg-8njG-bsvC7CiPplOGqSO3h057i0x0Y0BZe/exec";

function jsonpFetch(action, payload){
    return new Promise((resolve,reject)=>{
        const callbackName = "cb_"+Math.floor(Math.random()*100000);
        window[callbackName] = function(res){ resolve(res); delete window[callbackName]; }
        const url = `${WEB_APP_URL}?action=${action}&payload=${encodeURIComponent(JSON.stringify(payload))}&callback=${callbackName}`;
        const s = document.createElement('script');
        s.src = url; s.onerror=()=>reject("Failed"); document.body.appendChild(s);
        setTimeout(()=>{document.body.removeChild(s)},2000);
    });
}

async function handleRegister(){
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('pass').value.trim();
    const name = document.getElementById('name').value.trim();
    if(!email||!pass||!name) return alert("All fields required");
    const res = await jsonpFetch("register",{email,pass,name});
    if(res.success){ alert("Registered!"); localStorage.setItem('rida_session',JSON.stringify(res.user)); renderView();}
    else alert(res.msg);
}

async function handleLogin(){
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('pass').value.trim();
    if(!email||!pass) return alert("All fields required");
    const res = await jsonpFetch("login",{email,pass});
    if(res.success){ localStorage.setItem('rida_session',JSON.stringify(res.user)); renderView(); }
    else alert(res.msg);
}

async function startMining(){
    const session = JSON.parse(localStorage.getItem('rida_session'));
    if(!session) return alert("Please login");
    document.getElementById("mineBtn").disabled=true;
    const res = await jsonpFetch("startMining",{uid:session.uid});
    if(res.success){ session.bal=res.bal; localStorage.setItem('rida_session',JSON.stringify(session)); document.getElementById("uBal").innerText=res.bal.toFixed(6);}
    else alert(res.msg);
    document.getElementById("mineBtn").disabled=false;
}

async function postAnnouncement(){
    const session = JSON.parse(localStorage.getItem('rida_session'));
    const text = document.getElementById('announceText').value.trim();
    if(!session || session.role!="ADMIN") return alert("Not authorized");
    if(!text) return alert("Enter message");
    const res = await jsonpFetch("postAnnouncement",{uid:session.uid,text});
    if(res.success){ alert("Announcement posted"); document.getElementById('announceText').value=""; fetchAnnouncements(); }
    else alert(res.msg);
}

async function fetchAnnouncements(){
    const annDiv = document.getElementById('announcements');
    const sheet = await jsonpFetch("sync",{uid:JSON.parse(localStorage.getItem('rida_session')).uid});
    annDiv.innerHTML = `<div class="italic opacity-50">Announcements will appear here</div>`;
}

function renderView(){
    const session = JSON.parse(localStorage.getItem('rida_session'));
    document.getElementById('loginView').classList.add('hidden');
    document.getElementById('userApp').classList.add('hidden');
    document.getElementById('adminPanel').classList.add('hidden');

    if(!session){ document.getElementById('loginView').classList.remove('hidden'); }
    else if(session.role=="ADMIN"){ document.getElementById('adminPanel').classList.remove('hidden'); fetchAnnouncements(); }
    else { document.getElementById('userApp').classList.remove('hidden'); document.getElementById('uBal').innerText=(session.bal||0).toFixed(6); fetchAnnouncements(); }
    lucide.createIcons();
}

function logout(){ localStorage.clear(); location.reload(); }

window.onload=renderView;
</script>
</body>
</html>
