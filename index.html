<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rida Network • Mine RIDA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');
        :root { --primary: #00ff9d; }
        body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(180deg, #0a0a0a, #111113); }
        .title-font { font-family: 'Space Grotesk', sans-serif; }
        .neon-text { text-shadow: 0 0 15px #00ff9d, 0 0 35px #00ff9d; }
        .glass { background: rgba(15,23,42,0.92); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .mining-ring { animation: miningPulse 3s infinite ease-in-out; }
        .mining-active .mining-ring { animation: miningActive 2.2s infinite linear; }
        @keyframes miningPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        @keyframes miningActive { from { transform: rotate(0deg) scale(1); } to { transform: rotate(360deg) scale(1.08); } }
        .tab-active { color: #00ff9d; border-bottom: 3px solid #00ff9d; font-weight: 600; }
    </style>
</head>
<body class="text-white min-h-screen pb-20">

    <nav class="bg-[#111113] border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-5 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-[#00ff9d] text-black font-bold text-3xl flex items-center justify-center rounded-2xl rotate-12">R</div>
                <h1 class="title-font text-3xl font-semibold tracking-tighter neon-text">RIDA NETWORK</h1>
            </div>
            <div class="flex items-center gap-x-6">
                <div onclick="navigateTo('profile')" class="flex items-center gap-x-3 cursor-pointer">
                    <div id="header-avatar" class="w-9 h-9 bg-gradient-to-br from-[#00ff9d] to-emerald-500 rounded-2xl flex items-center justify-center font-bold text-black">U</div>
                    <div><p id="header-name" class="font-medium text-sm">User</p></div>
                </div>
                <button onclick="logout()" class="text-red-400">Logout</button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-5 pt-8 text-center">
        <button onclick="testConnection()" 
                class="bg-yellow-400 hover:bg-yellow-300 text-black px-10 py-5 rounded-3xl font-bold text-lg mb-8">
            🔄 TEST BACKEND CONNECTION (Click this first)
        </button>
        <p id="status" class="text-lg font-medium"></p>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxbLpBFvHBlJhsko6DjDHnCs4KhMykP_f8bLeEn5TzknFxaQQhfHa-JR5EBD6ixCtVJ/exec";

        async function testConnection() {
            const status = document.getElementById("status");
            status.innerHTML = "Testing connection...";

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },   // This fixes CORS
                    body: JSON.stringify({ action: "login", email: "test@rida.com", password: "123" })
                });

                const text = await response.text();
                console.log("Backend raw response:", text);

                let data = {};
                try { data = JSON.parse(text); } catch(e) {}

                if (data.success) {
                    status.innerHTML = `<span class="text-green-400">✅ Backend Connected Successfully!</span>`;
                    alert("Success! Backend is working.\n\nYou can now login and use the full app.");
                } else {
                    status.innerHTML = `<span class="text-red-400">❌ ${data.error || "Failed"}</span>`;
                }
            } catch (err) {
                console.error(err);
                status.innerHTML = `<span class="text-red-400">❌ Cannot reach backend.<br>Check if you created a NEW deployment.</span>`;
            }
        }

        function logout() { location.reload(); }
        function navigateTo() { alert("Full UI will be enabled after successful connection test."); }

        window.onload = () => {
            console.log("%cRida Network - Connection Test Version Loaded", "color:#00ff9d");
        };
    </script>
</body>
</html>
