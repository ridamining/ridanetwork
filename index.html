<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rida Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .ring { transition: stroke-dashoffset 1s linear; transform: rotate(-90deg); transform-origin: 50% 50%; }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col p-6">
        
        <div v-if="!session.uid" class="flex-grow flex flex-col justify-center space-y-6">
            <h1 class="text-4xl font-bold text-sky-500 text-center">RIDA NETWORK</h1>
            <div class="glass p-6 rounded-2xl space-y-4">
                <input v-model="auth.email" placeholder="Email" class="w-full bg-slate-900 p-4 rounded-xl outline-none border border-slate-700">
                <input v-model="auth.password" type="password" placeholder="Password" class="w-full bg-slate-900 p-4 rounded-xl outline-none border border-slate-700">
                <button @click="handleAuth" class="w-full bg-sky-600 py-4 rounded-xl font-bold">LOGIN / REGISTER</button>
            </div>
        </div>

        <template v-else>
            <div class="flex justify-between items-center mb-8">
                <div>
                    <p class="text-xs text-slate-400">Balance</p>
                    <h2 class="text-2xl font-bold text-sky-400">{{ user.balance.toFixed(4) }} RIDA</h2>
                </div>
                <button @click="logout" class="text-red-400"><i class="fas fa-power-off"></i></button>
            </div>

            <div class="flex-grow">
                <div v-if="tab === 'mine'" class="flex flex-col items-center py-10 space-y-8">
                    <svg width="200" height="200">
                        <circle cx="100" cy="100" r="90" fill="none" stroke="#1e293b" stroke-width="10" />
                        <circle cx="100" cy="100" r="90" fill="none" stroke="#0ea5e9" stroke-width="10" stroke-dasharray="565" :stroke-dashoffset="offset" class="ring" />
                        <text x="50%" y="50%" text-anchor="middle" fill="white" dy=".3em" class="text-xl font-bold">{{ timeLeft }}</text>
                    </svg>
                    
                    <button v-if="!mining.isActive" @click="startMining" class="w-full bg-sky-600 py-5 rounded-2xl font-bold text-lg">START MINING</button>
                    <button v-else-if="canClaim" @click="claimMining" class="w-full bg-green-600 py-5 rounded-2xl font-bold text-lg">CLAIM 0.20 RIDA</button>
                    <div v-else class="text-slate-400 font-bold uppercase tracking-widest">Mining Active...</div>
                </div>

                <div v-if="tab === 'transfer'" class="space-y-4">
                    <h3 class="text-xl font-bold">Transfer RIDA</h3>
                    <input v-model="send.target" placeholder="Recipient UID" class="w-full bg-slate-900 p-4 rounded-xl border border-slate-700 outline-none">
                    <input v-model.number="send.amount" type="number" placeholder="Amount" class="w-full bg-slate-900 p-4 rounded-xl border border-slate-700 outline-none">
                    <button @click="handleTransfer" class="w-full bg-white text-black py-4 rounded-xl font-bold">SEND NOW</button>
                </div>
            </div>

            <nav class="fixed bottom-6 left-6 right-6 max-w-md mx-auto glass rounded-2xl p-2 flex justify-around">
                <button @click="tab = 'mine'" :class="tab === 'mine' ? 'text-sky-400' : 'text-slate-500'" class="p-4"><i class="fas fa-hammer text-xl"></i></button>
                <button @click="tab = 'transfer'" :class="tab === 'transfer' ? 'text-sky-400' : 'text-slate-500'" class="p-4"><i class="fas fa-paper-plane text-xl"></i></button>
            </nav>
        </template>

        <div v-if="loading" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-sky-500"></div>
        </div>
    </div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbyynA7DwNZX3x8Kb5aB6HcAy3QghTO8agBmvKl8vwE5E9ta6FLzy8XB31H5N_elxYNgUw/exec';
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    loading: false, tab: 'mine',
                    auth: { email: '', password: '' },
                    session: { uid: localStorage.getItem('rida_uid') },
                    user: { balance: 0, uid: '' },
                    mining: { isActive: false, startTime: 0 },
                    timeLeft: '24:00:00', offset: 565, canClaim: false,
                    send: { target: '', amount: 0 }
                }
            },
            async mounted() {
                if (this.session.uid) await this.refresh();
                setInterval(this.tick, 1000);
            },
            methods: {
                async call(data) {
                    this.loading = true;
                    try {
                        const res = await fetch(API, {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                            body: JSON.stringify(data)
                        });
                        return await res.json();
                    } catch (e) { return { success: false }; }
                    finally { this.loading = false; }
                },
                async handleAuth() {
                    const res = await this.call({ action: 'register', ...this.auth });
                    const final = res.success ? res : await this.call({ action: 'login', ...this.auth });
                    if (final.uid) {
                        this.session.uid = final.uid;
                        localStorage.setItem('rida_uid', final.uid);
                        await this.refresh();
                    }
                },
                async refresh() {
                    const res = await fetch(`${API}?action=get_data&uid=${this.session.uid}`).then(r => r.json());
                    if (res.success) {
                        this.user = res.user;
                        this.mining = res.mining;
                    }
                },
                async startMining() { await this.call({ action: 'start_mining', uid: this.session.uid }); await this.refresh(); },
                async claimMining() { await this.call({ action: 'claim_mining', uid: this.session.uid }); await this.refresh(); },
                async handleTransfer() {
                    const res = await this.call({ action: 'transfer', ...this.send, uid: this.session.uid });
                    alert(res.success ? "Success!" : res.message);
                    await this.refresh();
                },
                tick() {
                    if (!this.mining.isActive) return;
                    const diff = (Number(this.mining.startTime) + 86400000) - Date.now();
                    if (diff <= 0) {
                        this.timeLeft = "READY";
                        this.offset = 0;
                        this.canClaim = true;
                    } else {
                        const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                        const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                        const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                        this.timeLeft = `${h}:${m}:${s}`;
                        this.offset = (diff / 86400000) * 565;
                    }
                },
                logout() { localStorage.clear(); location.reload(); }
            }
        }).mount('#app');
    </script>
</body>
</html>
