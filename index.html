<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rida Network | Mobile Crypto Mining</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #38bdf8;
            --secondary: #818cf8;
            --bg-dark: #070b14;
            --glass: rgba(255, 255, 255, 0.05);
        }
        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }
        .glass { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .rida-gradient { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); }
        .text-gradient { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Animations */
        .page { transition: all 0.4s ease-in-out; }
        .mining-glow {
            filter: drop-shadow(0 0 15px var(--primary));
            animation: pulse-glow 2s infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 10px var(--primary)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 25px var(--primary)); transform: scale(1.05); }
        }
        .hidden { display: none; }
        input:focus { border-color: var(--primary) !important; outline: none; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen border-x border-white/5">

    <div id="loader" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center hidden">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-sky-400"></div>
    </div>

    <div id="page-auth" class="page min-h-screen p-6 flex flex-col justify-center">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-extrabold mb-2">RIDA<span class="text-sky-400">.</span></h1>
            <p class="text-slate-400">Cloud Mining Ecosystem</p>
        </div>

        <div id="login-box" class="glass p-8 rounded-[2rem]">
            <h2 class="text-2xl font-bold mb-6">Login</h2>
            <input type="email" id="log-email" placeholder="Email Address" class="w-full bg-white/5 p-4 rounded-xl mb-4 border border-white/10">
            <input type="password" id="log-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-xl mb-6 border border-white/10">
            <button onclick="handleLogin()" class="w-full rida-gradient p-4 rounded-xl font-bold text-lg shadow-lg">Enter Dashboard</button>
            <p class="text-center mt-6 text-slate-400 text-sm">New to Rida? <span class="text-sky-400 cursor-pointer" onclick="toggleAuth(true)">Create Account</span></p>
        </div>

        <div id="register-box" class="glass p-8 rounded-[2rem] hidden">
            <h2 class="text-2xl font-bold mb-4">Register</h2>
            <input type="text" id="reg-user" placeholder="Username" class="w-full bg-white/5 p-4 rounded-xl mb-3 border border-white/10">
            <input type="email" id="reg-email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-xl mb-3 border border-white/10">
            <input type="password" id="reg-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-xl mb-3 border border-white/10">
            <input type="text" id="reg-ref" placeholder="Referral Code (Optional)" class="w-full bg-white/5 p-4 rounded-xl mb-6 border border-white/10">
            <button onclick="handleRegister()" class="w-full rida-gradient p-4 rounded-xl font-bold text-lg">Join Network</button>
            <p class="text-center mt-6 text-slate-400 text-sm">Already a member? <span class="text-sky-400 cursor-pointer" onclick="toggleAuth(false)">Login</span></p>
        </div>
    </div>

    <div id="main-app" class="page hidden pb-24">
        <header class="p-6 flex justify-between items-center">
            <div>
                <span class="text-slate-500 text-xs block">WELCOME BACK</span>
                <span id="user-name" class="font-bold text-lg">---</span>
            </div>
            <div id="status-badge" class="px-4 py-1.5 rounded-full glass border-sky-500/30 text-xs font-bold text-sky-400">
                VERIFYING...
            </div>
        </header>

        <div id="tab-dashboard" class="px-6 animate-in fade-in duration-500">
            <div class="rida-gradient p-8 rounded-[2.5rem] shadow-2xl shadow-sky-500/20 relative overflow-hidden">
                <div class="absolute top-0 right-0 p-8 opacity-20">
                    <i class="fas fa-microchip text-6xl"></i>
                </div>
                <p class="text-white/70 text-sm font-medium">TOTAL BALANCE</p>
                <div class="flex items-baseline gap-2 mt-1">
                    <h1 id="balance" class="text-5xl font-black">0.0000</h1>
                    <span class="text-xl font-bold">RDA</span>
                </div>
                <div class="mt-6 flex gap-4">
                    <button class="bg-white/20 px-4 py-2 rounded-full text-xs font-bold backdrop-blur-md">P2P TRANSFER</button>
                    <button class="bg-black/20 px-4 py-2 rounded-full text-xs font-bold">HISTORY</button>
                </div>
            </div>

            <div class="mt-8 text-center p-8 glass rounded-[2.5rem]">
                <div id="mining-idle">
                    <button onclick="startMining()" class="w-40 h-40 rounded-full glass border-4 border-sky-500/30 flex items-center justify-center mx-auto mb-6 group active:scale-95 transition-all">
                        <div class="w-32 h-32 rounded-full rida-gradient flex items-center justify-center shadow-lg shadow-sky-500/40">
                            <i class="fas fa-hammer text-4xl text-white"></i>
                        </div>
                    </button>
                    <h3 class="text-xl font-bold">Ready to Mine</h3>
                    <p class="text-slate-500 text-sm mt-1">Earn 0.2 RDA every 24 hours</p>
                </div>

                <div id="mining-active" class="hidden">
                    <div class="w-40 h-40 rounded-full glass border-4 border-sky-500 flex items-center justify-center mx-auto mb-6 mining-glow">
                        <div class="w-32 h-32 rounded-full bg-slate-900 flex items-center justify-center">
                            <i class="fas fa-pickaxe text-4xl text-sky-400"></i>
                        </div>
                    </div>
                    <h3 class="text-xl font-bold text-sky-400">Mining Active</h3>
                    <p id="mining-timer" class="text-2xl font-mono mt-2 tracking-widest text-white">24:00:00</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mt-6">
                <div class="glass p-5 rounded-3xl">
                    <p class="text-slate-500 text-xs mb-1">REFERRAL CODE</p>
                    <p id="my-ref-code" class="font-bold text-sky-400 uppercase tracking-tighter">---</p>
                </div>
                <div class="glass p-5 rounded-3xl">
                    <p class="text-slate-500 text-xs mb-1">TEAM STATUS</p>
                    <p class="font-bold">1 Active</p>
                </div>
            </div>
        </div>

        <nav class="fixed bottom-6 left-6 right-6 h-20 glass rounded-3xl flex items-center justify-around px-4 border-t border-white/10 z-50">
            <button class="flex flex-col items-center gap-1 text-sky-400">
                <i class="fas fa-home text-xl"></i>
                <span class="text-[10px] font-bold">HOME</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-slate-500">
                <i class="fas fa-wallet text-xl"></i>
                <span class="text-[10px] font-bold">WALLET</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-slate-500">
                <i class="fas fa-users text-xl"></i>
                <span class="text-[10px] font-bold">TEAM</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-slate-500">
                <i class="fas fa-comment-dots text-xl"></i>
                <span class="text-[10px] font-bold">CHAT</span>
            </button>
        </nav>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbx6MVvpY7hy4A0vQTwmRvFAsIZnHIqgEavy2V5zhKKzfxkfsJ_2lJa6Y0JnXqf-TdfF/exec';
        let currentUser = JSON.parse(localStorage.getItem('rida_user')) || null;
        let miningInterval;

        // On Load
        window.onload = () => {
            if (currentUser) {
                showApp();
            }
        };

        function toggleAuth(isReg) {
            document.getElementById('login-box').classList.toggle('hidden', isReg);
            document.getElementById('register-box').classList.toggle('hidden', !isReg);
        }

        async function apiCall(data) {
            document.getElementById('loader').classList.remove('hidden');
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Note: Apps Script may require no-cors or specialized handling
                    body: JSON.stringify(data)
                });
                
                // Since Google Apps Script with no-cors doesn't return body, 
                // for this specific production template we use a 'fetch' fallback.
                const realResponse = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                return await realResponse.json();
            } catch (e) {
                console.error(e);
                return { success: false, msg: "Connection Error" };
            } finally {
                document.getElementById('loader').classList.add('hidden');
            }
        }

        async function handleRegister() {
            const username = document.getElementById('reg-user').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-pass').value;
            const referredBy = document.getElementById('reg-ref').value;

            const res = await apiCall({ action: 'register', username, email, password, referredBy });
            if (res.success) {
                alert("Account Created! Please Login.");
                toggleAuth(false);
            } else {
                alert(res.msg);
            }
        }

        async function handleLogin() {
            const email = document.getElementById('log-email').value;
            const password = document.getElementById('log-pass').value;

            const res = await apiCall({ action: 'login', email, password });
            if (res.success) {
                currentUser = res.data;
                localStorage.setItem('rida_user', JSON.stringify(currentUser));
                showApp();
            } else {
                alert(res.msg);
            }
        }

        function showApp() {
            document.getElementById('page-auth').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-name').innerText = currentUser.username;
            refreshDashboard();
        }

        async function refreshDashboard() {
            const res = await apiCall({ action: 'getDashboard', uid: currentUser.uid });
            if (res.success) {
                const d = res.data;
                document.getElementById('balance').innerText = parseFloat(d.balance).toFixed(4);
                document.getElementById('status-badge').innerText = d.verified === "Yes" ? "● VERIFIED" : "● UNVERIFIED";
                document.getElementById('my-ref-code').innerText = d.refCode;

                if (d.miningStatus === "Active") {
                    updateMiningUI(d.lastMiningTime);
                }
            }
        }

        async function startMining() {
            const res = await apiCall({ action: 'startMining', uid: currentUser.uid });
            if (res.success) {
                refreshDashboard();
            }
        }

        function updateMiningUI(startTime) {
            document.getElementById('mining-idle').classList.add('hidden');
            document.getElementById('mining-active').classList.remove('hidden');
            
            if (miningInterval) clearInterval(miningInterval);
            
            miningInterval = setInterval(() => {
                const now = new Date().getTime();
                const elapsed = now - parseInt(startTime);
                const remaining = (24 * 60 * 60 * 1000) - elapsed;

                if (remaining <= 0) {
                    clearInterval(miningInterval);
                    document.getElementById('mining-idle').classList.remove('hidden');
                    document.getElementById('mining-active').classList.add('hidden');
                    return;
                }

                const h = Math.floor(remaining / 3600000);
                const m = Math.floor((remaining % 3600000) / 60000);
                const s = Math.floor((remaining % 60000) / 1000);
                
                document.getElementById('mining-timer').innerText = 
                    `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                
                // Simulation: Visual increment
                const bal = document.getElementById('balance');
                const current = parseFloat(bal.innerText);
                bal.innerText = (current + 0.0000023).toFixed(7);
            }, 1000);
        }
    </script>
</body>
    </html>
