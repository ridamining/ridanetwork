<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RIDA Engine 4.0</title>
<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white;}
.card {background:#1e293b; padding:15px; margin:10px; border-radius:10px;}
input,button {width:100%; padding:10px; margin:5px 0; border:none; border-radius:5px;}
button {background:#22c55e; color:white; font-weight:bold;}
.hidden {display:none;}
.topbar {background:#020617; padding:15px; text-align:center; font-size:20px;}
</style>
</head>

<body>

<div class="topbar">🚀 RIDA Engine 4.0</div>

<!-- LOGIN -->
<div id="auth" class="card">
<h3 id="authTitle">Login</h3>

<input id="name" placeholder="Name (for register)" class="hidden">
<input id="email" placeholder="Email">
<input id="pass" placeholder="Password" type="password">

<button onclick="submitAuth()">Continue</button>
<button onclick="toggleAuth()">Switch to Register</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="card">
<h3>👤 User Info</h3>
<p>Name: <span id="uName"></span></p>
<p>UID: <span id="uUID"></span></p>
<p>Balance: <span id="uBal"></span></p>
<p>Role: <span id="uRole"></span></p>
<button onclick="sync()">🔄 Sync</button>
</div>

<div class="card">
<h3>⛏ Mining</h3>
<button onclick="mine()">Start Mining (+0.2)</button>
</div>

<div class="card">
<h3>💸 Transfer</h3>
<input id="toUID" placeholder="Receiver UID">
<input id="amount" placeholder="Amount">
<button onclick="send()">Send</button>
</div>

<!-- ADMIN -->
<div id="adminPanel" class="card hidden">
<h3>📢 Admin Panel</h3>
<input id="annText" placeholder="Announcement">
<button onclick="announce()">Post</button>
</div>

<button onclick="logout()">Logout</button>

</div>

<script>
var API = "https://script.google.com/macros/s/AKfycbxhwFo2ycjOPDunKdrtgjo4uO769ZDqR6ZAyhuhpgG5eL0OxYSpRvnXLSZu0P5Bbp-1uQ/exec";
var isLogin = true;
var currentUser = null;

// JSONP CALL
function api(action, data, callback){
  var cb = "cb_" + Date.now();
  window[cb] = function(res){
    callback(res);
    delete window[cb];
    script.remove();
  };

  var script = document.createElement("script");
  script.src = API + "?callback=" + cb +
               "&action=" + action +
               "&payload=" + encodeURIComponent(JSON.stringify(data));

  document.body.appendChild(script);
}

// TOGGLE LOGIN/REGISTER
function toggleAuth(){
  isLogin = !isLogin;
  document.getElementById("authTitle").innerText = isLogin ? "Login" : "Register";
  document.getElementById("name").classList.toggle("hidden", isLogin);
}

// SUBMIT AUTH
function submitAuth(){
  var data = {
    email: document.getElementById("email").value,
    pass: document.getElementById("pass").value,
    name: document.getElementById("name").value
  };

  var action = isLogin ? "login" : "register";

  api(action, data, function(res){
    if(res.success){
      if(isLogin){
        currentUser = res.user;
        openApp();
      } else {
        alert("Registered! Now login");
        toggleAuth();
      }
    } else {
      alert(res.msg);
    }
  });
}

// OPEN APP
function openApp(){
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  renderUser();

  if(currentUser.role === "ADMIN"){
    document.getElementById("adminPanel").classList.remove("hidden");
  }
}

// RENDER USER
function renderUser(){
  document.getElementById("uName").innerText = currentUser.name;
  document.getElementById("uUID").innerText = currentUser.uid;
  document.getElementById("uBal").innerText = currentUser.bal;
  document.getElementById("uRole").innerText = currentUser.role;
}

// SYNC
function sync(){
  api("sync", {uid: currentUser.uid}, function(res){
    if(res.success){
      currentUser = res.user;
      renderUser();
    }
  });
}

// MINING
function mine(){
  api("startMining", {uid: currentUser.uid}, function(res){
    if(res.success){
      alert("Mining success");
      sync();
    }
  });
}

// TRANSFER
function send(){
  api("p2pTransfer", {
    from: currentUser.uid,
    to: document.getElementById("toUID").value,
    amount: parseFloat(document.getElementById("amount").value)
  }, function(res){
    alert(res.msg || "Done");
    sync();
  });
}

// ANNOUNCE
function announce(){
  api("postAnnouncement", {
    uid: currentUser.uid,
    text: document.getElementById("annText").value
  }, function(res){
    alert(res.msg || "Posted");
  });
}

// LOGOUT
function logout(){
  location.reload();
}
</script>

</body>
</html>
