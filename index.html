<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIDA NETWORK v13.1 - Restored</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { background:#050508; color:#fff; font-family:'Plus Jakarta Sans', sans-serif; margin:0; padding:0; min-height:100vh; }
        .glass { background:rgba(255,255,255,0.03); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.08); border-radius:24px; }
        .btn-primary { background:linear-gradient(135deg,#6366f1,#a855f7); border:none; border-radius:16px; font-weight:700; color:white; }
        .page { display:none; }
        .active { display:block; }
        @keyframes ping { 75%, 100% { transform:scale(2); opacity:0; } }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="authPage" style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
        <div style="max-width:420px; width:100%;">
            <h1 style="text-align:center; font-size:3.2rem; margin-bottom:30px;">RIDA<span style="color:#6366f1;">.</span></h1>
            <div class="glass" style="padding:30px;">
                <div id="regInputs" style="display:none;">
                    <input id="uName" type="text" placeholder="Full Name" style="width:100%; padding:15px; margin-bottom:10px; background:#ffffff08; border:1px solid #ffffff1a; border-radius:12px;">
                    <input id="uRef" type="text" placeholder="Referral Code (Optional)" style="width:100%; padding:15px; margin-bottom:15px; background:#ffffff08; border:1px solid #ffffff1a; border-radius:12px;">
                </div>
                <input id="uEmail" type="email" placeholder="Email Address" value="asd@gmail.com" style="width:100%; padding:15px; margin-bottom:10px; background:#ffffff08; border:1px solid #ffffff1a; border-radius:12px;">
                <input id="uPass" type="password" placeholder="Password" value="pakistan" style="width:100%; padding:15px; margin-bottom:15px; background:#ffffff08; border:1px solid #ffffff1a; border-radius:12px;">
                <button onclick="handleAuth()" class="btn-primary" style="padding:16px; width:100%;">CONNECT NODE</button>
                <p onclick="toggleAuth()" style="text-align:center; margin-top:15px; color:#888; cursor:pointer;">New node? Create Identity</p>
            </div>
        </div>
    </div>

    <!-- MAIN APP SCREEN -->
    <div id="mainApp" style="display:none; max-width:420px; margin:0 auto; padding:20px;">
        <header style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <div>
                <h2 id="viewName" style="margin:0;">---</h2>
                <span id="viewStatus" style="font-size:0.8rem; padding:4px 10px; border-radius:6px; background:rgba(239,68,68,0.2); color:#ef4444;">PENDING</span>
            </div>
            <div style="text-align:right;">
                <p id="viewBal" style="font-size:2.5rem; font-weight:800; margin:0;">0.00</p>
                <p style="font-size:0.75rem; color:#888;">RIDA ASSET</p>
            </div>
        </header>

        <div id="page-home" class="page active glass" style="padding:20px; text-align:center;">
            <p style="color:#6366f1; font-size:0.9rem;">NETWORK BROADCAST</p>
            <p id="annText" style="margin:10px 0;">Syncing node data...</p>
            
            <div style="margin:30px 0; position:relative; width:180px; height:180px; margin-left:auto; margin-right:auto; border:5px solid rgba(99,102,241,0.2); border-radius:50%;">
                <div id="miningPulse" style="position:absolute; inset:0; border:5px solid #6366f1; border-radius:50%; animation: ping 2s infinite; opacity:0;"></div>
                <span id="mineTimer" style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); font-size:2.5rem; font-weight:900; color:#6366f1;">0.20</span>
            </div>
            <button onclick="processMining()" id="mineBtn" class="btn-primary" style="padding:18px;">INITIALIZE NODE</button>
            <p id="timerLabel" style="margin-top:10px; color:#888;">Ready for extraction</p>
        </div>

        <button onclick="logout()" style="margin-top:40px; color:#ff6666; background:none; border:none; width:100%;">TERMINATE SESSION</button>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzkH-SVeIZROvOM0ASXv5Ol4gLcGlPLMgBiCIIXoj6ZhM0Q6enOxNjjVP4SrB8rOSQ1jA/exec";

        let user = null;
        let mineInterval = null;

        function jsonpCall(action, payload, callback) {
            console.log("→ Calling:", action, payload);
            const cb = "cb_" + Date.now();
            window[cb] = function(res) {
                console.log("← Response from " + action + ":", res);
                delete window[cb];
                callback(res);
            };
            const s = document.createElement("script");
            s.src = API + "?callback=" + cb + "&action=" + action + "&payload=" + encodeURIComponent(JSON.stringify(payload));
            document.body.appendChild(s);
        }

        function handleAuth() {
            const email = document.getElementById("uEmail").value.trim();
            const pass = document.getElementById("uPass").value.trim();
            if (!email || !pass) return alert("Email and password required");

            jsonpCall("login", {email, pass}, function(res) {
                if (res && res.success && res.user) {
                    user = res.user;
                    localStorage.setItem("ridaUser", JSON.stringify(user));
                    showMain();
                } else {
                    alert(res && res.msg ? res.msg : "Login failed");
                }
            });
        }

        function showMain() {
            document.getElementById("authPage").style.display = "none";
            document.getElementById("mainApp").style.display = "block";
            document.getElementById("viewName").textContent = user.name || "User";
            document.getElementById("viewUid").textContent = user.uid || "---";
            document.getElementById("viewBal").textContent = parseFloat(user.bal || 0).toFixed(2);
        }

        function processMining() {
            if (!user) return;
            jsonpCall("startMining", {uid: user.uid}, function(res) {
                alert(res && res.success ? "Mining started" : "Failed");
            });
        }

        function logout() {
            localStorage.removeItem("ridaUser");
            location.reload();
        }

        window.onload = function() {
            console.log("RIDA NETWORK v13.1 Restored - Loading...");

            const saved = localStorage.getItem("ridaUser");
            if (saved) {
                try {
                    user = JSON.parse(saved);
                    if (user && user.uid) {
                        showMain();
                        return;
                    }
                } catch(e) {}
            }

            // Show login
            document.getElementById("authPage").style.display = "flex";
            console.log("Login screen shown. Try asd@gmail.com / pakistan");
        };
    </script>
</body>
</html>
