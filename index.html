<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIDA Network | Crypto Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
    body { background:#0B0F1A; color:white; font-family:'Plus Jakarta Sans',sans-serif; margin:0; }
    .glass { background: rgba(20,25,35,0.85); backdrop-filter: blur(20px); border-radius:1.5rem; border:1px solid rgba(255,255,255,0.05); }
    .hidden { display:none !important; }
    .btn { transition: all 0.2s ease; }
    .btn:active { transform: scale(0.95); }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div id="loginView" class="w-full max-w-md space-y-6">
    <div class="glass p-8 text-center">
        <h1 class="text-4xl font-bold text-blue-500 mb-2">RIDA Network</h1>
        <p class="text-xs text-white/50 mb-6">Crypto Mining & Wallet Dashboard</p>
        <input type="email" id="email" placeholder="Email" class="w-full p-4 rounded-xl bg-white/5 mb-3 focus:outline-none focus:border-blue-500 border border-white/10">
        <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-xl bg-white/5 mb-6 focus:outline-none focus:border-blue-500 border border-white/10">
        <button onclick="handleLogin()" class="w-full bg-blue-600 py-4 rounded-xl font-bold uppercase btn">Login</button>
        <p class="text-xs text-white/50 mt-4">Don't have an account? <a href="#" onclick="showRegister()" class="text-blue-400 underline">Register</a></p>
    </div>
</div>

<div id="registerView" class="w-full max-w-md space-y-6 hidden">
    <div class="glass p-8 text-center">
        <h1 class="text-4xl font-bold text-green-400 mb-2">Register</h1>
        <input type="text" id="rname" placeholder="Full Name" class="w-full p-4 rounded-xl bg-white/5 mb-3 focus:outline-none border border-white/10">
        <input type="email" id="remail" placeholder="Email" class="w-full p-4 rounded-xl bg-white/5 mb-3 focus:outline-none border border-white/10">
        <input type="password" id="rpass" placeholder="Password" class="w-full p-4 rounded-xl bg-white/5 mb-6 focus:outline-none border border-white/10">
        <button onclick="handleRegister()" class="w-full bg-green-500 py-4 rounded-xl font-bold uppercase btn">Register</button>
        <p class="text-xs text-white/50 mt-4">Already have an account? <a href="#" onclick="showLogin()" class="text-blue-400 underline">Login</a></p>
    </div>
</div>

<div id="userDashboard" class="hidden w-full max-w-4xl mx-auto p-4 space-y-6">
    <header class="flex justify-between items-center glass p-4 rounded-xl">
        <h2 class="text-xl font-bold">RIDA Miner</h2>
        <div>
            <span id="userEmail" class="text-sm text-white/60 mr-4"></span>
            <button onclick="logout()" class="bg-red-500 px-3 py-2 rounded-xl btn">Logout</button>
        </div>
    </header>

    <div class="glass p-6 rounded-xl text-center space-y-4">
        <p class="text-xs text-white/50">Network Yield</p>
        <h2 id="balanceDisplay" class="text-5xl font-bold">0.000000</h2>
        <button id="mineBtn" onclick="startMining()" class="bg-blue-600 py-3 px-8 rounded-xl btn font-bold uppercase">Start Mining</button>
        <p id="mineMsg" class="text-xs text-green-400 hidden mt-2">Mining Active</p>
    </div>

    <div class="glass p-6 rounded-xl space-y-4">
        <h3 class="font-bold mb-2">P2P Transfer</h3>
        <input type="text" id="toUid" placeholder="Recipient UID" class="w-full p-3 rounded-xl bg-white/5 mb-2">
        <input type="number" id="amount" placeholder="Amount" class="w-full p-3 rounded-xl bg-white/5 mb-2">
        <button onclick="transfer()" class="bg-purple-600 py-3 px-6 rounded-xl btn font-bold uppercase">Send</button>
        <p id="transferMsg" class="text-xs text-green-400 hidden mt-1"></p>
    </div>

    <div id="adminPanel" class="hidden glass p-6 rounded-xl space-y-4">
        <h3 class="font-bold text-blue-400">Admin Panel</h3>
        <textarea id="announcement" placeholder="Broadcast Announcement" class="w-full p-3 rounded-xl bg-white/5"></textarea>
        <button onclick="postAnnouncement()" class="bg-blue-500 py-3 px-6 rounded-xl btn font-bold uppercase">Broadcast</button>
        <p id="announceMsg" class="text-xs text-green-400 hidden mt-1"></p>
    </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyhy80jodgIbcau1VRL1Gr_6m2NfflNHvAPSvy3h3RzScyRYTAphOoVbTZgnjut0Nk95A/exec";

function showRegister(){ document.getElementById('loginView').classList.add('hidden'); document.getElementById('registerView').classList.remove('hidden'); }
function showLogin(){ document.getElementById('registerView').classList.add('hidden'); document.getElementById('loginView').classList.remove('hidden'); }

function handleRegister(){
    const name = document.getElementById('rname').value.trim();
    const email = document.getElementById('remail').value.trim();
    const pass = document.getElementById('rpass').value.trim();
    if(!name||!email||!pass){ alert("All fields required"); return; }

    fetch(`${WEB_APP_URL}?action=register&payload=${encodeURIComponent(JSON.stringify({name,email,pass}))}`)
    .then(res=>res.json())
    .then(res=>{
        if(res.success){ alert("Registered successfully! Login now."); showLogin(); } 
        else alert(res.msg||"Registration failed");
    });
}

function handleLogin(){
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('pass').value.trim();
    if(!email||!pass){ alert("All fields required"); return; }

    fetch(`${WEB_APP_URL}?action=login&payload=${encodeURIComponent(JSON.stringify({email,pass}))}`)
    .then(res=>res.json())
    .then(res=>{
        if(res.success){ 
            localStorage.setItem('ridaUser', JSON.stringify(res.user));
            renderDashboard();
        } else alert(res.msg||"Invalid login");
    });
}

function renderDashboard(){
    const user = JSON.parse(localStorage.getItem('ridaUser'));
    if(!user) return;
    document.getElementById('loginView').classList.add('hidden');
    document.getElementById('registerView').classList.add('hidden');
    document.getElementById('userDashboard').classList.remove('hidden');
    document.getElementById('userEmail').innerText = user.email;
    document.getElementById('balanceDisplay').innerText = parseFloat(user.bal||0).toFixed(6);

    if(user.role==='ADMIN') document.getElementById('adminPanel').classList.remove('hidden');
}

function logout(){ localStorage.removeItem('ridaUser'); location.reload(); }

let miningActive=false;
function startMining(){
    if(miningActive){ alert("Mining already active"); return; }
    miningActive=true;
    const user = JSON.parse(localStorage.getItem('ridaUser'));
    fetch(`${WEB_APP_URL}?action=startMining&payload=${encodeURIComponent(JSON.stringify({uid:user.uid}))}`)
    .then(res=>res.json())
    .then(res=>{
        if(res.success){
            document.getElementById('mineMsg').classList.remove('hidden');
            updateBalance(0.2); 
        } else alert(res.msg||"Mining failed");
        miningActive=false;
    });
}

function updateBalance(amount){
    const user = JSON.parse(localStorage.getItem('ridaUser'));
    user.bal = parseFloat(user.bal||0)+amount;
    localStorage.setItem('ridaUser', JSON.stringify(user));
    document.getElementById('balanceDisplay').innerText = parseFloat(user.bal).toFixed(6);
}

function transfer(){
    const to = document.getElementById('toUid').value.trim();
    const amount = parseFloat(document.getElementById('amount').value);
    if(!to||!amount){ alert("Fill all fields"); return; }

    const user = JSON.parse(localStorage.getItem('ridaUser'));
    fetch(`${WEB_APP_URL}?action=p2pTransfer&payload=${encodeURIComponent(JSON.stringify({from:user.uid,to,amount}))}`)
    .then(res=>res.json())
    .then(res=>{
        if(res.success){ 
            updateBalance(-amount);
            document.getElementById('transferMsg').innerText="Transfer successful"; 
            document.getElementById('transferMsg').classList.remove('hidden');
        } else alert(res.msg||"Transfer failed");
    });
}

function postAnnouncement(){
    const text = document.getElementById('announcement').value.trim();
    if(!text){ alert("Enter text"); return; }
    const user = JSON.parse(localStorage.getItem('ridaUser'));
    fetch(`${WEB_APP_URL}?action=postAnnouncement&payload=${encodeURIComponent(JSON.stringify({uid:user.uid,text}))}`)
    .then(res=>res.json())
    .then(res=>{
        if(res.success){
            document.getElementById('announceMsg').innerText="Announcement posted!";
            document.getElementById('announceMsg').classList.remove('hidden');
            document.getElementById('announcement').value='';
        } else alert(res.msg||"Failed");
    });
}

// Auto load dashboard if logged in
if(localStorage.getItem('ridaUser')) renderDashboard();
</script>

</body>
          </html>
