<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RIDA | SENTINEL v9.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --bg: #03030b; --card: rgba(18, 18, 35, 0.98); }
        body { background: var(--bg); color: #fff; font-family: 'Space Grotesk', sans-serif; }
        .cyber-card { background: var(--card); border: 1px solid rgba(255,255,255,0.08); border-radius: 28px; }
        .btn-glow { background: linear-gradient(135deg, #7000ff, #00f2ff); border-radius: 18px; font-weight: 700; transition: 0.3s; }
        .page { display: none; padding-bottom: 120px; animation: fadeIn 0.4s ease; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .badge { font-size: 10px; padding: 3px 12px; border-radius: 100px; font-weight: 900; text-transform: uppercase; }
        .v-true { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .v-false { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .nav-blur { background: rgba(3, 3, 11, 0.95); backdrop-filter: blur(25px); border-top: 1px solid rgba(255,255,255,0.1); }
        .msg { margin-bottom: 12px; padding: 14px; border-radius: 18px; font-size: 13px; max-width: 80%; }
        .msg-me { background: rgba(0, 242, 255, 0.1); color: #00f2ff; align-self: flex-end; border: 1px solid rgba(0, 242, 255, 0.2); }
        .msg-them { background: rgba(255, 255, 255, 0.05); align-self: flex-start; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-4">

    <div id="authArea" class="min-h-screen flex flex-col justify-center space-y-8">
        <h1 class="text-6xl font-black text-center italic tracking-tighter">RIDA<span class="text-cyan-400">.</span></h1>
        <div class="cyber-card p-8 space-y-4 shadow-2xl">
            <div id="regFields" class="hidden"><input id="uName" type="text" placeholder="Full Name" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-cyan-400"></div>
            <input id="uEmail" type="email" placeholder="Email Address" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-cyan-400">
            <input id="uPass" type="password" placeholder="Access Key" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-cyan-400">
            <button onclick="handleAuth()" class="w-full py-4 btn-glow uppercase text-xs tracking-widest mt-2">Connect Node</button>
            <p onclick="toggleAuth()" class="text-center text-xs text-gray-500 cursor-pointer pt-2" id="toggleLabel">New node? Register</p>
        </div>
    </div>

    <div id="appArea" class="hidden">
        <div class="flex justify-between items-center mb-6 px-2">
            <div>
                <div class="flex items-center gap-2 mb-1">
                    <h2 id="topName" class="font-bold text-lg">---</h2>
                    <span id="topBadge" class="badge">---</span>
                </div>
                <p id="topUid" class="text-[10px] text-cyan-400 font-mono font-bold">---</p>
            </div>
            <div class="text-right">
                <p id="topBal" class="text-2xl font-black tracking-tighter">0.0000</p>
                <p class="text-[8px] text-gray-500 uppercase font-black tracking-widest">RIDA Asset</p>
            </div>
        </div>

        <div id="page-home" class="page active-page space-y-6">
            <div class="cyber-card p-12 flex flex-col items-center space-y-6 shadow-xl">
                <div class="w-60 h-60 rounded-full border-4 border-white/5 flex flex-col items-center justify-center relative">
                    <div id="mineStatus" class="absolute -top-2 px-3 py-1 bg-cyan-500 text-black text-[8px] font-black rounded-full opacity-0">LIVE</div>
                    <span id="liveCounter" class="text-4xl font-bold text-cyan-400 tabular-nums">0.00000000</span>
                    <p class="text-[10px] text-gray-500 mt-2 uppercase tracking-[0.2em] font-bold">Extraction Protocol</p>
                </div>
                <button id="mineBtn" onclick="startMining()" class="w-full py-5 btn-glow uppercase text-xs tracking-widest">Initialize Mining</button>
            </div>
            <div class="space-y-4">
                <h3 class="text-[10px] font-black uppercase text-gray-500 px-2 tracking-widest">Global Broadcasts</h3>
                <div id="newsTimeline" class="space-y-3"></div>
            </div>
        </div>

        <div id="page-profile" class="page space-y-4">
            <div class="cyber-card p-6 space-y-4">
                <div class="flex justify-between items-center border-b border-white/5 pb-4">
                    <h3 class="text-xs font-black text-cyan-400 uppercase tracking-widest">Support Terminal</h3>
                    <span id="profBadge" class="badge">---</span>
                </div>
                <div id="chatBox" class="h-96 overflow-y-auto flex flex-col p-4 bg-black/40 rounded-2xl border border-white/5"></div>
                <div class="flex gap-2">
                    <input id="chatInput" type="text" placeholder="Encrypt message..." class="flex-1 p-4 bg-white/5 border border-white/10 rounded-2xl text-xs outline-none focus:border-cyan-400">
                    <button onclick="sendMsg()" class="px-6 btn-glow text-xs font-black">SEND</button>
                </div>
            </div>
            <button onclick="logout()" class="w-full py-4 text-red-500 text-[10px] font-black uppercase tracking-widest opacity-30">Disconnect Node</button>
        </div>

        <div id="page-admin" class="page space-y-6">
            <h2 class="text-2xl font-black text-red-500 italic px-2">SENTINEL CONTROL</h2>
            <div class="cyber-card p-6 space-y-4">
                <h3 class="text-xs font-black uppercase tracking-widest text-cyan-400">Active Node Chats</h3>
                <div id="adminChatHub" class="space-y-4 max-h-96 overflow-y-auto"></div>
            </div>
            <div class="cyber-card p-6 space-y-4">
                <h3 class="text-xs font-black uppercase tracking-widest">Global Push</h3>
                <textarea id="admMsg" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl text-xs h-24 outline-none focus:border-cyan-400" placeholder="Type announcement..."></textarea>
                <button onclick="adminBroadcast()" class="w-full py-4 btn-glow text-xs uppercase font-black">Execute Broadcast</button>
            </div>
        </div>

        <nav class="fixed bottom-0 left-0 w-full nav-blur flex justify-around p-5 z-50">
            <button onclick="switchTab('home', this)" class="text-cyan-400 flex flex-col items-center"><span class="text-2xl mb-1">⚡</span><span class="text-[9px] font-black uppercase">Core</span></button>
            <button onclick="switchTab('profile', this)" class="text-gray-500 flex flex-col items-center"><span class="text-2xl mb-1">💬</span><span class="text-[9px] font-black uppercase">Support</span></button>
            <button id="adminTab" onclick="switchTab('admin', this)" style="display:none;" class="text-red-900 flex flex-col items-center"><span class="text-2xl mb-1">⚙️</span><span class="text-[9px] font-black uppercase">Admin</span></button>
        </nav>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbz_4kIHRSy2o7Re8oxC1HoTWmGQOYvlD1XKuREbpL53VZm3s2YN2ySVi-m_r54M0iGI9A/exec";
        let user = JSON.parse(localStorage.getItem('rida_v95'));
        let lastMsgCount = 0;
        let lastAnnCount = 0;
        const notifySound = new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3');

        window.onload = () => { 
            if(user) { 
                if ("Notification" in window) Notification.requestPermission();
                sync(); 
                setInterval(pulseCheck, 20000); 
            } 
        };

        function pulseCheck() {
            server('checkUpdates', {}, (res) => {
                if(res.msgCount > lastMsgCount) {
                    playNotify("New Transmission", "Message received in terminal.");
                    lastMsgCount = res.msgCount;
                    loadChat();
                    if(user.role === "ADMIN") loadAdminChats();
                }
                if(res.annCount > lastAnnCount) {
                    playNotify("Network Alert", "Global broadcast received.");
                    lastAnnCount = res.annCount;
                    sync();
                }
            });
        }

        function playNotify(title, body) {
            notifySound.play().catch(() => {});
            if (Notification.permission === "granted") new Notification(title, { body });
        }

        function sync() {
            server('sync', { email: user.email }, (res) => {
                if(res.success) {
                    user = res.user;
                    lastMsgCount = res.msgCount;
                    lastAnnCount = res.annCount;
                    localStorage.setItem('rida_v95', JSON.stringify(user));
                    updateUI(res.announcements);
                } else logout();
            });
        }

        function updateUI(news) {
            document.getElementById('authArea').classList.add('hidden');
            document.getElementById('appArea').classList.remove('hidden');
            document.getElementById('topName').innerText = user.name;
            document.getElementById('topUid').innerText = user.uid;
            document.getElementById('topBal').innerText = parseFloat(user.bal).toFixed(4);
            
            const isV = user.verified === "TRUE";
            const bClass = isV ? "badge v-true" : "badge v-false";
            const bText = isV ? "Verified" : "Unverified";
            
            document.getElementById('topBadge').className = bClass;
            document.getElementById('topBadge').innerText = bText;
            document.getElementById('profBadge').className = bClass;
            document.getElementById('profBadge').innerText = bText;

            if(user.role === "ADMIN") document.getElementById('adminTab').style.display = "flex";

            document.getElementById('newsTimeline').innerHTML = news.map(n => `
                <div class="cyber-card p-5 border-l-2 border-cyan-400">
                    <p class="text-[9px] text-gray-500 font-bold mb-1">${new Date(n[0]).toLocaleString()}</p>
                    <p class="text-xs text-gray-200 leading-relaxed">${n[1]}</p>
                </div>
            `).join('');
            loadChat();
            checkMining();
        }

        function startMining() {
            server('startMiningSession', { uid: user.uid }, (res) => {
                if(res.success) { user.lastMine = res.startTime; startVisualMining(); }
            });
        }

        function checkMining() {
            if (user.lastMine > 0) {
                const diff = new Date().getTime() - user.lastMine;
                if(diff < 86400000) startVisualMining();
            }
        }

        function startVisualMining() {
            const btn = document.getElementById('mineBtn');
            const status = document.getElementById('mineStatus');
            btn.disabled = true;
            status.style.opacity = "1";
            setInterval(() => {
                const diff = new Date().getTime() - user.lastMine;
                if(diff >= 86400000) { location.reload(); return; }
                const earned = (diff / 86400000) * 0.5;
                document.getElementById('liveCounter').innerText = earned.toFixed(8);
                const rem = 86400000 - diff;
                btn.innerText = `ACTIVE: ${Math.floor(rem/3600000)}h ${Math.floor((rem%3600000)/60000)}m`;
            }, 1000);
        }

        function loadChat() {
            server('getMessages', { uid: user.uid }, (res) => {
                const box = document.getElementById('chatBox');
                box.innerHTML = res.history.map(m => `<div class="msg ${m.sender === user.name ? 'msg-me' : 'msg-them'}"><b class="text-[10px] uppercase opacity-50">${m.sender}</b><br>${m.text}</div>`).join('');
                box.scrollTop = box.scrollHeight;
            });
        }

        function loadAdminChats() {
            server('adminGetAllChats', {}, (res) => {
                const hub = document.getElementById('adminChatHub');
                hub.innerHTML = Object.entries(res.chats).map(([uid, msgs]) => `
                    <div class="bg-white/5 p-5 rounded-2xl border border-white/10">
                        <p class="text-[10px] font-black text-cyan-400 mb-3 tracking-widest">NODE: ${uid}</p>
                        <div class="max-h-32 overflow-y-auto mb-4 text-[11px] opacity-70 space-y-2">${msgs.map(m => `<div><b>${m.sender}:</b> ${m.text}</div>`).join('')}</div>
                        <div class="flex gap-2">
                            <input id="reply-${uid}" type="text" placeholder="Respond..." class="flex-1 bg-black/50 p-3 rounded-xl text-xs outline-none border border-white/10">
                            <button onclick="adminReply('${uid}')" class="bg-cyan-500 text-black px-5 rounded-xl text-[10px] font-black">REPLY</button>
                        </div>
                    </div>
                `).join('');
            });
        }

        function adminReply(targetUid) {
            const txt = document.getElementById('reply-' + targetUid).value;
            if(!txt) return;
            server('sendMessage', { uid: targetUid, sender: "RIDA TEAM", text: txt }, () => {
                document.getElementById('reply-' + targetUid).value = "";
                loadAdminChats();
            });
        }

        function sendMsg() {
            const t = document.getElementById('chatInput').value;
            if(!t) return;
            server('sendMessage', { uid: user.uid, sender: user.name, text: t }, () => { 
                document.getElementById('chatInput').value = ""; 
                loadChat(); 
            });
        }

        function handleAuth() {
            const email = document.getElementById('uEmail').value, pass = document.getElementById('uPass').value;
            const action = document.getElementById('regFields').classList.contains('hidden') ? 'login' : 'register';
            server(action, { email, pass, name: document.getElementById('uName').value }, (res) => {
                if(res.success) { 
                    if(action === 'register') { alert("Node Registered. Please Login."); location.reload(); }
                    else { user = res.user; localStorage.setItem('rida_v95', JSON.stringify(user)); location.reload(); }
                } else alert(res.msg || "Access Denied");
            });
        }

        function server(action, payload, callback) {
            const cb = 'r_' + Math.round(Math.random()*100000);
            window[cb] = (d) => { delete window[cb]; document.body.removeChild(s); callback(d); };
            const s = document.createElement('script');
            s.src = `${API}?callback=${cb}&action=${action}&payload=${encodeURIComponent(JSON.stringify(payload))}`;
            document.body.appendChild(s);
        }

        function switchTab(t, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById('page-' + t).classList.add('active-page');
            document.querySelectorAll('nav button').forEach(b => b.className = "text-gray-500 flex flex-col items-center");
            el.className = (t === 'admin' ? "text-red-500" : "text-cyan-400") + " flex flex-col items-center font-bold";
        }

        function toggleAuth() { 
            const reg = document.getElementById('regFields');
            reg.classList.toggle('hidden');
            document.getElementById('toggleLabel').innerText = reg.classList.contains('hidden') ? 'New node? Register' : 'Have access? Login';
        }
        function logout() { localStorage.clear(); location.reload(); }
        function adminBroadcast() { 
            const t = document.getElementById('admMsg').value;
            if(!t) return;
            server('broadcast', { text: t }, () => { document.getElementById('admMsg').value = ""; alert("Broadcast Sent."); sync(); }); 
        }
    </script>
</body>
</html>
