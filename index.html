<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rida Network | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background: #050505; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; }
        .card { background: linear-gradient(145deg, #111, #080808); border: 1px solid #222; border-radius: 24px; }
        .btn-primary { background: #2563eb; transition: 0.3s; }
        .btn-primary:hover { background: #3b82f6; transform: translateY(-2px); }
        .mining-glow { filter: drop-shadow(0 0 15px rgba(37, 99, 235, 0.4)); }
        .nav-active { color: #2563eb; position: relative; }
        .nav-active::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: #2563eb; border-radius: 50%; }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col p-4">
        
        <div v-if="!session.uid" class="flex-grow flex flex-col justify-center px-4">
            <div class="mb-10 text-center">
                <h1 class="text-4xl font-extrabold tracking-tighter text-blue-600 mb-2">RIDA</h1>
                <p class="text-gray-500 text-sm">Decentralized Asset Management</p>
            </div>
            <div class="card p-8 space-y-4">
                <input v-model="auth.email" type="email" placeholder="Email" class="w-full bg-transparent border border-gray-800 p-4 rounded-2xl outline-none focus:border-blue-600 transition">
                <input v-model="auth.password" type="password" placeholder="Password" class="w-full bg-transparent border border-gray-800 p-4 rounded-2xl outline-none focus:border-blue-600 transition">
                <button @click="handleAuth" class="w-full btn-primary py-4 rounded-2xl font-bold shadow-lg shadow-blue-900/20">
                    {{ auth.isLogin ? 'Continue' : 'Create Account' }}
                </button>
                <button @click="auth.isLogin = !auth.isLogin" class="w-full text-xs text-gray-500">{{ auth.isLogin ? 'New user? Sign up' : 'Have an account? Login' }}</button>
            </div>
        </div>

        <template v-else>
            <div class="flex justify-between items-center mb-6 px-2">
                <div>
                    <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Main Wallet</span>
                    <h2 class="text-3xl font-extrabold">{{ user.balance.toFixed(4) }} <span class="text-blue-600 text-sm">RIDA</span></h2>
                </div>
                <div @click="logout" class="w-10 h-10 card flex items-center justify-center text-red-500 cursor-pointer">
                    <i class="fas fa-sign-out-alt"></i>
                </div>
            </div>

            <main class="flex-grow pb-24">
                <div v-if="tab === 'home'" class="space-y-4 animate-in">
                    <div class="card p-6 flex justify-between items-center">
                        <div>
                            <p class="text-xs text-gray-500 mb-1">Estimated Value</p>
                            <p class="text-xl font-bold font-mono">${{ (user.balance * 1.05).toFixed(2) }} <span class="text-[10px] text-green-500">+5%</span></p>
                        </div>
                        <i class="fas fa-chart-line text-blue-600 text-2xl"></i>
                    </div>

                    <div class="card p-6">
                        <h3 class="text-sm font-bold mb-4">Referral Link</h3>
                        <div class="flex gap-2">
                            <input readonly :value="`ridamining.github.io/?ref=${user.refCode}`" class="flex-grow bg-black/50 text-[10px] p-3 rounded-xl border border-gray-800 outline-none">
                            <button @click="copyRef" class="bg-gray-800 px-4 rounded-xl"><i class="fas fa-copy"></i></button>
                        </div>
                    </div>

                    <h3 class="text-sm font-bold px-2 mt-6">Recent Activity</h3>
                    <div v-for="tx in history" class="card p-4 mb-2 flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-blue-600/10 flex items-center justify-center">
                                <i :class="tx[1] === user.uid ? 'fa-arrow-up text-red-400' : 'fa-arrow-down text-green-400'" class="fas text-xs"></i>
                            </div>
                            <div>
                                <p class="text-xs font-bold">{{ tx[1] === user.uid ? 'Sent to ' + tx[2] : 'Received from ' + tx[1] }}</p>
                                <p class="text-[9px] text-gray-500">{{ new Date(tx[0]).toLocaleDateString() }}</p>
                            </div>
                        </div>
                        <p class="text-xs font-mono font-bold" :class="tx[1] === user.uid ? 'text-red-400' : 'text-green-400'">
                            {{ tx[1] === user.uid ? '-' : '+' }}{{ tx[3] }}
                        </p>
                    </div>
                </div>

                <div v-if="tab === 'mine'" class="flex flex-col items-center justify-center py-10 space-y-12">
                    <div class="relative w-64 h-64 flex items-center justify-center">
                        <svg class="absolute w-full h-full transform -rotate-90">
                            <circle cx="128" cy="128" r="110" stroke="#111" stroke-width="12" fill="transparent" />
                            <circle cx="128" cy="128" r="110" stroke="#2563eb" stroke-width="12" fill="transparent" 
                                    stroke-dasharray="691" :stroke-dashoffset="offset" stroke-linecap="round" class="transition-all duration-1000" />
                        </svg>
                        <div class="text-center mining-glow">
                            <i class="fas fa-hammer text-4xl mb-2" :class="mining.isActive ? 'text-blue-500 animate-pulse' : 'text-gray-800'"></i>
                            <h2 class="text-3xl font-mono font-bold">{{ timeLeft }}</h2>
                        </div>
                    </div>

                    <button v-if="!mining.isActive" @click="startMining" class="w-full btn-primary py-5 rounded-3xl font-bold text-lg">Initialize Node</button>
                    <button v-else-if="canClaim" @click="claimReward" class="w-full bg-green-600 py-5 rounded-3xl font-bold text-lg">Collect 0.20 RIDA</button>
                    <div v-else class="text-gray-500 text-xs font-bold uppercase tracking-widest bg-gray-900/50 px-6 py-3 rounded-full border border-gray-800">Mining Engine Online</div>
                </div>

                <div v-if="tab === 'p2p'" class="space-y-6">
                    <h3 class="text-xl font-bold px-2">Send RIDA</h3>
                    <div class="card p-8 space-y-4">
                        <div class="space-y-2">
                            <label class="text-[10px] text-gray-500 font-bold uppercase ml-2">Recipient UID</label>
                            <input v-model="p2p.target" placeholder="RIDA123456" class="w-full bg-transparent border border-gray-800 p-4 rounded-2xl outline-none focus:border-blue-600">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] text-gray-500 font-bold uppercase ml-2">Amount</label>
                            <input v-model.number="p2p.amount" type="number" placeholder="0.00" class="w-full bg-transparent border border-gray-800 p-4 rounded-2xl outline-none focus:border-blue-600">
                        </div>
                        <button @click="handleTransfer" class="w-full btn-primary py-4 rounded-2xl font-bold">Execute Transaction</button>
                    </div>
                </div>
            </main>

            <nav class="fixed bottom-6 left-6 right-6 h-18 card flex items-center justify-around px-4 z-50">
                <button @click="tab = 'home'" :class="{'nav-active': tab === 'home'}" class="p-4 text-gray-500"><i class="fas fa-wallet text-xl"></i></button>
                <button @click="tab = 'mine'" :class="{'nav-active': tab === 'mine'}" class="p-4 text-gray-500"><i class="fas fa-hammer text-xl"></i></button>
                <button @click="tab = 'p2p'" :class="{'nav-active': tab === 'p2p'}" class="p-4 text-gray-500"><i class="fas fa-paper-plane text-xl"></i></button>
            </nav>
        </template>

        <div v-if="loading" class="fixed inset-0 bg-black/90 flex flex-col items-center justify-center z-[100]">
            <div class="w-8 h-8 border-2 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 text-[10px] font-bold tracking-widest text-blue-600">ENCRYPTING...</p>
        </div>
    </div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbzv4Uqm1IC2kud_q9zBuDOzOyzFnREA3TMrTUTF_L30b_zRW5ugGdd7XkbYz_3vyVAy/exec';
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    loading: false, tab: 'home',
                    auth: { isLogin: true, email: '', password: '' },
                    session: { uid: localStorage.getItem('rida_uid') },
                    user: { balance: 0, uid: '', refCode: '' },
                    mining: { isActive: false, startTime: 0 },
                    history: [], timeLeft: '00:00:00', offset: 691, canClaim: false,
                    p2p: { target: '', amount: 0 }
                }
            },
            async mounted() {
                if (this.session.uid) await this.loadData();
                setInterval(this.tick, 1000);
            },
            methods: {
                async call(data) {
                    this.loading = true;
                    try {
                        const res = await fetch(API, {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                            body: JSON.stringify(data)
                        });
                        const out = await res.json();
                        if(!out.success && out.message) alert(out.message);
                        return out;
                    } catch (e) { alert("API Connection Lost"); return { success: false }; }
                    finally { this.loading = false; }
                },
                async handleAuth() {
                    const res = await this.call({ action: this.auth.isLogin ? 'login' : 'register', ...this.auth });
                    if (res.success && res.uid) {
                        this.session.uid = res.uid;
                        localStorage.setItem('rida_uid', res.uid);
                        await this.loadData();
                    }
                },
                async loadData() {
                    const res = await fetch(`${API}?action=get_data&uid=${this.session.uid}`).then(r => r.json());
                    if (res.success) {
                        this.user = res.user;
                        this.mining = res.mining;
                        this.history = res.history || [];
                    }
                },
                async startMining() {
                    const res = await this.call({ action: 'start_mining', uid: this.session.uid });
                    if (res.success) await this.loadData();
                },
                async claimReward() {
                    const res = await this.call({ action: 'claim_mining', uid: this.session.uid });
                    if (res.success) { alert("Reward Collected!"); await this.loadData(); }
                },
                async handleTransfer() {
                    if (this.p2p.amount < 0.1) return alert("Min amount 0.1");
                    const res = await this.call({ action: 'transfer', ...this.p2p, uid: this.session.uid });
                    if (res.success) { alert("Transaction Complete!"); this.p2p = { target: '', amount: 0 }; await this.loadData(); }
                },
                tick() {
                    if (!this.mining.isActive) { this.timeLeft = "OFFLINE"; this.offset = 691; return; }
                    const diff = (Number(this.mining.startTime) + 86400000) - Date.now();
                    if (diff <= 0) {
                        this.timeLeft = "READY";
                        this.offset = 0;
                        this.canClaim = true;
                    } else {
                        const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                        const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                        const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                        this.timeLeft = `${h}:${m}:${s}`;
                        this.offset = (diff / 86400000) * 691;
                    }
                },
                copyRef() { navigator.clipboard.writeText(`https://ridamining.github.io/?ref=${this.user.refCode}`); alert("Link copied!"); },
                logout() { localStorage.clear(); location.reload(); }
            }
        }).mount('#app');
    </script>
</body>
</html>
