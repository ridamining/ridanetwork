<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RIDA Engine PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:#fff;
}
.screen{display:none;padding:15px;}
.active{display:block;}

.card{
  background:#0f172a;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
}

input,button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:8px;
}

input{background:#1e293b;color:#fff;}
button{
  background:#22c55e;
  color:#fff;
  font-weight:bold;
}

.top{
  text-align:center;
  padding:12px;
  background:#020617;
  font-size:20px;
}

.balance{
  font-size:28px;
  color:#22c55e;
}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#020617;
}
.nav button{
  flex:1;
  background:none;
  color:white;
}

.loader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0009;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:20px;
}
</style>
</head>

<body>

<div class="top">🚀 RIDA Engine PRO</div>

<!-- AUTH -->
<div id="auth" class="screen active">
<div class="card">
<h3 id="authTitle">Login</h3>

<input id="name" placeholder="Name" style="display:none">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<input id="ref" placeholder="Referral UID" style="display:none">

<button onclick="submitAuth()">Continue</button>
<button onclick="toggleAuth()">Switch Login/Register</button>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="screen">
<div class="card">
<div id="userInfo"></div>
<div class="balance" id="bal">0</div>
<button onclick="sync()">🔄 Sync</button>
</div>
</div>

<!-- MINING -->
<div id="mining" class="screen">
<div class="card">
<h3>⛏ Mining</h3>
<p id="mineStatus">Ready</p>
<button onclick="mine()">Start Mining</button>
</div>
</div>

<!-- TRANSFER -->
<div id="transfer" class="screen">
<div class="card">
<h3>💸 Transfer</h3>
<input id="to" placeholder="Receiver UID">
<input id="amt" placeholder="Amount">
<button onclick="send()">Send</button>
</div>
</div>

<!-- ADMIN -->
<div id="admin" class="screen">
<div class="card">
<h3>📢 Admin Panel</h3>
<input id="ann" placeholder="Announcement">
<button onclick="postAnn()">Post</button>
</div>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="showScreen('dashboard')">🏠</button>
<button onclick="showScreen('mining')">⛏</button>
<button onclick="showScreen('transfer')">💸</button>
<button id="adminBtn" onclick="showScreen('admin')">⚙️</button>
</div>

<div id="loader" class="loader">⏳ Loading...</div>

<script>
window.onerror=function(m,u,l){
  alert("Error: "+m+" line:"+l);
};

var API="https://script.google.com/macros/s/AKfycbymumK9LAnF60Rt1UAyyQqKmthzK1y_qDAQOKAcF9Wj7jZmw7j3zqnPgEHPFWhUsgrOqQ/exec";

var user=null;
var isLogin=true;

// SAFE JSONP
function api(action,data,cb){
  loader.style.display="flex";

  var cbName="cb"+Math.floor(Math.random()*1000000);

  window[cbName]=function(res){
    loader.style.display="none";
    cb(res);
    delete window[cbName];
    script.remove();
  };

  var script=document.createElement("script");

  script.onerror=function(){
    loader.style.display="none";
    alert("Network error");
  };

  setTimeout(()=>{
    if(window[cbName]){
      loader.style.display="none";
      alert("Server not responding");
      delete window[cbName];
      script.remove();
    }
  },8000);

  script.src=API+"?callback="+cbName+
    "&action="+action+
    "&payload="+encodeURIComponent(JSON.stringify(data));

  document.body.appendChild(script);
}

// TOGGLE LOGIN/REGISTER
function toggleAuth(){
  isLogin=!isLogin;
  authTitle.innerText=isLogin?"Login":"Register";
  name.style.display=isLogin?"none":"block";
  ref.style.display=isLogin?"none":"block";
}

// AUTH
function submitAuth(){
  var data={
    email:email.value,
    pass:pass.value,
    name:name.value,
    ref:ref.value
  };

  api(isLogin?"login":"register",data,function(res){
    if(!res.success) return alert(res.msg);

    if(isLogin){
      user=res.user;
      openApp();
    }else{
      alert("Registered");
      toggleAuth();
    }
  });
}

// OPEN APP
function openApp(){
  document.getElementById("auth").classList.remove("active");
  showScreen("dashboard");
  render();

  if(user.role!=="ADMIN"){
    document.getElementById("adminBtn").style.display="none";
  }
}

// NAV
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// RENDER
function render(){
  userInfo.innerText="👤 "+user.name+" | "+user.uid;
  bal.innerText=user.bal;
}

// SYNC
function sync(){
  api("sync",{uid:user.uid},function(res){
    if(res.success){
      user=res.user;
      render();
    }
  });
}

// MINE
function mine(){
  api("mine",{uid:user.uid},function(res){
    alert(res.msg);
    sync();
  });
}

// TRANSFER
function send(){
  api("transfer",{
    from:user.uid,
    to:to.value,
    amount:parseFloat(amt.value)
  },function(res){
    alert(res.msg);
    sync();
  });
}

// ADMIN
function postAnn(){
  api("announce",{uid:user.uid,text:ann.value},function(res){
    alert(res.msg);
  });
}
</script>

</body>
</html>
