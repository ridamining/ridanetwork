<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RIDA MASTER V13.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap');
        :root { --sky: #38bdf8; --indigo: #6366f1; }
        body { background: #020617; color: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; height: 100vh; user-select: none; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-prime { background: linear-gradient(135deg, var(--sky) 0%, var(--indigo) 100%); transition: all 0.3s; border: none; }
        .btn-prime:active { transform: scale(0.92); filter: brightness(1.2); }
        .nav-active { color: var(--sky) !important; transform: translateY(-5px); }
        .section { height: calc(100vh - 180px); overflow-y: auto; padding-bottom: 120px; scrollbar-width: none; }
        .section::-webkit-scrollbar { display: none; }
        #rida-embed-frame, #rida-wall-frame { width: 100%; height: 100%; border: none; border-radius: 2rem; background: transparent; }
        .mining-active::after { content: ''; position: absolute; inset: -15px; border: 2px solid var(--sky); border-radius: 50%; animation: pulse-ring 2s infinite; }
        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.8; } 100% { transform: scale(1.6); opacity: 0; } }
        .neon-text { text-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
        .hidden { display: none; }
    </style>
</head>
<body class="max-w-md mx-auto relative border-x border-white/5">

    <div id="loader" class="fixed inset-0 z-[100] bg-black/95 flex flex-col items-center justify-center hidden">
        <div class="w-12 h-12 border-4 border-t-sky-500 border-sky-500/10 rounded-full animate-spin"></div>
        <p class="text-[9px] font-black tracking-[0.4em] text-sky-400 mt-6">RIDA SECURITY LAYER</p>
    </div>

    <div id="auth-scr" class="h-full p-10 flex flex-col justify-center">
        <div class="text-center mb-10">
            <h1 class="text-7xl font-black italic neon-text">RIDA<span class="text-sky-400">.</span></h1>
            <p class="text-slate-500 text-[9px] font-bold tracking-[0.4em] mt-2 uppercase">Decentralized Asset Protocol</p>
        </div>
        <div id="login-box" class="glass p-8 rounded-[3rem] space-y-4">
            <input type="email" id="l-email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none text-sm">
            <input type="password" id="l-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none text-sm">
            <button onclick="auth('login')" class="w-full btn-prime p-4 rounded-2xl font-black text-xs tracking-widest uppercase">Login</button>
            <p class="text-center text-[10px] text-slate-500">New node? <span class="text-sky-400 font-bold cursor-pointer" onclick="toggleAuth(true)">Register</span></p>
        </div>
        <div id="reg-box" class="glass p-8 rounded-[3rem] space-y-4 hidden">
            <input type="text" id="r-user" placeholder="Username" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none text-sm">
            <input type="email" id="r-email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none text-sm">
            <input type="password" id="r-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none text-sm">
            <input type="text" id="r-ref" placeholder="Referral Code" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none text-sm">
            <button onclick="auth('register')" class="w-full btn-prime p-4 rounded-2xl font-black text-xs tracking-widest uppercase">Create Node</button>
            <p class="text-center text-[10px] text-slate-500"><span class="text-sky-400 font-bold cursor-pointer" onclick="toggleAuth(false)">Go Back</span></p>
        </div>
    </div>

    <div id="app-scr" class="h-full hidden flex flex-col">
        <header class="p-6 flex justify-between items-center">
            <div>
                <p id="u-uid" class="text-sky-500 text-[8px] font-black">ID: ---</p>
                <h2 id="u-name" class="text-2xl font-black italic tracking-tighter uppercase">OPERATOR</h2>
            </div>
            <div id="adm-badge" class="hidden px-3 py-1 bg-red-500/10 border border-red-500/30 rounded-full text-[8px] font-black text-red-500">ADMIN CONTROL</div>
        </header>

        <main class="flex-1 px-6">
            <div id="sec-home" class="section space-y-5">
                <div class="glass p-6 rounded-[2.5rem] relative">
                    <div class="flex justify-between items-start mb-1">
                        <p class="text-white/30 text-[9px] font-bold uppercase tracking-widest">Asset Balance</p>
                        <p id="u-rate" class="text-sky-400 text-[9px] font-black uppercase tracking-widest">0.00 RIDA/DAY</p>
                    </div>
                    <h1 id="u-bal" class="text-5xl font-black tabular-nums tracking-tighter neon-text">0.000000</h1>
                    <div id="u-v-tag" class="mt-4 text-[9px] font-black flex items-center gap-2"></div>
                </div>

                <div class="glass p-8 rounded-[3rem] text-center">
                    <div id="m-off">
                        <button onclick="startMining()" class="w-28 h-28 rounded-full btn-prime shadow-xl mx-auto flex items-center justify-center">
                            <i class="fas fa-power-off text-3xl"></i>
                        </button>
                        <p class="mt-4 font-black text-slate-500 text-[9px] tracking-widest uppercase">Engage Miner</p>
                    </div>
                    <div id="m-on" class="hidden">
                        <div class="w-28 h-28 rounded-full border-2 border-sky-400/30 mx-auto flex items-center justify-center mining-active relative">
                            <i class="fas fa-bolt text-3xl text-sky-400 animate-pulse"></i>
                        </div>
                        <p id="timer" class="mt-4 font-mono text-3xl font-black text-sky-400">24:00:00</p>
                    </div>
                </div>

                <div class="glass p-6 rounded-[2.5rem] flex justify-between items-center">
                    <div>
                        <p class="text-[8px] text-slate-500 font-black uppercase">Your Node Key</p>
                        <p id="u-ref" class="text-sm font-black text-sky-400 tracking-widest">---</p>
                    </div>
                    <button onclick="copyRef()" class="text-[10px] font-bold bg-sky-500/10 px-4 py-2 rounded-full border border-sky-500/20 text-sky-400">COPY</button>
                </div>

                <div class="glass p-6 rounded-[2.5rem] space-y-3 border border-sky-500/10">
                    <p class="text-[9px] font-black text-sky-400 uppercase">Secure P2P Transfer</p>
                    <input type="text" id="p2p-uid" placeholder="Receiver UID" class="w-full bg-white/5 p-3 rounded-xl border border-white/5 outline-none text-xs">
                    <input type="number" id="p2p-amt" placeholder="Min. 10 RIDA" class="w-full bg-white/5 p-3 rounded-xl border border-white/5 outline-none text-xs">
                    <button onclick="secureP2P()" class="w-full py-3 bg-white/10 rounded-xl text-[10px] font-black uppercase">Initiate Transfer</button>
                    <p class="text-[7px] text-slate-500 text-center italic">Verified Nodes Only • No Fee</p>
                </div>
            </div>

            <div id="sec-rida" class="section hidden">
                <iframe id="rida-embed-frame" src="about:blank"></iframe>
            </div>

            <div id="sec-wall" class="section hidden">
                <iframe id="rida-wall-frame" src="about:blank"></iframe>
            </div>

            <div id="sec-admin" class="section hidden space-y-4">
                <div class="flex justify-between items-center">
                    <h3 class="text-xl font-black text-red-500 italic uppercase">System Admin</h3>
                    <button onclick="broadcast()" class="bg-red-500/10 text-red-500 px-4 py-1 rounded text-[9px] font-black">BROADCAST</button>
                </div>
                <div id="admin-list" class="space-y-2"></div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 h-24 glass flex justify-around items-center px-6 rounded-t-[2.5rem] z-50">
            <i onclick="go('home', this)" class="nav-btn fas fa-wallet text-xl nav-active cursor-pointer"></i>
            <i onclick="go('rida', this)" class="nav-btn fas fa-globe text-xl text-slate-600 cursor-pointer"></i>
            <i onclick="go('wall', this)" class="nav-btn fas fa-users text-xl text-slate-600 cursor-pointer"></i>
            <i onclick="go('admin', this)" id="nav-adm" class="nav-btn fas fa-user-shield text-xl text-slate-600 hidden cursor-pointer"></i>
            <i onclick="logout()" class="fas fa-sign-out-alt text-xl text-red-500/30 cursor-pointer"></i>
        </nav>
    </div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbycO3WbrAycpHFSCPWP2jTfZ_2_c8p47ugbgN1mg3JhcqHIsZaFd6jf9zBsTRP7eeuU/exec';
        const WALL_URL = 'https://ridamining.github.io/ridachain/';
        const RIDA_URL = 'https://ridamining.github.io/rida/';
        
        let user = JSON.parse(localStorage.getItem('rida_master_v13_3')) || null;
        let ticker;
        let isVerified = false;

        window.onload = () => { if(user) startApp(); };

        async function auth(action) {
            loading(true);
            const data = action === 'login' ? 
                { action, email: document.getElementById('l-email').value, password: document.getElementById('l-pass').value } :
                { action, username: document.getElementById('r-user').value, email: document.getElementById('r-email').value, password: document.getElementById('r-pass').value, refBy: document.getElementById('r-ref').value };
            
            try {
                const res = await (await fetch(API, { method: 'POST', body: JSON.stringify(data) })).json();
                if(res.success) {
                    if(action === 'login') { user = res.data; localStorage.setItem('rida_master_v13_3', JSON.stringify(user)); startApp(); }
                    else { alert("Registration Success!"); toggleAuth(false); }
                } else alert(res.msg);
            } catch(e) { alert("Handshake Failed"); }
            loading(false);
        }

        function startApp() {
            document.getElementById('auth-scr').classList.add('hidden');
            document.getElementById('app-scr').classList.remove('hidden');
            document.getElementById('u-name').innerText = user.username;
            document.getElementById('u-uid').innerText = user.uid;
            
            // ADMIN CHECK FOR ridaAdmin (RIDA-259259)
            if(user.role === 'Admin' || user.uid === 'RIDA-259259') {
                document.getElementById('adm-badge').classList.remove('hidden');
                document.getElementById('nav-adm').classList.remove('hidden');
            }
            sync();
            setInterval(sync, 30000); 
        }

        async function sync() {
            try {
                const res = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getDashboard', uid: user.uid }) })).json();
                if(res.success) {
                    const d = res.data;
                    isVerified = (d.verified === 'Yes');
                    document.getElementById('u-v-tag').innerHTML = isVerified ? 
                        '<span class="text-green-400 font-black"><i class="fas fa-shield-check"></i> VERIFIED NODE</span>' : 
                        '<span class="text-red-400 font-black"><i class="fas fa-shield-exclamation"></i> UNVERIFIED</span>';
                    document.getElementById('u-ref').innerText = d.referralCode;
                    document.getElementById('u-rate').innerText = `${d.dailyRate} RIDA/DAY`;
                    
                    if(d.miningStatus === 'Active') {
                        runTicker(d.balance, d.lastMiningTime, d.dailyRate);
                        runTimer(d.lastMiningTime);
                    } else {
                        if(ticker) clearInterval(ticker);
                        document.getElementById('u-bal').innerText = parseFloat(d.balance).toFixed(6);
                        document.getElementById('m-off').classList.remove('hidden');
                        document.getElementById('m-on').classList.add('hidden');
                    }
                }
            } catch(e) {}
        }

        function runTicker(base, start, rate) {
            if(ticker) clearInterval(ticker);
            ticker = setInterval(() => {
                const elapsed = (Date.now() - parseInt(start)) / 1000;
                const earned = elapsed * (rate / 86400); 
                document.getElementById('u-bal').innerText = (parseFloat(base) + earned).toFixed(6);
            }, 100);
        }

        function runTimer(start) {
            document.getElementById('m-off').classList.add('hidden');
            document.getElementById('m-on').classList.remove('hidden');
            const timerInt = setInterval(() => {
                const rem = 86400000 - (Date.now() - parseInt(start));
                if(rem <= 0) { clearInterval(timerInt); sync(); }
                const h = Math.floor(rem/3600000).toString().padStart(2,'0');
                const m = Math.floor((rem%3600000)/60000).toString().padStart(2,'0');
                const s = Math.floor((rem%60000)/1000).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        async function secureP2P() {
            const rid = document.getElementById('p2p-uid').value;
            const amt = parseFloat(document.getElementById('p2p-amt').value);

            if(!isVerified) return alert("Verify your account to be eligible for this service.");
            if(!rid || isNaN(amt)) return alert("Please enter valid transfer details.");
            if(amt < 10) return alert("Minimum transfer amount is 10 Rida.");

            loading(true);
            const res = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'p2pTransfer', senderUid: user.uid, receiverUid: rid, amount: amt }) })).json();
            alert(res.msg);
            if(res.success) sync();
            loading(false);
        }

        async function startMining() {
            loading(true);
            await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'startMining', uid: user.uid }) });
            sync();
            loading(false);
        }

        function go(scr, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + scr).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('nav-active', 'text-slate-600'));
            if(el) el.classList.add('nav-active');
            
            if(scr === 'wall') document.getElementById('rida-wall-frame').src = `${WALL_URL}?uid=${user.uid}&isAdmin=${user.uid === 'RIDA-259259'}`;
            if(scr === 'rida') document.getElementById('rida-embed-frame').src = `${RIDA_URL}?uid=${user.uid}&user=${user.username}&admin=RIDA-259259`;
        }

        function copyRef() { navigator.clipboard.writeText(document.getElementById('u-ref').innerText); alert("Referral Link Copied!"); }
        function toggleAuth(reg) { document.getElementById('login-box').classList.toggle('hidden', reg); document.getElementById('reg-box').classList.toggle('hidden', !reg); }
        function loading(s) { document.getElementById('loader').classList.toggle('hidden', !s); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
                            </html>
