<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIDA OS | PRO</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; background:#010409; color:white; margin:0; -webkit-tap-highlight-color:transparent; }
    .glass { background: rgba(13,17,23,0.9); backdrop-filter: blur(25px); border:1px solid rgba(255,255,255,0.05); }
    .hidden { display:none !important; }
    .btn { transition: all 0.2s; }
    .btn:hover { transform: scale(1.02); }
    .btn:active { transform: scale(0.98); }
</style>
</head>
<body class="pb-10">

<!-- LOGIN / REGISTER -->
<div id="loginView" class="min-h-screen flex items-center justify-center p-6">
    <div class="glass w-full max-w-sm p-10 rounded-3xl text-center border-t border-white/10 shadow-2xl space-y-4">
        <h1 class="text-5xl font-black italic text-blue-500">RIDA</h1>
        <p class="text-[8px] font-black opacity-30 uppercase tracking-[0.5em]">Neural Link v4.1 PRO</p>
        
        <input type="email" id="email" placeholder="Email Address" class="w-full bg-white/5 p-5 rounded-2xl border border-white/5 outline-none text-sm focus:border-blue-500">
        <input type="password" id="pass" placeholder="Access Key" class="w-full bg-white/5 p-5 rounded-2xl border border-white/5 outline-none text-sm focus:border-blue-500">
        <button onclick="handleLogin()" class="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl btn">Initialize</button>
        <p class="text-[8px] opacity-40">No account? <span onclick="toggleRegister()" class="cursor-pointer text-blue-500">Register</span></p>

        <div id="registerFields" class="hidden space-y-4">
            <input type="text" id="name" placeholder="Full Name" class="w-full bg-white/5 p-5 rounded-2xl border border-white/5 outline-none text-sm focus:border-green-500">
            <button onclick="handleRegister()" class="w-full bg-green-600 py-5 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl btn">Register</button>
        </div>
    </div>
</div>

<!-- USER APP -->
<div id="userApp" class="hidden">
    <header class="p-6 flex justify-between items-center glass rounded-b-3xl">
        <h2 class="text-xl font-black italic">RIDA <span class="text-blue-500 text-sm">MINER</span></h2>
        <button onclick="logout()" class="p-3 bg-white/5 rounded-2xl text-slate-400"><i data-lucide="log-out"></i></button>
    </header>
    <main class="p-6 text-center space-y-6">
        <div class="glass p-12 rounded-3xl border-t border-white/10 mt-10">
            <p class="text-[10px] opacity-30 uppercase mb-2">Network Yield</p>
            <h2 class="text-5xl font-black mb-10 tracking-tighter"><span id="uBal">0.000000</span></h2>
            <button id="startMiningBtn" onclick="startMining()" class="w-full py-6 rounded-3xl bg-blue-600 font-black uppercase text-[10px] tracking-widest shadow-xl btn">Start Mining</button>
        </div>

        <div class="glass rounded-2xl p-5 border border-white/5 text-left space-y-2">
            <h3 class="font-black text-blue-500 text-xs uppercase tracking-widest">Account Info</h3>
            <p>Name: <span id="uName">---</span></p>
            <p>Email: <span id="uEmail">---</span></p>
            <p>Status: <span id="uVerified">---</span></p>
            <p>UID: <span id="uUID">---</span></p>
        </div>
    </main>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden p-6 space-y-6">
    <header class="flex justify-between items-center glass p-6 rounded-2xl border border-white/5 admin-glow">
        <div>
            <h2 class="text-xl font-black text-blue-500 italic uppercase">Command Center</h2>
            <p class="text-[8px] opacity-40 font-bold tracking-widest">Master Node Status: Active</p>
        </div>
        <button onclick="logout()" class="p-3 bg-red-500/10 rounded-2xl text-red-500"><i data-lucide="power"></i></button>
    </header>

    <button onclick="fetchRegistry()" class="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg btn">Sync Cloud Registry</button>

    <div class="glass rounded-2xl overflow-hidden border border-white/5">
        <div class="p-5 border-b border-white/5 bg-white/5 text-[10px] font-black uppercase tracking-widest opacity-50">Global User Database</div>
        <div class="overflow-x-auto">
            <table class="w-full text-left text-[11px]">
                <thead class="bg-black/20 text-slate-500 uppercase font-bold">
                    <tr><th class="p-4">Node / ID</th><th class="p-4">Status</th><th class="p-4 text-right">Action</th></tr>
                </thead>
                <tbody id="registryBody" class="divide-y divide-white/5">
                    <tr><td colspan="3" class="p-10 text-center opacity-30 italic">Registry Pending Sync...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="glass rounded-2xl p-5 border border-white/5 space-y-2">
        <h3 class="font-black text-blue-500 text-xs uppercase tracking-widest">Broadcast Announcement</h3>
        <textarea id="announcementText" class="w-full bg-white/5 rounded-xl p-3 outline-none text-sm" placeholder="Type announcement..."></textarea>
        <button onclick="postAnnouncement()" class="w-full bg-green-600 py-3 rounded-xl font-black uppercase shadow-xl btn">Send Announcement</button>
    </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxI8rnUobI0K9ORj_llACylYFDcqOpIkYuKrCd26Wmn1ck-Nu-gIXhU5eD3jr2dpd_eGQ/exec";

// ----------------- LOGIN / REGISTER -----------------
function toggleRegister() {
    document.getElementById('registerFields').classList.toggle('hidden');
}

async function handleRegister() {
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('pass').value.trim();
    const name = document.getElementById('name').value.trim();
    if(!email||!pass||!name) return alert("All fields required");
    
    const res = await fetch(`${WEB_APP_URL}?action=register&payload=${JSON.stringify({email,pass,name})}`);
    const data = await res.json();
    if(data.success) { alert("Registered! Please login"); toggleRegister(); }
    else alert(data.msg || "Registration failed");
}

async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('pass').value.trim();
    if(!email||!pass) return alert("All fields required");

    const res = await fetch(`${WEB_APP_URL}?action=login&payload=${JSON.stringify({email,pass})}`);
    const data = await res.json();
    if(data.success){
        localStorage.setItem('rida_session', JSON.stringify(data.user));
        renderView();
    } else alert(data.msg || "Login failed");
}

// ----------------- RENDER -----------------
function renderView(){
    const session = JSON.parse(localStorage.getItem('rida_session'));
    document.getElementById('loginView').classList.add('hidden');
    document.getElementById('userApp').classList.add('hidden');
    document.getElementById('adminPanel').classList.add('hidden');

    if(!session){ document.getElementById('loginView').classList.remove('hidden'); }
    else if(session.role === "ADMIN"){ document.getElementById('adminPanel').classList.remove('hidden'); fetchRegistry(); }
    else{ 
        document.getElementById('userApp').classList.remove('hidden'); 
        document.getElementById('uName').innerText = session.name;
        document.getElementById('uEmail').innerText = session.email;
        document.getElementById('uUID').innerText = session.uid;
        document.getElementById('uVerified').innerText = session.verified;
        document.getElementById('uBal').innerText = parseFloat(session.bal || 0).toFixed(6);
    }
    lucide.createIcons();
}

// ----------------- MINING -----------------
async function startMining(){
    const session = JSON.parse(localStorage.getItem('rida_session'));
    if(!session) return alert("Session expired");

    const res = await fetch(`${WEB_APP_URL}?action=startMining&payload=${JSON.stringify({uid:session.uid})}`);
    const data = await res.json();
    if(data.success){
        session.bal = (parseFloat(session.bal||0)+0.2).toFixed(6);
        localStorage.setItem('rida_session', JSON.stringify(session));
        document.getElementById('uBal').innerText = session.bal;
        alert("Mining Successful! +0.2 RIDA");
    } else alert(data.msg || "Mining failed");
}

// ----------------- ADMIN -----------------
async function fetchRegistry(){
    const body = document.getElementById('registryBody');
    body.innerHTML = '<tr><td colspan="3" class="p-10 text-center animate-pulse text-blue-500 font-black tracking-widest">Syncing...</td></tr>';

    const res = await fetch(`${WEB_APP_URL}?action=sync`);
    const data = await res.json();

    if(!data || !data.users) {
        body.innerHTML = '<tr><td colspan="3" class="p-10 text-center opacity-30 italic">No users found</td></tr>';
        return;
    }

    body.innerHTML = data.users.map(u=>`
        <tr class="hover:bg-white/5 transition-colors">
            <td class="p-4 font-bold text-blue-400">${u.uid || 'N/A'}<br><span class="text-[8px] text-white opacity-20 font-normal lowercase">${u.email||''}</span></td>
            <td class="p-4"><span class="px-2 py-1 rounded-lg bg-blue-600/10 text-[9px] font-black uppercase text-blue-500 border border-blue-500/20">${u.verified||'PENDING'}</span></td>
            <td class="p-4 text-right">
                <button onclick="approveUser('${u.uid}')" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-xl text-[9px] font-black uppercase shadow-lg btn">Verify</button>
            </td>
        </tr>`).join('');
}

async function approveUser(uid){
    const res = await fetch(`${WEB_APP_URL}?action=approveUser&payload=${JSON.stringify({uid})}`);
    const data = await res.json();
    if(data.success){ alert("User Verified"); fetchRegistry(); }
    else alert(data.msg||"Failed to verify");
}

async function postAnnouncement(){
    const text = document.getElementById('announcementText').value.trim();
    if(!text) return alert("Announcement cannot be empty");
    const session = JSON.parse(localStorage.getItem('rida_session'));
    const res = await fetch(`${WEB_APP_URL}?action=postAnnouncement&payload=${JSON.stringify({uid:session.uid,text})}`);
    const data = await res.json();
    if(data.success){ alert("Announcement Sent"); document.getElementById('announcementText').value=''; }
    else alert(data.msg || "Failed to broadcast");
}

// ----------------- LOGOUT -----------------
function logout(){ localStorage.clear(); location.reload(); }

// ----------------- INIT -----------------
window.onload = renderView;
</script>

</body>
  </html>
